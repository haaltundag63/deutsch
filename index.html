ksiyon yapıyorum)."},{"tense":"PRÄTERITUM","de":"Sie sammelten Spenden für den guten Zweck.","tr":"Hayır işi için bağış topladılar."},{"tense":"PERFEKT","de":"Hast du schon genug Erfahrung gesammelt?","tr":"Yeterince tecrübe edindin (topladın) mi?"},{"tense":"FUTUR I","de":"Wir werden alle Informationen sammeln.","tr":"Tüm bilgileri toplayacağız."},{"tense":"KONJ II","de":"Ich würde gerne alte Münzen sammeln.","tr":"Eski madeni paralar biriktirmek isterdim."}]},{"category":"AKK / HABEN (DÜZENSİZ)","verb":"saufen","turkish":"içmek (hayvan için) / kafayı çekmek (argo)","prateritum_form":"soff","partizip2":"gesoffen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Kühe saufen Wasser aus dem Trog.","tr":"İnekler tekneden su içiyor."},{"tense":"PRÄTERITUM","de":"Er soff gestern Abend viel zu viel Bier.","tr":"Dün akşam çok fazla bira içti (zıkkımlandı)."},{"tense":"PERFEKT","de":"Hast du wieder die ganze Nacht gesoffen?","tr":"Yine bütün gece kafayı mı çektin?"},{"tense":"FUTUR I","de":"Das Pferd wird bald ordentlich saufen.","tr":"At yakında iyice su içecek."},{"tense":"KONJ II","de":"Ich würde nicht so viel Alkohol saufen.","tr":"Bu kadar çok alkol tüketmezdim (içmezdim)."}]},{"category":"AKK / HABEN (DÜZENSİZ)","verb":"saugen","turkish":"emmeyi / süpürmek (elektrikli) / vakumlamak","prateritum_form":"sog / saugte","partizip2":"gesogen / gesaugt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Baby saugt an seinem Daumen.","tr":"Bebek başparmağını emiyor."},{"tense":"PRÄTERITUM","de":"Ich saugte das ganze Wohnzimmer.","tr":"Bütün oturma odasını süpürdüm."},{"tense":"PERFEKT","de":"Hast du die Informationen wie ein Schwamm aufgesogen?","tr":"Bilgileri bir sünger gibi (emip) çektin mi?"},{"tense":"FUTUR I","de":"Die Maschine wird den Schmutz aufsaugen.","tr":"Makine kiri içine çekecek (vakuplayacak)."},{"tense":"KONJ II","de":"Ich würde öfter saugen, wenn der Staubsauger leiser wäre.","tr":"Süpürge daha sessiz olsaydı daha sık süpürürdüm."}]},{"category":"NOMINATIV / HABEN (DÜZENSİZ)","verb":"scheinen","turkish":"parlamak / gibi görünmek","prateritum_form":"schien","partizip2":"geschienen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Sonne scheint heute hell. - Er scheint müde zu sein.","tr":"Güneş bugün parlak ışıldıyor. - O yorgun görünüyor."},{"tense":"PRÄTERITUM","de":"Der Mond schien durch das Fenster.","tr":"Ay pencereden parlıyordu."},{"tense":"PERFEKT","de":"Es hat den Anschein gehabt (hat geschienen), dass alles okay ist.","tr":"Her şey yolundaymış gibi göründü."},{"tense":"FUTUR I","de":"Morgen wird hoffentlich die Sonne scheinen.","tr":"Yarın umarım güneş açar (parlar)."},{"tense":"KONJ II","de":"Es schiene mir besser, wenn wir jetzt gingen.","tr":"Şimdi gitmemiz bana daha iyi görünürdü (iyi olurdu gibi)."}]},{"category":"AKK / NOM / SEIN / HABEN","verb":"scheiden","turkish":"ayırmak / ayrılmak (boşanmak)","prateritum_form":"","partizip2":"","hilfsverb":"","examples":[{"tense":"PRÄSENS","de":"Der Tod scheidet uns.","tr":"Bizi ölüm ayırır."},{"tense":"PRÄTERITUM","de":"Er schied freiwillig aus dem Leben. (Deyim)","tr":"Hayattan kendi isteğiyle ayrıldı (vefat etti)."},{"tense":"PERFEKT","de":"Sie haben sich letztes Jahr scheiden lassen.","tr":"Geçen yıl boşandılar."},{"tense":"FUTUR I","de":"Unsere Wege werden sich hier scheiden.","tr":"Yollarımız burada ayrılacak."},{"tense":"KONJ II","de":"Ich würde mich nie scheiden lassen.","tr":"Asla boşanmazdım."}]},{"category":"DAT / AKK / HABEN","verb":"schenken","turkish":"hediye etmek / bağışlamak","prateritum_form":"schenkte","partizip2":"geschenkt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schenke dir ein Buch.","tr":"Sana bir kitap hediye ediyorum."},{"tense":"PRÄTERITUM","de":"Er schenkte ihr zum Abschied Blumen.","tr":"Veda için ona çiçek hediye etti."},{"tense":"PERFEKT","de":"Was hast du deiner Mutter geschenkt?","tr":"Annene ne hediye ettin?"},{"tense":"FUTUR I","de":"Ich werde dir meine volle Aufmerksamkeit schenken.","tr":"Sana tüm dikkatimi vereceğim (bahşedeceğim)."},{"tense":"KONJ II","de":"Ich würde dir die Welt schenken, wenn ich könnte.","tr":"Elimden gelse sana dünyaları verirdim."}]},{"category":"NOMINATIV / HABEN","verb":"scherzen","turkish":"şaka yapmak","prateritum_form":"scherzte","partizip2":"gescherzt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er scherzt immer mit den Kollegen.","tr":"Meslektaşlarıyla her zaman şakalaşır."},{"tense":"PRÄTERITUM","de":"Wir scherzten über den Vorfall.","tr":"Olay hakkında şakalaştık."},{"tense":"PERFEKT","de":"Hast du nur gescherzt oder war das ernst?","tr":"Sadece şaka mı yaptın yoksa ciddi miydin?"},{"tense":"FUTUR I","de":"Über dieses Thema wird niemand scherzen.","tr":"Bu konu hakkında kimse şaka yapmayacak."},{"tense":"KONJ II","de":"Ich würde nicht darüber scherzen, wenn ich du wäre.","tr":"Senin yerinde olsam bununla şaka yapmazdım."}]},{"category":"DAT / AKK / HABEN","verb":"schicken","turkish":"göndermek / yollamak","prateritum_form":"schickte","partizip2":"geschickt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schicke dir eine E-Mail.","tr":"Sana bir e-posta gönderiyorum."},{"tense":"PRÄTERITUM","de":"Sie schickte das Paket gestern ab.","tr":"Paketi dün gönderdi."},{"tense":"PERFEKT","de":"Haben Sie die Unterlagen schon geschickt?","tr":"Belgeleri çoktan gönderdiniz mi?"},{"tense":"FUTUR I","de":"Wir werden Ihnen eine Bestätigung schicken.","tr":"Size bir onay göndereceğiz."},{"tense":"KONJ II","de":"Ich würde es per Express schicken.","tr":"Onu ekspres ile gönderirdim."}]},{"category":"AKK / HABEN (DÜZENSİZ)","verb":"schieben","turkish":"itmek / sürmek / kaydırmak","prateritum_form":"schob","partizip2":"geschoben","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schiebe den Wagen in den Supermarkt.","tr":"Arabayı süpermarkete (doğru) itiyorum."},{"tense":"PRÄTERITUM","de":"Er schob die Schuld auf seinen Bruder.","tr":"Suçu kardeşinin üstüne attı (itti)."},{"tense":"PERFEKT","de":"Hast du das Brot in den Ofen geschoben?","tr":"Ekmeği fırına verdin mi (ittin mi)?"},{"tense":"FUTUR I","de":"Wir werden das Sofa an die Wand schieben.","tr":"Kanepeyi duvara (doğru) iteceğiz."},{"tense":"KONJ II","de":"Ich würde den Termin lieber nach hinten schieben.","tr":"Randevuyu ileri bir tarihe kaydırmayı tercih ederdim."}]},{"category":"AKK / AUF + AKK / HABEN","verb":"schießen","turkish":"ateş etmek / vurmak / (gol) atmak","prateritum_form":"schoss","partizip2":"geschossen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er schießt ein Tor.","tr":"O gol atıyor."},{"tense":"PRÄTERITUM","de":"Der Jäger schoss auf das Wild.","tr":"Avcı vahşi hayvana ateş etti."},{"tense":"PERFEKT","de":"Hast du das Foto selbst geschossen? (Deyim)","tr":"Fotoğrafı kendin mi çektin?"},{"tense":"FUTUR I","de":"Die Rakete wird bald ins All schießen.","tr":"Roket yakında uzaya fırlayacak."},{"tense":"KONJ II","de":"Ich würde niemals auf Tiere schießen.","tr":"Asla hayvanlara ateş etmezdim."}]},{"category":"MIT + DAT / ÜBER + AKK / HABEN","verb":"schimpfen","turkish":"azarlamak / sövmek / şikayet etmek","prateritum_form":"schimpfte","partizip2":"geschimpft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Mutter schimpft mit dem Kind.","tr":"Anne çocuğu azarlıyor."},{"tense":"PRÄTERITUM","de":"Alle schimpften über das schlechte Wetter.","tr":"Herkes kötü hava hakkında söyleniyordu (şikayet ediyordu)."},{"tense":"PERFEKT","de":"Hat der Chef wieder geschimpft?","tr":"Patron yine kızdı mı (azarladı mı)?"},{"tense":"FUTUR I","de":"Er wird sicher schimpfen, wenn er das sieht.","tr":"Bunu gördüğünde kesin kızacak/azarlayacak."},{"tense":"KONJ II","de":"Ich würde nicht so viel schimpfen.","tr":"Bu kadar çok söylenmezdim/kızmazdım."}]},{"category":"800. FİİL / HABEN","verb":"schlafen","turkish":"uyumak","prateritum_form":"schlief","partizip2":"geschlafen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Schläfst du schon?","tr":"Uyuyor musun?"},{"tense":"PRÄTERITUM","de":"Das Kind schlief wie ein Engel.","tr":"Çocuk bir melek gibi uyudu."},{"tense":"PERFEKT","de":"Ich habe heute Nacht sehr gut geschlafen.","tr":"Bu gece çok iyi uyudum."},{"tense":"FUTUR I","de":"Morgen wirst du endlich ausschlafen können.","tr":"Yarın nihayet uykunu alabileceksin."},{"tense":"KONJ II","de":"Ich würde jetzt gerne schlafen.","tr":"Şimdi uyumayı isterdim."}]},{"category":"AKK / HABEN (DÜZENSİZ)","verb":"schlagen","turkish":"vurmak / dövmek / yenmek / (kalp) çarpmak","prateritum_form":"schlug","partizip2":"geschlagen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Mein Herz schlägt für dich.","tr":"Kalbim senin için çarpıyor."},{"tense":"PRÄTERITUM","de":"Er schlug den Nagel in die Wand.","tr":"Çiviyi duvara çaktı (vurdu)."},{"tense":"PERFEKT","de":"Wir haben die gegnerische Mannschaft geschlagen.","tr":"Rakip takımı yendik."},{"tense":"FUTUR I","de":"Die Uhr wird gleich zwölf schlagen.","tr":"Saat birazdan on ikiyi çalacak (vuracak)."},{"tense":"KONJ II","de":"Ich würde die Eier schaumig schlagen.","tr":"Yumurtaları köpürene kadar çırpardım."}]},{"category":"NOMINATIV / SEIN","verb":"schleichen","turkish":"sessizce sokulmak / süzülmek / emeklemek","prateritum_form":"schlich","partizip2":"geschlichen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Die Katze schleicht um das Haus.","tr":"Kedi evin etrafında sessizce dolanıyor."},{"tense":"PRÄTERITUM","de":"Er schlich sich heimlich aus dem Zimmer.","tr":"Odadan gizlice süzüldü (çıktı)."},{"tense":"PERFEKT","de":"Bist du auf Zehenspitzen nach oben geschlichen?","tr":"Yukarıya parmak uçlarında mı süzüldün?"},{"tense":"FUTUR I","de":"Wir werden uns leise an sie heranschleichen.","tr":"Onlara sessizce sokulacağız."},{"tense":"KONJ II","de":"Ich würde nicht so herumschleichen.","tr":"Böyle sinsi sinsi dolanmazdım."}]},{"category":"AKK / HABEN (DÜZENSİZ/DÜZENLİ)","verb":"schleifen","turkish":"bilemek / zımparalamak / sürüklemek","prateritum_form":"schlif / schleifte","partizip2":"geschliffen / geschleift","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Handwerker schleift das Messer.","tr":"Usta bıçağı biliyor."},{"tense":"PRÄTERITUM","de":"Er schleifte den schweren Sack über den Boden.","tr":"Ağır çuvalı yerlerde sürükledi."},{"tense":"PERFEKT","de":"Hast du den Diamanten geschliffen?","tr":"Elması yonttun mu (işledin mi)?"},{"tense":"FUTUR I","de":"Wir werden die Holzböden neu schleifen.","tr":"Ahşap zeminleri yeniden zımparalayacağız."},{"tense":"KONJ II","de":"Ich würde meine Fähigkeiten gerne schleifen. (Deyim)","tr":"Yeteneklerimi cilalamak (geliştirmek) isterdim."}]},{"category":"AKK / HABEN (DÜZENSİZ)","verb":"schließen","turkish":"kapatmak / kilitlemek / sonuç çıkarmak","prateritum_form":"schloss","partizip2":"geschlossen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Schließ bitte die Tür!","tr":"Lütfen kapıyı kapat!"},{"tense":"PRÄTERITUM","de":"Das Geschäft schloss um 20 Uhr.","tr":"Mağaza saat 20'de kapandı."},{"tense":"PERFEKT","de":"Hast du den Schrank abgeschlossen?","tr":"Dolabı kilitledin mi?"},{"tense":"FUTUR I","de":"Daraus wird man falsche Schlüsse schließen.","tr":"Bundan yanlış sonuçlar çıkarılacak."},{"tense":"KONJ II","de":"Ich würde die Augen vor der Wahrheit nicht schließen.","tr":"Gerçeklere gözlerimi kapatmazdım."}]},{"category":"AKK / HABEN (DÜZENSİZ)","verb":"schlingen","turkish":"sarmak / dolamak / yutmak (hızla yemek)","prateritum_form":"schlang","partizip2":"geschlungen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er schlingt sein Essen in zwei Minuten herunter.","tr":"Yemeğini iki dakikada mideye indiriyor (yutuyor)."},{"tense":"PRÄTERITUM","de":"Sie schlang den Schal um ihren Hals.","tr":"Atkıyı boynuna doladı."},{"tense":"PERFEKT","de":"Hast du die Arme um ihn geschlungen?","tr":"Kollarını ona doladın mı (sarıldın mı)?"},{"tense":"FUTUR I","de":"Die Pflanze wird sich um den Baum schlingen.","tr":"Bitki ağacın etrafına dolanacak/sarılacak."},{"tense":"KONJ II","de":"Ich würde das Seil nicht so fest schlingen.","tr":"İpi bu kadar sıkı dolamazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"schlucken","turkish":"yutmak / yutkunmak","prateritum_form":"schluckte","partizip2":"geschluckt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schlucke die Tablette mit Wasser.","tr":"Hapı suyla yutuyorum."},{"tense":"PRÄTERITUM","de":"Er schluckte kurz vor der Antwort.","tr":"Cevap vermeden önce kısa bir yutkundu."},{"tense":"PERFEKT","de":"Hast du den Köder geschluckt? (Deyim)","tr":"Yemi yuttun mu?"},{"tense":"FUTUR I","de":"Dieser Motor wird viel Benzin schlucken.","tr":"Bu motor çok benzin yutacak (harcayacak)."},{"tense":"KONJ II","de":"Ich würde diese Beleidigung nicht einfach schlucken.","tr":"Bu hakareti öylece yutmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"schlürfen","turkish":"höpürdetmek / yudumlamak (sesli)","prateritum_form":"schlürfte","partizip2":"geschlürft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er schlürft seine Suppe sehr laut.","tr":"Çorbasını çok gürültülü bir şekilde höpürdetiyor."},{"tense":"PRÄTERITUM","de":"Wir schlürften genüsslich unseren Eistee.","tr":"Buzlu çayımızı keyifle yudumladık."},{"tense":"PERFEKT","de":"Hast du den Kaffee zu heiß geschlürft?","tr":"Kahveyi çok sıcakken mi höpürdettin?"},{"tense":"FUTUR I","de":"Er wird seinen Drink am Strand schlürfen.","tr":"İçeceğini sahilde yudumlayacak."},{"tense":"KONJ II","de":"Ich würde nicht so laut schlürfen, wenn ich im Restaurant wäre.","tr":"Restoranda olsaydım bu kadar sesli höpürdetmezdim."}]},{"category":"NOMINATIV / SEIN","verb":"schlüpfen","turkish":"sıyrılmak / (giysiye) girivermek / (yumurtadan) çıkmak","prateritum_form":"schlüpfte","partizip2":"geschlüpft","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Das Küken schlüpft aus dem Ei.","tr":"Civciv yumurtadan çıkıyor."},{"tense":"PRÄTERITUM","de":"Ich schlüpfte schnell in meine Jacke.","tr":"Hemen ceketimin içine giriverdim (giydim)."},{"tense":"PERFEKT","de":"Bist du durch die kleine Öffnung geschlüpft?","tr":"Küçük açıklıktan sıyrılıp geçtin mi?"},{"tense":"FUTUR I","de":"Er wird in eine neue Rolle schlüpfen.","tr":"Yeni bir role bürünecek/girecek."},{"tense":"KONJ II","de":"Ich würde lieber in bequeme Schuhe schlüpfen.","tr":"Rahat ayakkabılar giymeyi (içine girmeyi) tercih ederdim."}]},{"category":"DATIV / HABEN","verb":"schmecken","turkish":"tadı olmak / lezzetli gelmek / tatmak","prateritum_form":"schmeckte","partizip2":"geschmeckt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Schmeckt es dir? - Das Essen schmeckt gut.","tr":"Tadı hoşuna gidiyor mu? - Yemek lezzetli."},{"tense":"PRÄTERITUM","de":"Die Suppe schmeckte nach nichts.","tr":"Çorbanın hiç tadı yoktu (bir şeye benzemiyordu)."},{"tense":"PERFEKT","de":"Hat dir der Kuchen geschmeckt?","tr":"Keki beğendin mi (tadı hoşuna gitti mi)?"},{"tense":"FUTUR I","de":"Es wird dir sicher schmecken.","tr":"Kesinlikle tadını beğeneceksin."},{"tense":"KONJ II","de":"Ich würde es probieren, wenn es besser schmecken würde.","tr":"Tadı daha iyi olsaydı denerdim."}]},{"category":"DATIV / HABEN","verb":"schmeicheln","turkish":"yağ çekmek / dalkavukluk etmek / gururunu okşamak","prateritum_form":"schmeichelte","partizip2":"geschmeichelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Du schmeichelst mir aber sehr!","tr":"Beni çok onore ediyorsun (gururumu okşuyorsun)!"},{"tense":"PRÄTERITUM","de":"Er schmeichelte dem Chef, um befördert zu werden.","tr":"Terfi almak için patrona yağ çekti."},{"tense":"PERFEKT","de":"Fühlst du dich durch das Lob geschmeichelt?","tr":"Övgüden dolayı onore olmuş (gururu okşanmış) hissediyor musun?"},{"tense":"FUTUR I","de":"Er wird ihr wieder schmeicheln, um zu bekommen, was er will.","tr":"İstediğini almak için ona yine dalkavukluk edecek."},{"tense":"KONJ II","de":"Ich würde niemandem schmeicheln, nur um einen Vorteil zu haben.","tr":"Sırf avantaj sağlamak için kimseye yağ çekmezdim."}]},{"category":"AKK / HABEN (DÜZENSİZ)","verb":"schmeißen","turkish":"fırlatmak / atmak (argo) / bırakmak (okulu vb.)","prateritum_form":"schmiss","partizip2":"geschmissen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schmeiße den Müll weg.","tr":"Çöpü atıyorum (fırlatıyorum)."},{"tense":"PRÄTERITUM","de":"Er schmiss sein Studium nach zwei Semestern.","tr":"İki dönem sonra okulunu bıraktı (attı)."},{"tense":"PERFEKT","de":"Wer hat den Stein ins Fenster geschmissen?","tr":"Pencereye taşı kim fırlattı?"},{"tense":"FUTUR I","de":"Wir werden eine große Party schmeißen. (Deyim)","tr":"Büyük bir parti vereceğiz (patlatacağız)."},{"tense":"KONJ II","de":"Ich würde alles hinschmeißen, wenn ich könnte.","tr":"Elimden gelse her şeyi bırakıp giderdim (atardım)."}]},{"category":"NOM / AKK / SEIN / HABEN","verb":"schmelzen","turkish":"erimek / eritmek","prateritum_form":"","partizip2":"","hilfsverb":"","examples":[{"tense":"PRÄSENS","de":"Das Eis schmilzt in der Sonne.","tr":"Buz güneşte eriyor."},{"tense":"PRÄTERITUM","de":"Die Schokolade schmolz in meiner Hand.","tr":"Çikolata elimde eridi."},{"tense":"PERFEKT","de":"Ist der Schnee schon ganz geschmolzen? (Sein)","tr":"Kar tamamen eridi mi?"},{"tense":"FUTUR I","de":"Die Hitze wird das Metall schmelzen. (Haben)","tr":"Sıcaklık metali eritecek."},{"tense":"KONJ II","de":"Ich würde bei diesem Kompliment schmelzen.","tr":"Bu iltifata erir biterdim."}]},{"category":"NOMINATIV / HABEN","verb":"schmerzen","turkish":"acımak / ağrımak / üzmek","prateritum_form":"schmerzte","partizip2":"geschmerzt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Mein Rücken schmerzt heute sehr.","tr":"Bugün sırtım çok ağrıyor/acıyor."},{"tense":"PRÄTERITUM","de":"Die Trennung schmerzte ihn lange Zeit.","tr":"Ayrılık onu uzun süre üzdü (canını yaktı)."},{"tense":"PERFEKT","de":"Hat die Wunde beim Reinigen geschmerzt?","tr":"Temizlerken yara acıdı mı?"},{"tense":"FUTUR I","de":"Die Wahrheit wird am Anfang schmerzen.","tr":"Gerçek başlangıçta acıtacak."},{"tense":"KONJ II","de":"Es würde mich weniger schmerzen, wenn du ehrlich wärst.","tr":"Dürüst olsaydın canım daha az yanardı."}]},{"category":"AKKUSATIV / HABEN","verb":"schmieden","turkish":"dövmek (demir) / kurmak (plan)","prateritum_form":"schmiedete","partizip2":"geschmiedet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Schmied schmiedet das Eisen.","tr":"Demirci demiri dövüyor."},{"tense":"PRÄTERITUM","de":"Wir schmiedeten Pläne für den Sommer.","tr":"Yaz için planlar kurduk."},{"tense":"PERFEKT","de":"Hast du diese Ringe selbst geschmiedet?","tr":"Bu yüzükleri kendin mi dövdün (yaptın)?"},{"tense":"FUTUR I","de":"Man wird eine neue Allianz schmieden.","tr":"Yeni bir ittifak kurulacak (dövülecek)."},{"tense":"KONJ II","de":"Ich würde gerne meine eigene Zukunft schmieden.","tr":"Kendi geleceğimi (kendi ellerimle) kurmak isterdim."}]},{"category":"REFL / AN + AKK / HABEN","verb":"schmiegen (sich)","turkish":"sokulmak / sarılmak / uymak","prateritum_form":"schmiegte","partizip2":"geschmiegt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Kind schmiegt sich an seine Mutter.","tr":"Çocuk annesine sokuluyor."},{"tense":"PRÄTERITUM","de":"Die Katze schmiegte sich an meine Beine.","tr":"Kedi bacaklarıma sürtündü/sokuldu."},{"tense":"PERFEKT","de":"Hast du dich nachts eng an mich geschmiegt?","tr":"Gece bana sıkıca sokuldun mu?"},{"tense":"FUTUR I","de":"Der neue Handschuh wird sich perfekt an die Hand schmiegen.","tr":"Yeni eldiven ele mükemmel bir şekilde uyacak (oturacak)."},{"tense":"KONJ II","de":"Ich würde mich an dich schmiegen, wenn mir kalt wäre.","tr":"Üşüseydim sana sokulurdum."}]},{"category":"AKK / REFL / HABEN","verb":"schminken","turkish":"makyaj yapmak","prateritum_form":"schminkte","partizip2":"geschminkt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie schminkt sich für die Party.","tr":"Parti için makyaj yapıyor."},{"tense":"PRÄTERITUM","de":"Die Schauspielerin schminkte sich ab.","tr":"Oyuncu makyajını temizledi."},{"tense":"PERFEKT","de":"Hast du dich heute schon geschminkt?","tr":"Bugün çoktan makyaj yaptın mı?"},{"tense":"FUTUR I","de":"Wir werden die Clowns im Zirkus schminken.","tr":"Sirkteki palyaçolara makyaj yapacağız."},{"tense":"KONJ II","de":"Ich würde mich nicht so stark schminken.","tr":"Bu kadar ağır/çok makyaj yapmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"schmuggeln","turkish":"kaçakçılık yapmak / gizlice sokmak","prateritum_form":"schmuggelte","partizip2":"geschmuggelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er schmuggelt Zigaretten über die Grenze.","tr":"Sınır üzerinden sigara kaçırıyor."},{"tense":"PRÄTERITUM","de":"Sie schmuggelten Briefe ins Gefängnis.","tr":"Hapishaneye gizlice mektup soktular."},{"tense":"PERFEKT","de":"Hat er Drogen geschmuggelt?","tr":"Uyuşturucu kaçakçılığı mı yaptı?"},{"tense":"FUTUR I","de":"Die Polizei wird verhindern, dass sie schmuggeln.","tr":"Polis onların kaçakçılık yapmasını engelleyecek."},{"tense":"KONJ II","de":"Ich würde niemals etwas Illegales schmuggeln.","tr":"Asla yasadışı bir şeyi gizlice sokmazdım."}]},{"category":"AKK / REFL / HABEN","verb":"schnallen","turkish":"kemeri takmak / bağlamak / kavramak (argo)","prateritum_form":"schnallte","partizip2":"geschnallt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Bitte schnallen Sie sich an!","tr":"Lütfen kemerlerinizi bağlayın!"},{"tense":"PRÄTERITUM","de":"Er schnallte den Rucksack auf den Rücken.","tr":"Sırt çantasını sırtına bağladı."},{"tense":"PERFEKT","de":"Hast du die Regel endlich geschnallt? (Argo)","tr":"Kuralı nihayet kavradın mı (çaktın mı köfteyi)?"},{"tense":"FUTUR I","de":"Wir werden den Gürtel enger schnallen müssen. (Deyim)","tr":"Kemerleri sıkmak zorunda kalacağız (tasarruf edeceğiz)."},{"tense":"KONJ II","de":"Ich würde mich an deiner Stelle anschnallen.","tr":"Senin yerinde olsam kemerimi bağlardım."}]},{"category":"AKK / REFL / HABEN","verb":"schnappen","turkish":"yakalamak / kapmak / (hava) almak","prateritum_form":"schnappte","partizip2":"geschnappt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schnappe mir schnell einen Kaffee.","tr":"Hemen kendime bir kahve kapıyorum."},{"tense":"PRÄTERITUM","de":"Die Polizei schnappte den Dieb.","tr":"Polis hırsızı yakaladı."},{"tense":"PERFEKT","de":"Hast du schon frische Luft geschnappt?","tr":"Çıkıp biraz temiz hava aldın mı?"},{"tense":"FUTUR I","de":"Der Hund wird sich die Wurst schnappen.","tr":"Köpek sosisi kapacak."},{"tense":"KONJ II","de":"Ich würde mir die Gelegenheit schnappen.","tr":"Bu fırsatı havada kapardım."}]},{"category":"NOMINATIV / HABEN","verb":"schnarchen","turkish":"horlamak","prateritum_form":"schnarchte","partizip2":"geschnarcht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Mein Mann schnarcht jede Nacht.","tr":"Kocam her gece horluyor."},{"tense":"PRÄTERITUM","de":"Er schnarchte so laut, dass ich nicht schlafen konnte.","tr":"O kadar yüksek sesle horladı ki uyuyamadım."},{"tense":"PERFEKT","de":"Hast du heute Nacht wieder geschnarcht?","tr":"Bu gece yine horladın mı?"},{"tense":"FUTUR I","de":"Hoffentlich wird er im Urlaub nicht schnarchen.","tr":"Umarım tatilde horlamaz."},{"tense":"KONJ II","de":"Ich würde nicht schnarchen, wenn ich auf der Seite läge.","tr":"Yan yatsaydım horlamazdım."}]},{"category":"AKK / REFL / HABEN (DÜZENSİZ)","verb":"schneiden","turkish":"kesmek / doğramak","prateritum_form":"schnitt","partizip2":"geschnitten","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schneide das Brot.","tr":"Ekmeği kesiyorum."},{"tense":"PRÄTERITUM","de":"Er schnitt sich beim Kochen in den Finger.","tr":"Yemek yaparken parmağını kesti."},{"tense":"PERFEKT","de":"Hast du dir die Haare geschnitten?","tr":"Saçlarını mı kestirdin?"},{"tense":"FUTUR I","de":"Der Gärtner wird die Hecke schneiden.","tr":"Bahçıvan çitleri kesecek/budayacak."},{"tense":"KONJ II","de":"Ich würde die Zwiebeln feiner schneiden.","tr":"Soğanları daha ince doğrardım."}]},{"category":"UNPERSÖNLICH / HABEN","verb":"schneien","turkish":"kar yağmak","prateritum_form":"schneite","partizip2":"geschneit","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Es schneit heute den ganzen Tag.","tr":"Bugün bütün gün kar yağıyor."},{"tense":"PRÄTERITUM","de":"Gestern schneite es nur ein bisschen.","tr":"Dün sadece biraz kar yağdı."},{"tense":"PERFEKT","de":"Hat es in den Bergen schon geschneit?","tr":"Dağlara kar yağdı mı?"},{"tense":"FUTUR I","de":"Morgen wird es wahrscheinlich schneien.","tr":"Yarın muhtemelen kar yağacak."},{"tense":"KONJ II","de":"Es würde mich freuen, wenn es an Weihnachten schneite.","tr":"Noel'de kar yağsa mutlu olurdum."}]},{"category":"AN + DAT / HABEN","verb":"schnüffeln","turkish":"koklamak (köpek gibi) / burnunu sokmak / araştırmak","prateritum_form":"schnüffelte","partizip2":"geschnüffelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Hund schnüffelt an jedem Baum.","tr":"Köpek her ağacı kokluyor."},{"tense":"PRÄTERITUM","de":"Er schnüffelte in meinen privaten Unterlagen.","tr":"Özel belgelerimi karıştırdı (burnunu soktu)."},{"tense":"PERFEKT","de":"Wer hat hier herumgeschnüffelt?","tr":"Burada kim etrafı kokladı/karıştırdı?"},{"tense":"FUTUR I","de":"Der Detektiv wird in dem Fall schnüffeln.","tr":"Dedektif davanın içinde araştırma yapacak."},{"tense":"KONJ II","de":"Ich würde nicht an deinem Handy schnüffeln.","tr":"Telefonunu karıştırmazdım/gizlice bakmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"schocken","turkish":"şok etmek / sarsmak","prateritum_form":"schockte","partizip2":"geschockt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Diese Nachricht schockt die ganze Welt.","tr":"Bu haber tüm dünyayı şok ediyor."},{"tense":"PRÄTERITUM","de":"Der Unfall schockte die Anwohner.","tr":"Kaza mahalle sakinlerini şok etti/sarstı."},{"tense":"PERFEKT","de":"Seine Kündigung hat mich total geschockt.","tr":"Onun istifası beni tamamen şoke etti."},{"tense":"FUTUR I","de":"Das Ergebnis wird niemanden mehr schocken.","tr":"Sonuç artık kimseyi şaşırtmayacak."},{"tense":"KONJ II","de":"Ich würde dich ungern schocken, aber...","tr":"Seni şoke etmek istemem ama..."}]},{"category":"AKK / REFL / HABEN","verb":"schonen","turkish":"korumak / özen göstermek / dinlenmek","prateritum_form":"schonte","partizip2":"geschont","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schone meine Augen beim Lesen.","tr":"Okurken gözlerimi koruyorum (yoruyorum)."},{"tense":"PRÄTERITUM","de":"Er schonte sich nach der Operation.","tr":"Ameliyattan sonra kendini sakındı (dinlendi)."},{"tense":"PERFEKT","de":"Hast du dein neues Auto bisher geschont?","tr":"Yeni arabanı şimdiye kadar nazik mi kullandın (sakındın mı)?"},{"tense":"FUTUR I","de":"Wir werden unsere Ressourcen schonen müssen.","tr":"Kaynaklarımızı idareli kullanmamız/korumamız gerekecek."},{"tense":"KONJ II","de":"Du solltest dich mehr schonen.","tr":"Kendine daha çok dikkat etmeli/dinlenmelisin."}]},{"category":"AKK / HABEN","verb":"schöpfen","turkish":"kepçeyle almak / (umut vb.) toplamak / yaratmak","prateritum_form":"schöpfte","partizip2":"geschöpft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie schöpft die Suppe in den Teller.","tr":"Çorbayı tabağa kepçeyle koyuyor."},{"tense":"PRÄTERITUM","de":"Er schöpfte wieder neuen Mut.","tr":"Tekrar yeni bir cesaret topladı."},{"tense":"PERFEKT","de":"Haben Sie Verdacht geschöpft? (Deyim)","tr":"Şüphelendiniz mi (Şüpheye düştünüz mü)?"},{"tense":"FUTUR I","de":"Der Künstler wird aus dem Vollen schöpfen.","tr":"Sanatçı tüm kaynaklarını/ilhamını sonuna kadar kullanacak."},{"tense":"KONJ II","de":"Ich würde aus dieser Erfahrung Kraft schöpfen.","tr":"Bu deneyimden güç alırdım."}]},{"category":"DAT / AKK / HABEN (DÜZENSİZ)","verb":"schreiben","turkish":"yazmak","prateritum_form":"schrieb","partizip2":"geschrieben","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schreibe dir morgen einen Brief.","tr":"Sana yarın bir mektup yazıyorum/yazacağım."},{"tense":"PRÄTERITUM","de":"Er schrieb die Geschichte seines Lebens.","tr":"Hayatının hikayesini yazdı."},{"tense":"PERFEKT","de":"Hast du die Hausaufgaben schon geschrieben?","tr":"Ödevleri çoktan yazdın (yaptın) mı?"},{"tense":"FUTUR I","de":"Die Zukunft wird diese Geschichte schreiben.","tr":"Bu hikayeyi gelecek yazacak."},{"tense":"KONJ II","de":"Ich würde dir öfter schreiben, eğer ich Zeit hätte.","tr":"Vaktim olsaydı sana daha sık yazardım."}]},{"category":"NOMINATIV / HABEN (DÜZENSİZ)","verb":"schreien","turkish":"bağırmak / haykırmak","prateritum_form":"schrie","partizip2":"geschrien","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Baby schreit, weil es Hunger hat.","tr":"Bebek aç olduğu için bağırıyor/ağlıyor."},{"tense":"PRÄTERITUM","de":"Er schrie vor Schmerz.","tr":"Acıdan bağırdı/haykırdı."},{"tense":"PERFEKT","de":"Hast du mich gerade angeschrien? (Anschreien)","tr":"Az önce bana bağırdın mı?"},{"tense":"FUTUR I","de":"Die Fans werden im Stadion laut schreien.","tr":"Taraftarlar stadyumda yüksek sesle bağıracaklar."},{"tense":"KONJ II","de":"Ich würde nicht so schreien, eğer ich du wäre.","tr":"Senin yerinde olsam bu kadar bağırmazdım."}]},{"category":"NOMINATIV / SEIN (DÜZENSİZ)","verb":"schreiten","turkish":"adım atmak / (yavaşça) yürümek / ilerlemek","prateritum_form":"schritt","partizip2":"geschritten","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Die Braut schreitet zum Altar.","tr":"Gelin sunağa (yavaş adımlarla) yürüyor."},{"tense":"PRÄTERITUM","de":"Er schritt durch den großen Saal.","tr":"Büyük salonda (ağır adımlarla) yürüdü."},{"tense":"PERFEKT","de":"Die Entwicklung ist weit vorangeschritten.","tr":"Gelişim epey ilerledi."},{"tense":"FUTUR I","de":"Wir werden zur Tat schreiten. (Deyim)","tr":"Eyleme geçeceğiz (harekete başlayacağız)."},{"tense":"KONJ II","de":"Ich würde gemächlich durch den Park schreiten.","tr":"Parkta acele etmeden yürürdüm."}]},{"category":"NOMINATIV / SEIN","verb":"schrumpfen","turkish":"çekmek (kumaş vb.) / küçülmek / azalmak","prateritum_form":"schrumpfte","partizip2":"geschrumpft","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Der Wollpullover schrumpft beim Waschen.","tr":"Yün kazak yıkandığında çekiyor/küçülüyor."},{"tense":"PRÄTERITUM","de":"Die Vorräte schrumpften während des Winters.","tr":"Stoklar kış boyunca azaldı/küçüldü."},{"tense":"PERFEKT","de":"Ist das Unternehmen in der Krise geschrumpft?","tr":"Şirket krizde küçüldü mü?"},{"tense":"FUTUR I","de":"Die Bevölkerung in dieser Region wird schrumpfen.","tr":"Bu bölgedeki nüfus azalacak."},{"tense":"KONJ II","de":"Der Gewinn würde schrumpfen, eğer wir nichts tun.","tr":"Bir şey yapmazsak kar azalır/küçülür."}]},{"category":"AKKUSATIV / HABEN","verb":"schubsen","turkish":"itmek / itelemek","prateritum_form":"schubste","partizip2":"geschubst","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Schubs mich nicht!","tr":"Beni itme!"},{"tense":"PRÄTERITUM","de":"Er schubste seinen Freund aus Spaß in den Pool.","tr":"Şaka olsun diye arkadaşını havuza itti."},{"tense":"PERFEKT","de":"Wer hat dich von der Bank geschubst?","tr":"Seni banktan kim itti?"},{"tense":"FUTUR I","de":"Die Kinder werden sich gegenseitig schubsen.","tr":"Çocuklar birbirlerini itip kakacaklar."},{"tense":"KONJ II","de":"Ich würde niemanden absichtlich schubsen.","tr":"Kimseyi bilerek itmezdim."}]},{"category":"NOMINATIV / HABEN","verb":"schuften","turkish":"çok çalışmak / ağır işte çalışmak / köpek gibi çalışmak","prateritum_form":"schuftete","partizip2":"geschuftet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er schuftet den ganzen Tag auf dem Bau.","tr":"Bütün gün inşaatta canı çıkana kadar çalışıyor."},{"tense":"PRÄTERITUM","de":"Wir schufteten hart für den Erfolg.","tr":"Başarı için çok (ağır) çalıştık."},{"tense":"PERFEKT","de":"Hast du das ganze Wochenende geschuftet?","tr":"Bütün hafta sonu eşek gibi mi çalıştın?"},{"tense":"FUTUR I","de":"Wir werden noch lange schuften müssen, bis wir fertig sind.","tr":"Bitirene kadar daha uzun süre ter dökmek/çalışmak zorunda kalacağız."},{"tense":"KONJ II","de":"Ich würde nicht so viel schuften, eğer ich reich wäre.","tr":"Zengin olsaydım bu kadar çok (canım çıkana kadar) çalışmazdım."}]},{"category":"AKK / REFL / HABEN","verb":"schütteln","turkish":"sallamak / sarsmak / çalkalamak","prateritum_form":"schüttelte","partizip2":"geschüttelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Vor Gebrauch bitte schütteln!","tr":"Kullanmadan önce lütfen çalkalayın!"},{"tense":"PRÄTERITUM","de":"Er schüttelte den Kopf aus Unglauben.","tr":"İnanmayarak kafasını salladı."},{"tense":"PERFEKT","de":"Hast du die Decke schon geschüttelt?","tr":"Örtüyü (tozunu almak için) silkeledin mi?"},{"tense":"FUTUR I","de":"Der Sturm wird die Bäume kräftig schütteln.","tr":"Fırtına ağaçları şiddetle sarsacak."},{"tense":"KONJ II","de":"Ich würde dir gerne die Hand schütteln.","tr":"Elimi sıkmanı (el sıkışmayı) isterdim."}]},{"category":"AKK / HABEN","verb":"schütten","turkish":"dökmek / boşaltmak (sıvı veya taneli şey)","prateritum_form":"schüttete","partizip2":"geschüttet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schütte den Saft ins Glas.","tr":"Meyve suyunu bardağa döküyorum."},{"tense":"PRÄTERITUM","de":"Es schüttete gestern wie aus Eimern. (Deyim)","tr":"Dün bardaktan boşalırcasına yağmur yağdı."},{"tense":"PERFEKT","de":"Wer hat den Kaffee über den Teppich geschüttet?","tr":"Halıya kahveyi kim döktü?"},{"tense":"FUTUR I","de":"Wir werden den Sand in die Grube schütten.","tr":"Kumu çukura boşaltacağız."},{"tense":"KONJ II","de":"Ich würde kein Öl ins Feuer schütten. (Deyim)","tr":"Yangına körükle gitmezdim (yağ dökmezdim)."}]},{"category":"AKK / VOR + DAT / HABEN","verb":"schützen","turkish":"korumak / muhafaza etmek","prateritum_form":"schützte","partizip2":"geschützt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Sonnenbrille schützt die Augen vor UV-Licht.","tr":"Güneş gözlüğü gözleri UV ışığından korur."},{"tense":"P SİZ)","verb":"schweigen","turkish":"susmak","prateritum_form":"schwieg","partizip2":"geschwiegen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"In der Bibliothek schweigt man.","tr":"Kütüphanede susulur (konuşulmaz)."},{"tense":"PRÄTERITUM","de":"Er schwieg, als er gefragt wurde.","tr":"Soru sorulduğunda sustu."},{"tense":"PERFEKT","de":"Warum hast du so lange darüber geschwiegen?","tr":"Neden bunun hakkında bu kadar uzun süre sustun?"},{"tense":"FUTUR I","de":"Die Angeklagten werden vor Gericht schweigen.","tr":"Sanıklar mahkemede susacaklar."},{"tense":"KONJ II","de":"An deiner Stelle würde ich lieber schweigen.","tr":"Senin yerinde olsam susmayı tercih ederdim."}]},{"category":"NOMINATIV / SEIN (DÜZENSİZ)","verb":"schwellen","turkish":"şişmek / kabarmak","prateritum_form":"schwoll","partizip2":"geschwollen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Der Knöchel schwillt nach dem Umknicken an.","tr":"Ayak bileği burkulduktan sonra şişiyor."},{"tense":"PRÄTERITUM","de":"Der Fluss schwoll nach dem Regen stark an.","tr":"Nehir yağmurdan sonra iyice kabardı."},{"tense":"PERFEKT","de":"Ist deine Wange schon etwas abgeschwollen?","tr":"Yanağının şişi biraz indi mi (şişi geçti mi)?"},{"tense":"FUTUR I","de":"Die Segel werden im Wind schwellen.","tr":"Yelkenler rüzgarda kabaracak/şişecek."},{"tense":"KONJ II","de":"Die Wut würde in ihm schwellen, wenn er das hörte.","tr":"Bunu duysaydı içindeki öfke kabarırdı."}]},{"category":"NOMINATIV / SEIN (DÜZENSİZ)","verb":"schwimmen","turkish":"yüzmek","prateritum_form":"schwamm","partizip2":"geschwommen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Ich schwimme jeden Morgen im See.","tr":"Her sabah gölde yüzüyorum."},{"tense":"PRÄTERITUM","de":"Wir schwammen bis zur Insel.","tr":"Adaya kadar yüzdük."},{"tense":"PERFEKT","de":"Bist du schon mal mit Delfinen geschwommen?","tr":"Hiç yunuslarla yüzdün mü?"},{"tense":"FUTUR I","de":"Im Sommer werden wir im Meer schwimmen.","tr":"Yazın denizde yüzeceğiz."}]},{"category":"NOMINATIV / SEIN (DÜZENSİZ)","verb":"schwinden","turkish":"azalmak / yok olmak / gözden kaybolmak","prateritum_form":"schwand","partizip2":"geschwunden","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Meine Hoffnung schwindet von Tag zu Tag.","tr":"Umudum günden güne azalıyor/yok oluyor."},{"tense":"PRÄTERITUM","de":"Sein Mut schwand in der Dunkelheit.","tr":"Karanlıkta cesareti kırıldı (yok oldu)."},{"tense":"PERFEKT","de":"Das Interesse an diesem Thema ist geschwunden.","tr":"Bu konuya olan ilgi azaldı/tükendi."},{"tense":"FUTUR I","de":"Das Vertrauen wird bald schwinden.","tr":"Güven yakında yok olacak."},{"tense":"KONJ II","de":"Ich würde nicht wollen, dass unsere Liebe schwindet.","tr":"Aşkımızın tükenmesini istemezdim."}]},{"category":"AKK / REFL / HABEN (DÜZENSİZ)","verb":"schwingen","turkish":"sallanmak / savurmak / titreşmek","prateritum_form":"schwang","partizip2":"geschwungen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Brücke schwingt im Wind.","tr":"Köprü rüzgarda sallanıyor."},{"tense":"PRÄTERITUM","de":"Er schwang sich elegant aufs Pferd.","tr":"Zarif bir şekilde atın üzerine atladı/savruldu."},{"tense":"PERFEKT","de":"Haben die Saiten der Gitarre lange geschwungen?","tr":"Gitarın telleri uzun süre titreşti mi?"},{"tense":"FUTUR I","de":"Die Glocke wird im Turm schwingen.","tr":"Çan kulede sallanacak."},{"tense":"KONJ II","de":"Ich würde gerne das Tanzbein schwingen. (Deyim)","tr":"Dans etmek (pisti sallamak) isterdim."}]},{"category":"NOMINATIV / HABEN","verb":"schwitzen","turkish":"terlemek","prateritum_form":"schwitzte","partizip2":"geschwitzt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schwitze bei dieser Hitze sehr stark.","tr":"Bu sıcakta çok fazla terliyorum."},{"tense":"PRÄTERITUM","de":"Er schwitzte vor Angst beim Examen.","tr":"Sınavda korkudan ter döktü."},{"tense":"PERFEKT","de":"Hast du beim Sport viel geschwitzt?","tr":"Spor yaparken çok terledin mi?"},{"tense":"FUTUR I","de":"In der Sauna wirst du ordentlich schwitzen.","tr":"Saunada iyice terleyeceksin."},{"tense":"KONJ II","de":"Ich würde nicht so schwitzen, wenn die Klimaanlage liefe.","tr":"Klima çalışsaydı bu kadar terlemezdim."}]},{"category":"DAT / AKK / HABEN (DÜZENSİZ)","verb":"schwören","turkish":"yemin etmek","prateritum_form":"schwor","partizip2":"geschworen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schwöre dir, dass ich die Wahrheit sage.","tr":"Sana doğruyu söylediğime yemin ederim."},{"tense":"PRÄTERITUM","de":"Der Zeuge schwor vor Gericht.","tr":"Tanık mahkemede yemin etti."},{"tense":"PERFEKT","de":"Hast du ewige Treue geschworen?","tr":"Sonsuz sadakat yemini mi ettin?"},{"tense":"FUTUR I","de":"Er wird Rache schwören.","tr":"İntikam yemini edecek."},{"tense":"KONJ II","de":"Ich würde niemals einen falschen Eid schwören.","tr":"Asla yalan yere yemin etmezdim."}]},{"category":"NOMINATIV / SEIN / HABEN","verb":"segeln","turkish":"yelken açmak / (yelkenliyle) gitmek","prateritum_form":"","partizip2":"","hilfsverb":"","examples":[{"tense":"PRÄSENS","de":"Wir segeln am Wochenende über den See.","tr":"Hafta sonu gölde yelken açıyoruz."},{"tense":"PRÄTERITUM","de":"Das Schiff segelte nach Amerika.","tr":"Gemi Amerika'ya yelken açtı."},{"tense":"PERFEKT","de":"Bist du schon mal alleine gesegelt?","tr":"Hiç tek başına yelkenli kullandın mı?"},{"tense":"FUTUR I","de":"Nächstes Jahr werden wir in der Karibik segeln.","tr":"Gelecek yıl Karayipler'de yelken açacağız."},{"tense":"KONJ II","de":"Ich würde gerne um die Welt segeln.","tr":"Dünya turuna yelken açmak isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"segnen","turkish":"takdis etmek / kutsamak","prateritum_form":"segnete","partizip2":"gesegnet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Gott segne dich!","tr":"Tanrı seni kutsasın! (Çok yaşa!)"},{"tense":"PRÄTERITUM","de":"Der Pfarrer segnete das Paar.","tr":"Rahip çifti kutsadı."},{"tense":"PERFEKT","de":"Hat der Bischof die neue Kirche gesegnet?","tr":"Piskopos yeni kiliseyi kutsadı mı?"},{"tense":"FUTUR I","de":"Das Schicksal wird dich segnen.","tr":"Kader seni kutsayacak."},{"tense":"KONJ II","de":"Ich fühlte mich gesegnet, wenn du bei mir wärst.","tr":"Yanımda olsaydın kendimi lütfedilmiş (kutsanmış) hissederdim."}]},{"category":"AKK / HABEN (DÜZENSİZ)","verb":"sehen","turkish":"görmek / bakmak","prateritum_form":"sah","partizip2":"gesehen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich sehe dich am Fenster. (du siehst / er sieht)","tr":"Seni pencerede görüyorum."},{"tense":"PRÄTERITUM","de":"Gestern sah ich einen tollen Film.","tr":"Dün harika bir film gördüm/izledim."},{"tense":"PERFEKT","de":"Hast du meinen Schlüssel gesehen?","tr":"Anahtarımı gördün mü?"},{"tense":"FUTUR I","de":"Wir werden uns bald wiedersehen.","tr":"Yakında tekrar görüşeceğiz."},{"tense":"KONJ II","de":"Ich würde es gerne mit eigenen Augen sehen.","tr":"Kendi gözlerimle görmeyi isterdim."}]},{"category":"REFL / NACH + DAT / HABEN","verb":"sehnen (sich)","turkish":"özlemek / hasretini çekmek","prateritum_form":"sehnte","partizip2":"gesehnt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich sehne mich nach dem Meer.","tr":"Denize hasretim (Denizi özlüyorum)."},{"tense":"PRÄTERITUM","de":"Er sehnte sich nach seiner Heimat.","tr":"Memleketinin hasretini çekiyordu."},{"tense":"PERFEKT","de":"Hast du dich nach meiner Nähe gesehnt?","tr":"Benim yakınlığımı/yanımda olmayı özledin mi?"},{"tense":"FUTUR I","de":"Die Menschen werden sich nach Frieden sehnen.","tr":"İnsanlar barışa hasret kalacaklar."},{"tense":"KONJ II","de":"Ich würde mich nach Ruhe sehnen, wenn ich Stress hätte.","tr":"Stresim olsaydı huzura hasret duyardım."}]},{"category":"TEMEL FİİL / SEIN","verb":"sein","turkish":"olmak","prateritum_form":"war","partizip2":"gewesen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Ich bin müde.","tr":"Yorgunum."},{"tense":"PRÄTERITUM","de":"Das war eine schöne Zeit.","tr":"O güzel bir zamandı TUM","de":"Er setzte die Brille auf die Nase.","tr":"Gözlüğü burnunun üstüne koydu/taktı."},{"tense":"PERFEKT","de":"Haben Sie sich schon ein Ziel gesetzt?","tr":"Kendinize çoktan bir hedef koydunuz mu?"},{"tense":"FUTUR I","de":"Wir werden das Projekt in Gang setzen. (Deyim)","tr":"Projeyi harekete geçireceğiz."},{"tense":"KONJ II","de":"Ich würde mich lieber ans Fenster setzen.","tr":"Pencere kenarına oturmayı tercih ederdim."}]},{"category":"NOMINATIV / HABEN","verb":"seufzen","turkish":"iç çekmek / of çekmek","prateritum_form":"seufzte","partizip2":"geseufzt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie seufzt tief bei der Arbeit.","tr":"Çalışırken derin bir iç çekiyor."},{"tense":"PRÄTERITUM","de":"Er seufzte erleichtert nach der Prüfung.","tr":"Sınavdan sonra rahatlayarak of çekti/iç çekti."},{"tense":"PERFEKT","de":"Warum hast du gerade so laut geseufzt?","tr":"Neden az önce o kadar sesli iç çektin?"},{"tense":"FUTUR I","de":"Er wird nur seufzen, wenn er die Rechnung sieht.","tr":"Faturayı gördüğünde sadece iç geçirecek."},{"tense":"KONJ II","de":"Ich würde nicht so viel seufzen, wenn alles glatt liefe.","tr":"Her şey yolunda gitseydi bu kadar of çekmezdim."}]},{"category":"AKKUSATIV / HABEN","verb":"sichern","turkish":"emniyete almak / garantiye almak / (dosya) yedeklemek","prateritum_form":"sicherte","partizip2":"gesichert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich sichere meine Daten auf einer Festplatte.","tr":"Verilerimi bir sabit diske yedekliyorum."},{"tense":"PRÄTERITUM","de":"Die Polizei sicherte die Unfallstelle.","tr":"Polis kaza yerini emniyete aldı."},{"tense":"PERFEKT","de":"Hast du deine Zukunft finanziell gesichert?","tr":"Geleceğini finansal olarak garantiye aldın mı?"},{"tense":"FUTUR I","de":"Wir werden den Beweis sichern.","tr":"Kanıtı emniyete alacağız (koruyacağız)."},{"tense":"KONJ II","de":"Ich würde die Datei öfter sichern.","tr":"Dosyayı daha sık yedeklerdim."}]},{"category":"NOMINATIV / HABEN","verb":"siegen","turkish":"yenmek / zafer kazanmak","prateritum_form":"siegte","partizip2":"gesiegt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Gerechtigkeit siegt am Ende immer.","tr":"Adalet sonunda daima kazanır/yener."},{"tense":"PRÄTERITUM","de":"Unsere Mannschaft siegte im Finale.","tr":"Takımımız finalde zafer kazandı."},{"tense":"PERFEKT","de":"Wer hat bei dem Wettbewerb gesiegt?","tr":"Yarışmada kim galip geldi?"},{"tense":"FUTUR I","de":"Die Wahrheit wird über die Lüge siegen.","tr":"Gerçek, yalanı yenecek (galip gelecek)."},{"tense":"KONJ II","de":"Ich würde gerne einmal im Leben siegen.","tr":"Hayatta bir kez olsun galip gelmek isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"siezen","turkish":"siz diye hitap etmek","prateritum_form":"siezte","partizip2":"gesiezt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"In Deutschland siezt man Fremde.","tr":"Almanya'da yabancılara \"Siz\" diye hitap edilir."},{"tense":"PRÄTERITUM","de":"Er siezte seinen Schwiegervater jahrelang.","tr":"Kayınpederine yıllarca \"Siz\" diye hitap etti."},{"tense":"PERFEKT","de":"Haben Sie ihn schon immer gesiezt?","tr":"Ona her zaman mı \"Siz\" dediniz?"},{"tense":"FUTUR I","de":"Wir werden uns wahrscheinlich immer siezen.","tr":"Muhtemelen birbirimize hep \"Siz\" diyeceğiz."},{"tense":"KONJ II","de":"Ich würde ihn siezen, um Respekt zu zeigen.","tr":"Saygı göstermek için ona \"Siz\" diye hitap ederdim."}]},{"category":"AKK / HABEN (DÜZENSİZ)","verb":"singen","turkish":"şarkı söylemek","prateritum_form":"sang","partizip2":"gesungen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Vögel singen im Garten.","tr":"Kuşlar bahçede şarkı söylüyor (ötüyor)."},{"tense":"PRÄTERITUM","de":"Wir sangen gemeinsam am Lagerfeuer.","tr":"Kamp ateşinde birlikte şarkı söyledik."},{"tense":"PERFEKT","de":"Hast du dieses Lied schon mal gesungen?","tr":"Bu şarkıyı hiç söyledin mi?"},{"tense":"FUTUR I","de":"Der Chor wird morgen in der Kirche singen.","tr":"Koro yarın fede saatlerce oturduk."},{"tense":"PERFEKT","de":"Hast du schon mal im Gefängnis gesessen?","tr":"Hiç hapiste yattın (oturdun) mı?"},{"tense":"FUTUR I","de":"Die Hose wird perfekt sitzen.","tr":"Pantolon mükemmel bir şekilde (üzerine) oturacak."},{"tense":"KONJ II","de":"Ich würde jetzt lieber am Strand sitzen.","tr":"Şu an sahilde oturmayı tercih ederdim."}]},{"category":"NOMINATIV / SEIN / HABEN","verb":"skaten","turkish":"kaykay yapmak / paten kaymak","prateritum_form":"","partizip2":"","hilfsverb":"","examples":[{"tense":"PRÄSENS","de":"Er skatet jeden Tag im Park.","tr":"Her gün parkta kaykay yapıyor."},{"tense":"PRÄTERITUM","de":"Wir skateten bis zur Stadtmitte.","tr":"Şehir merkezine kadar kaykayla gittik."},{"tense":"PERFEKT","de":"Bist du heute schon geskatet?","tr":"Bugün hiç paten kaydın mı?"},{"tense":"FUTUR I","de":"Die Jugendlichen werden am Nachmittag skaten.","tr":"Gençler öğleden sonra kaykay yapacaklar."},{"tense":"KONJ II","de":"Ich würde auch skaten, wenn ich ein Board hätte.","tr":"Kaykayım olsaydı ben de yapardım."}]},{"category":"AKKUSATIV / HABEN","verb":"sichten","turkish":"gözlemlemek / incelemek / (belge) gözden geçirmek","prateritum_form":"sichtete","partizip2":"gesichtet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich sichte gerade die Bewerbungsunterlagen.","tr":"Şu an başvuru belgelerini gözden geçiriyorum/inceliyorum."},{"tense":"PRÄTERITUM","de":"Man sichtete den Wal in Küstennähe.","tr":"Balina kıyı yakınlarında görüldü/tespit edildi."},{"tense":"PERFEKT","de":"Haben Sie alle Dokumente bereits gesichtet?","tr":"Tüm belgeleri çoktan incelediniz mi?"},{"tense":"FUTUR I","de":"Die Experten werden das Material sichten.","tr":"Uzmanlar materyali inceleyecekler."},{"tense":"KONJ II","de":"Ich würde das Videomaterial gründlicher sichten.","tr":"Video materyalini daha titiz bir şekilde incelerdim."}]},{"category":"AKKUSATIV / HABEN","verb":"sortieren","turkish":"sıralamak / düzenlemek / ayıklamak","prateritum_form":"sortierte gezeceğiz/yürüyeceğiz."},{"tense":"KONJ II","de":"Ich würde spazieren, wenn es nicht regnete.","tr":"Yağmur yağmasaydı yürüyüş yapardım."}]},{"category":"AKKUSATIV / HABEN","verb":"speichern","turkish":"kaydetmek / depolamak","prateritum_form":"speicherte","partizip2":"gespeichert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich speichere das Dokument regelmäßig.","tr":"Belgeyi düzenli olarak kaydediyorum."},{"tense":"PRÄTERITUM","de":"Er speicherte alle Fotos in der Cloud.","tr":"Tüm fotoğrafları buluta kaydetti."},{"tense":"PERFEKT","de":"Hast du deine Telefonnummer gespeichert?","tr":"Telefon numaranı kaydettin mi?"},{"tense":"FUTUR I","de":"Der Computer wird die Daten automatisch speichern.","tr":"Bilgisayar verileri otomatik olarak kaydedecek."},{"tense":"KONJ II","de":"Ich würde die Datei speichern, bevor ich sie schließe.","tr":"Kapatmadan önce dosyayı kaydederdim."}]},{"category":"NOMINATIV / HABEN","verb":"speisen","turkish":"yemek yemek (resmi/asil) / beslemek","prateritum_form":"speiste","partizip2":"gespeist","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der König speist in seinem Gemach.","tr":"Kral odasında yemek yiyor."},{"tense":"PRÄTERITUM","de":"Wir speisten gestern vorzüglich.","tr":"Dün enfes bir yemek yedik."},{"tense":"PERFEKT","de":"Haben Sie bereits zu Mittag gespeist?","tr":"Öğle yemeğinizi yediniz mi (resmi)?"},{"tense":"FUTUR I","de":"Gäste werden hier erstklassig speisen.","tr":"Misafirler burada birinci sınıf yemek yiyecekler."},{"tense":"KONJ II","de":"Ich würde gerne öfter so elegant speisen.","tr":"Daha sık böyle zarifçe yemek yemek isterdim."}]},{"category":"AUF + AKK / HABEN","verb":"spekulieren","turkish":"spekülasyon yapmak / borsa oynamak / tahmin yürütmek","prateritum_form":"spekulierte","partizip2":"spekuliert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er spekuliert an der Börse mit Aktien.","tr":"Borsada hisse senetleriyle spekülasyon yapıyor."},{"tense":"PRÄTERITUM","de":"Man spekulierte F + AKK / HABEN","verb":"spezialisieren (sich)","turkish":"uzmanlaşmak / (bir alana) yoğunlaşmak","prateritum_form":"spezialisierte","partizip2":"spezialisiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Arzt spezialisiert sich auf Chirurgie.","tr":"Doktor cerrahi alanında uzmanlaşıyor."},{"tense":"PRÄTERITUM","de":"Das Unternehmen spezialisierte sich auf Software.","tr":"Şirket yazılım üzerine uzmanlaştı."},{"tense":"PERFEKT","de":"Auf welches Fachgebiet hast du dich spezialisiert?","tr":"Hangi uzmanlık alanına yoğunlaştın?"},{"tense":"FUTUR I","de":"Ich werde mich auf KI-Technologien spezialisieren.","tr":"Yapay zeka teknolojileri üzerine uzmanlaşacağım."},{"tense":"KONJ II","de":"Ich würde mich an deiner Stelle auf Design spezialisieren.","tr":"Senin yerinde olsam tasarım üzerine uzmanlaşırdım."}]},{"category":"NOM / REFL / HABEN","verb":"spiegeln (sich)","turkish":"yansımak / aynada görünmek / yansıtmak","prateritum_form":"spiegelte","partizip2":"gespiegelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Sonne spiegelt sich im Wasser.","tr":"Güneş suda yansıyor."},{"tense":"PRÄTERITUM","de":"Sein Gesicht spiegelte sich im Fenster.","tr":"Yüzü pencerede yansıdı."},{"tense":"PERFEKT","de":"Hat sich deine Angst in deinen Augen gespiegelt?","tr":"Korkun gözlerine yansıdı mı?"},{"tense":"FUTUR I","de":"Die Wahrheit wird sich in den Ergebnissen spiegeln.","tr":"Gerçek sonuçlara yansıyacak."},{"tense":"KONJ II","de":"Ich würde mich nicht gerne in diesem alten Spiegel spiegeln.","tr":"Bu eski aynada kendimi görmeyi (yansımayı) istemezdim."}]},{"category":"AKK / MIT + DAT / HABEN","verb":"spielen","turkish":"oynamak / çalmak (enstrüman)","prateritum_form":"spielte","partizip2":"gespielt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Kinder spielen im Garten Fußball.","tr":"Çocuklar bahçede futbol oynuyorlar."},{"tense":"PRÄTERITUM","de":"Er spielte früher Klavier.","tr":"Eskiden piyano çalardı."},{"tense":"PERFEKT","de":"Hast du schon mal dieses Computerspiel gespielt?","tr":"Bu bilgisayar oyununu hiç oynadın mı?"},{"tense":"FUTUR I","de":"Wir werden heute Abend Karten spielen.","tr":"Bu akşam kart oynayacağız."},{"tense":"KONJ II","de":"Ich würde gerne öfter Gitarre spielen.","tr":"Daha sık gitar çalmak isterdim."}]},{"category":"NOMINATIV / HABEN (DÜZENSİZ)","verb":"spinnen","turkish":"eğirmek / örümcek ağı yapmak / saçmalamak-kafayı yemek (argo)","prateritum_form":"spann","partizip2":"gesponnen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Spinne spinnt ein Netz. / Spinnst du?","tr":"Örümcek ağ örüyor. / Saçmalıyor musun? (Kafayı mı yedin?)"},{"tense":"PRÄTERITUM","de":"Die alten Frauen spannen früher Wolle.","tr":"Eskiden yaşlı kadınlar yün eğirirdi."},{"tense":"PERFEKT","de":"Hast du dir diese Geschichte nur gesponnen?","tr":"Bu hikayeyi sadece uydurdun mu (kafanın içinde mi kurdun)?"},{"tense":"FUTUR I","de":"Er wird wohl wieder nur herumspinnen.","tr":"Yine muhtemelen saçma sapan konuşacak/kuracak."},{"tense":"KONJ II","de":"Ich würde nicht so spinnen, wenn ich du wäre.","tr":"Senin yerinde olsam böyle saçmalamazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"sponsoren","turkish":"sponsor olmak / desteklemek","prateritum_form":"sponsorte","partizip2":"gesponsert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Bank sponsert den lokalen Sportverein.","tr":"Banka yerel spor kulübüne sponsor oluyor."},{"tense":"PRÄTERITUM","de":"Eine Firma sponsorte unsere Trikots.","tr":"Bir firma formalarımıza sponsor oldu."},{"tense":"PERFEKT","de":"Wer hat die Veranstaltung gesponsert?","tr":"Etkinliğe kim sponsor oldu?"},{"tense":"FUTUR I","de":"Wir werden das Projekt hoffentlich sponsoren.","tr":"Umarım projeye sponsor olacağız."},{"tense":"KONJ II","de":"Ich würde dein Team gerne sponsoren.","tr":"Ekibine sponsor olmayı isterdim."}]},{"category":"ÜBER + AKK / HABEN","verb":"spotten","turkish":"alay etmek / dalga geçmek","prateritum_form":"spottete","partizip2":"gespottet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie spotten über seine altmodische Kleidung.","tr":"Onun eski moda kıyafetleriyle alay ediyorlar."},{"tense":"PRÄTERITUM","de":"Alle spotteten über den Fehler des Torwarts.","tr":"Herkes kalecinin hatasıyla dalga geçti."},{"tense":"PERFEKT","de":"Hast du über meine Aussprache gespottet?","tr":"Telaffuzumla alay mı ettin?"},{"tense":"FUTUR I","de":"Niemand wird über dich spotten, wenn du ehrlich bist.","tr":"Dürüst olursan kimse seninle dalga geçmeyecek."},{"tense":"KONJ II","de":"Ich würde niemals über jemanden spotten.","tr":"Asla biriyle alay etmezdim."}]},{"category":"MIT + DAT / ÜBER + AKK / HABEN (DÜZENSİZ)","verb":"sprechen","turkish":"konuşmak","prateritum_form":"sprach","partizip2":"gesprochen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich spreche fließend Deutsch. (du sprichst / er spricht)","tr":"Akıcı bir şekilde Almanca konuşuyorum."},{"tense":"PRÄTERITUM","de":"Er sprach lange mit seinem Chef.","tr":"Patronuyla uzun süre konuştu."},{"tense":"PERFEKT","de":"Hast du schon mit ihr gesprochen?","tr":"Onunla çoktan konuştun mu?"},{"tense":"FUTUR I","de":"Wir werden morgen darüber sprechen.","tr":"Yarın bunun üzerine konuşacağız."},{"tense":"KONJ II","de":"Ich würde gerne mit dem Manager sprechen.","tr":"Müdürle konuşmayı isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"sprengen","turkish":"patlatmak / uçurmak / sulamak (fıskiye ile)","prateritum_form":"sprengte","partizip2":"gesprengt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Gärtner sprengt den Rasen.","tr":"Bahçıvan çimleri suluyor (fıskiye ile)."},{"tense":"PRÄTERITUM","de":"Die Pioniere sprengten die alte Brücke.","tr":"İstihkamcılar eski köprüyü patlattılar."},{"tense":"PERFEKT","de":"Hat die Nachricht den Rahmen gesprengt? (Deyim)","tr":"Haber sınırları (beklentiyi) aştı mı?"},{"tense":"FUTUR I","de":"Die Polizei wird den Tresor sprengen müssen.","tr":"Polis kasayı patlatmak zorunda kalacak."},{"tense":"KONJ II","de":"Ich würde diesen Stein sprengen, eğer ich könnte.","tr":"Elimden gelse bu taşı patlatırdım/parçalardım."}]},{"category":"NOMINATIV / SEIN (DÜZENSİZ)","verb":"springen","turkish":"zıplamak / atlamak","prateritum_form":"sprang","partizip2":"gesprungen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Das Kind springt vor Freude.","tr":"Çocuk sevinçten zıplıyor."},{"tense":"PRÄTERITUM","de":"Er sprang über den kleinen Bach.","tr":"Küçük derenin üzerinden atladı."},{"tense":"PERFEKT","de":"Bist du schon mal aus einem Flugzeug gesprungen?","tr":"Hiç uçaktan (paraşütle) atladın mı?"},{"tense":"FUTUR I","de":"Die Katze wird auf den Tisch springen.","tr":"Kedi masanın üzerine atlayacak."},{"tense":"KONJ II","de":"Ich würde nicht von dieser hohen Klippe springen.","tr":"Bu yüksek kayalıktan atlamazdım."}]},{"category":"AKK / NOM / HABEN / SEIN","verb":"spritzen","turkish":"fışkırmak / sıçratmak / iğne yapmak","prateritum_form":"","partizip2":"","hilfsverb":"","examples":[{"tense":"PRÄSENS","de":"Das Auto spritzt Schlamm auf die Passanten.","tr":"Araba yoldan geçenlere çamur sıçratıyor."},{"tense":"PRÄTERITUM","de":"Das Wasser spritzte aus dem Loch.","tr":"Su delikten fışkırdı."},{"tense":"PERFEKT","de":"Hat der Arzt dir das Medikament gespritzt?","tr":"Doktor sana ilacı iğneyle mi yaptı?"},{"tense":"FUTUR I","de":"Wir werden den Wein in die Gläser spritzen.","tr":"Şarabı kadehlere (hafifçe) fışkırtacağız/dökeceğiz."},{"tense":"KONJ II","de":"Ich würde nicht so mit dem Wasser spritzen.","tr":"Suyu bu kadar etrafa sıçratmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"sprühen","turkish":"püskürtmek / sprey sıkmak / (kıvılcım) saçmak","prateritum_form":"sprühte","partizip2":"gesprüht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich sprühe Parfüm auf meinen Hals.","tr":"Boynuma parfüm sıkıyorum."},{"tense":"PRÄTERITUM","de":"Er sprühte Graffiti an die Wand.","tr":"Duvara grafiti yaptı (püskürttü)."},{"tense":"PERFEKT","de":"Hast du d ssediyorum."},{"tense":"PRÄTERITUM","de":"Er spürte den Schmerz in seinem Rücken.","tr":"Sırtındaki acıyı hissetti."},{"tense":"PERFEKT","de":"Hast du seine Unsicherheit gespürt?","tr":"Onun güvensizliğini/kararsızlığını sezdin mi?"},{"tense":"FUTUR I","de":"Du wirst die Auswirkungen bald spüren.","tr":"Etkilerini yakında hissedeceksin."},{"tense":"KONJ II","de":"Ich würde den Wind gerne auf meiner Haut spüren.","tr":"Rüzgarı tenimde hissetmeyi isterdim."}]},{"category":"ÜBER + AKK / HABEN","verb":"staunen","turkish":"hayret etmek / şaşırmak","prateritum_form":"staunte","partizip2":"gestaunt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich staune immer wieder über seine Energie.","tr":"Onun enerjisine her seferinde hayret ediyorum."},{"tense":"PRÄTERITUM","de":"Alle staunten über das Feuerwerk.","tr":"Herkes havai fişeklere hayranlıkla şaşırdı."},{"tense":"PERFEKT","de":"Hast du über die hohen Preise gestaunt?","tr":"Yüksek fiyatlara şaşırdın mı?"},{"tense":"FUTUR I","de":"Ihr werdet über meine Fortschritte staunen.","tr":"İlerlememe hayret edeceksiniz."},{"tense":"KONJ II","de":"Ich würde nicht schlecht staunen, eğer o gelirse.","tr":"Eğer gelirse epey şaşırırdım."}]},{"category":"AKK / HABEN (DÜZENSİZ)","verb":"stechen","turkish":"batırmak / sokmak (böcek vb.) / saplamak","prateritum_form":"stach","partizip2":"gestochen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Eine Biene sticht ihn in den Arm. (du stichst / er sticht)","tr":"Bir arı onu kolundan sokuyor."},{"tense":"PRÄTERITUM","de":"Er stach sich mit der Nadel in den Finger.","tr":"Parmağına iğne battı/batırdı."},{"tense":"PERFEKT","de":"Hat dich eine Mücke gestochen?","tr":"Seni sivrisinek mi soktu?"},{"tense":"FUTUR I","de":"Die Sonne wird heute wieder kräftig stechen. (Deyim)","tr":"Güneş bugün yine fena yakacak (iğne gibi batacak)."},{"tense":"KONJ II","de":"Ich würde mir kein Tattoo stechen lassen.","tr":"Dövme yaptırmazdım (iğneletmezdim)."}]},{"category":"AKK / NOM / HABEN","verb":"stecken","turkish":"sokmak / yerleştirmek / içinde bulunmak","prateritum_form":"steckte","partizip2":"gesteckt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich stecke den Schlüssel ins Schloss.","tr":"Anahtarı kilide sokuyorum."},{"tense":"PRÄTERITUM","de":"Er steckte in großen Schwierigkeiten.","tr":"Büyük zorluklar içindeydi."},{"tense":"PERFEKT","de":"Wo hast du den ganzen Tag gesteckt?","tr":"Bütün gün nerelere saklandın/neredeydin?"},{"tense":"FUTUR I","de":"Wir werden viel Arbeit in das Projekt stecken.","tr":"Projeye çok emek vereceğiz (sokacağız)."},{"tense":"KONJ II","de":"Ich würde nicht so viel Geld in dieses Auto stecken.","tr":"Bu arabaya bu kadar çok para yatırmazdım (sokmazdım)."}]},{"category":"NOMINATIV / HABEN (DÜZENSİZ)","verb":"stehen","turkish":"durmak / ayakta durmak / (giysi) yakışmak","prateritum_form":"stand","partizip2":"gestanden","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Auto steht vor der Tür. / Das Kleid steht dir gut.","tr":"Araba kapının önünde duruyor. / Elbise sana yakışıyor."},{"tense":"PRÄTERITUM","de":"Er stand stundenlang an der Bushaltestelle.","tr":"Otobüs durağında saatlerce bekledi (durdu)."},{"tense":"PERFEKT","de":"Ich habe schon immer zu meiner Meinung gestanden.","tr":"Fikrimin arkasında her zaman durdum."},{"tense":"FUTUR I","de":"Wir werden Ihnen zur Seite stehen.","tr":"Yanınızda olacağız (size destek olacağız)."},{"tense":"KONJ II","de":"Ich würde jetzt lieber im Schatten stehen.","tr":"Şu an gölgede durmayı tercih ederdim."}]},{"category":"DAT / AKK / HABEN (DÜZENSİZ)","verb":"stehlen","turkish":"çalmak / hırsızlık yapmak","prateritum_form":"stahl","partizip2":"gestohlen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er stiehlt alles, was nicht festgenagelt ist. (du stiehlst)","tr":"Çivilenmemiş her şeyi çalıyor."},{"tense":"PRÄTERITUM","de":"Jemand stahl mein Fahrrad in der Nacht.","tr":"Gece birisi bisikletimi çaldı."},{"tense":"PERFEKT","de":"Ihm wurde die Brieftasche gestohlen.","tr":"Onun cüzdanı çalındı."},{"tense":"FUTUR I","de":"Man wird dich erwischen, eğer du stiehlst.","tr":"Çalarsan seni yakalayacaklar."},{"tense":"KONJ II","de":"Ich würde niemals etwas stehlen.","tr":"Asla bir şey çalmazdım."}]},{"category":"NOMINATIV / SEIN (DÜZENSİZ)","verb":"steigen","turkish":"yükselmek / tırmanmak / binmek","prateritum_form":"stieg","partizip2":"gestiegen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Die Preise steigen jedes Jahr.","tr":"Fiyatlar her yıl yükseliyor."},{"tense":"PRÄTERITUM","de":"Er stieg auf den höchsten Berg.","tr":"En yüksek dağa tırmandı."},{"tense":"PERFEKT","de":"Bist du schon in den Zug gestiegen?","tr":"Trene bindin mi?"},{"tense":"FUTUR I","de":"Die Temperatur wird morgen steigen.","tr":"Sıcaklık yarın yükselecek."},{"tense":"KONJ II","de":"Das Interesse würde steigen, wenn es billiger wäre.","tr":"Daha ucuz olsaydı ilgi artardı."}]},{"category":"AKK / REFL / HABEN","verb":"steigern","turkish":"artırmak / yükseltmek","prateritum_form":"steigerte","partizip2":"gesteigert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir steigern unsere Produktion.","tr":"Üretimimizi artırıyoruz."},{"tense":"PRÄTERITUM","de":"Er steigerte seine Leistung im zweiten Satz.","tr":"İkinci sette performansını artırdı."},{"tense":"PERFEKT","de":"Haben die Firmen ihre Gewinne gesteigert?","tr":"Şirketler kârlarını artırdılar mı?"},{"tense":"FUTUR I","de":"Du wirst dich noch steigern müssen.","tr":"Kendini daha da geliştirmen/artırman gerekecek."},{"tense":"KONJ II","de":"Ich würde die Qualität steigern, um mehr zu verkaufen.","tr":"Daha fazla satmak için kaliteyi artırırdım."}]},{"category":"AKK / REFL / HABEN","verb":"stellen","turkish":"koymak (dikine) / sormak / kurmak (saat)","prateritum_form":"stellte","partizip2":"gestellt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich stelle die Flasche auf den Tisch.","tr":"Şişeyi masanın üstüne koyuyorum (dik bir şekilde)."},{"tense":"PRÄTERITUM","de":"Darf ich dir eine Frage stellen?","tr":"Sana bir soru sorabilir miyim?"},{"tense":"PERFEKT","de":"Hast du den Wecker auf sieben Uhr gestellt?","tr":"Alarmı saat yediye kurdun mu?"},{"tense":"FUTUR I","de":"Er wird sich der Herausforderung stellen. (Deyim)","tr":"Zorlukla yüzleşecek (meydan okumayı kabul edecek)."},{"tense":"KONJ II","de":"Ich würde die Vase lieber ins Regal stellen.","tr":"Vazoyu rafa koymayı tercih ederdim."}]},{"category":"NOMINATIV / SEIN (DÜZENSİZ)","verb":"sterben","turkish":"ölmek","prateritum_form":"starb","partizip2":"gestorben","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Die Hoffnung stirbt zuletzt. (du stirbst / er stirbt)","tr":"Umut en son ölür."},{"tense":"PRÄTERITUM","de":"Sein Großvater starb vor zwei Jahren.","tr":"Büyükbabası iki yıl önce öldü."},{"tense":"PERFEKT","de":"Ist der Hund an Altersschwäche gestorben?","tr":"Köpek yaşlılıktan mı öldü?"},{"tense":"FUTUR I","de":"Ohne Wasser werden die Pflanzen sterben.","tr":"Su olmadan bitkiler ölecek."},{"tense":"KONJ II","de":"Ich würde vor Scham sterben, wenn das passierte.","tr":"Bu olsaydı utancımdan ölürdüm."}]},{"category":"AKKUSATIV / HABEN","verb":"steuern","turkish":"yönetmek / kontrol etmek / dümen kullanmak","prateritum_form":"steuerte","partizip2":"gesteuert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Pilot steuert das Flugzeug sicher.","tr":"Pilot uçağı güvenli bir şekilde yönetiyor."},{"tense":"PRÄTERITUM","de":"Er steuerte den Wagen direkt in die Garage.","tr":"Arabayı doğruca garaja sürdü/yöneltti."},{"tense":"PERFEKT","de":"Hast du die Drohne alleine gesteuert?","tr":"İHA'yı tek başına mı uçurdun/yönettin?"},{"tense":"FUTUR I","de":"Ein Computer wird die Rakete steuern.","tr":"Füzeyi bir bilgisayar yönetecek."},{"tense":"KONJ II","de":"Ich würde das Schiff gerne mal steuern.","tr":"Gemiyi bir kez olsun yönetmeyi (dümen kullanmayı) isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"stiften","turkish":"bağışlamak (kurum için) / neden olm ze.","tr":"Herkes sıcaktan ofladı/şikayetle inledi."},{"tense":"PERFEKT","de":"Warum hast du gerade so laut gestöhnt?","tr":"Neden az önce o kadar sesli inledin/ofladın?"},{"tense":"FUTUR I","de":"Die Schüler werden über die Hausaufgaben stöhnen.","tr":"Öğrenciler ödevler yüzünden oflayıp puflayacaklar."},{"tense":"KONJ II","de":"Ich würde auch stöhnen, wenn ich so viel arbeiten müsste.","tr":"Bu kadar çok çalışmak zorunda kalsaydım ben de oflardım."}]},{"category":"AKK / NOM / HABEN","verb":"stoppen","turkish":"durdurmak / durmak","prateritum_form":"stoppte","partizip2":"gestoppt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Schiedsrichter stoppt das Spiel.","tr":"Hakem oyunu durduruyor."},{"tense":"PRÄTERITUM","de":"Der Bus stoppte an der roten Ampel.","tr":"Otobüs kırmızı ışıkta durdu."},{"tense":"PERFEKT","de":"Wer hat die Zeit beim Rennen gestoppt?","tr":"Yarışta süreyi (kronometreyi) kim tuttu/durdurdu?"},{"tense":"FUTUR I","de":"Niemand wird ihn stoppen können.","tr":"Kimse onu durduramayacak."},{"tense":"KONJ II","de":"Ich würde die Maschine sofort stoppen.","tr":"Makineyi hemen durdururdum."}]},{"category":"AKKUSATIV / HABEN","verb":"stören","turkish":"rahatsız etmek / bozmak / engel olmak","prateritum_form":"störte","partizip2":"gestört","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Störe ich dich gerade beim Lesen?","tr":"Şu an okurken seni rahatsız mı ediyorum?"},{"tense":"PRÄTERITUM","de":"Der Lärm störte meine Konzentration.","tr":"Gürültü konsantrasyonumu bozdu."},{"tense":"PERFEKT","de":"Hat dich sein Verhalten sehr gestört?","tr":"Onun davranışı seni çok rahatsız etti mi?"},{"tense":"FUTUR I","de":"Hoffentlich wird niemand unsere Ruhe stören.","tr":"Umarım kimse huzurumuzu bozmayacak/bozmaz."},{"tense":"KONJ II","de":"Es würde mich nicht stören, wenn du rauchst.","tr":"Sigara içmen beni rahatsız etmezdi."}]},{"category":"AKK / REFL / HABEN (DÜZENSİZ)","verb":"stoßen","turkish":"itmek / çarpmak / toslamak","prateritum_form":"stieß","partizip2":"gestoßen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er stößt die Tür kräftig auf. (du stößt)","tr":"Kapıyı sertçe (iterek) açıyor."},{"tense":"PRÄTERITUM","de":"Ich stieß mich mit dem Knie am Tisch.","tr":"Dizimi masaya çarptım."},{"tense":"PERFEKT","de":"Sind wir auf ein Problem gestoßen? (Deyim - sein)","tr":"Bir problemle mi karşılaştık? (Çarptık mı?)"},{"tense":"FUTUR I","de":"Du wirst ihn nur vor den Kopf stoßen. (Deyim)","tr":"Onu sadece kıracaksın/gücendireceksin."},{"tense":"KONJ II","de":"Ich würde nicht so fest stoßen.","tr":"Bu kadar sert itmezdim."}]},{"category":"AKKUSATIV / HABEN","verb":"strafen","turkish":"cezalandırmak","prateritum_form":"strafte","partizip2":"gestraft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Schicksal straft ihn für seine Taten.","tr":"Kader onu yaptıkları için cezalandırıyor."},{"tense":"PRÄTERITUM","de":"Der Lehrer strafte den Schüler mit Ignoranz.","tr":"Öğretmen öğrenciyi görmezden gelerek cezalandırdı."},{"tense":"PERFEKT","de":"Bist du für deine Lügen gestraft worden?","tr":"Yalanların için cezalandırıldın mı?"},{"tense":"FUTUR I","de":"Gott wird die Ungerechten strafen.","tr":"Tanrı adaletsizleri cezalandıracak."},{"tense":"KONJ II","de":"Ich würde niemanden so hart strafen.","tr":"Kimseyi bu kadar ağır cezalandırmazdım."}]},{"category":"NOMINATIV / HABEN","verb":"strahlen","turkish":"parlamak / ışık saçmak / radyasyon yaymak","prateritum_form":"strahlte","partizip2":"gestrahlt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Sonne strahlt am blauen Himmel.","tr":"Mavi gökyüzünde güneş parlıyor."},{"tense":"PRÄTERITUM","de":"Sie strahlte über das ganze Gesicht vor Freude.","tr":"Mutluluktan yüzü gülüyordu (parlıyordu)."},{"tense":"PERFEKT","de":"Hat der Reaktor radioaktiv gestrahlt?","tr":"Reaktör radyoaktif sızıntı/ışın yaydı mı?"},{"tense":"FUTUR I","de":"Deine Augen werden strahlen, wenn du es siehst.","tr":"Gördüğünde gözlerin parlayacak."},{"tense":"KONJ II","de":"Ich würde auch so strahlen, eğer ich gewonnen hätte.","tr":"Kazansaydım ben de böyle parlardım/gülerdim."}]},{"category":"NOMINATIV / HABEN (AYRILAN)","verb":"strammstehen","turkish":"hazırolda beklemek","prateritum_form":"stand stramm","partizip2":"strammgestanden","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Soldaten stehen vor dem General stramm.","tr":"Askerler generalin önünde hazırolda bekliyorlar."},{"tense":"PRÄTERITUM","de":"Er stand stramm, als die Nationalhymne erklang.","tr":"Milli marş çaldığında hazırolda durdu."},{"tense":"PERFEKT","de":"Hast du früher oft strammstehen müssen?","tr":"Eskiden çok hazırolda beklemek zorunda kaldın mı?"},{"tense":"FUTUR I","de":"Ihr werdet morgen beim Appell strammstehen.","tr":"Yarın içtimada hazırolda bekleyeceksiniz."},{"tense":"KONJ II","de":"Ich würde nicht strammstehen, eğer ich kein Soldat wäre.","tr":"Asker olmasaydım hazırolda durmazdım."}]},{"category":"NOMINATIV / SEIN","verb":"stranden","turkish":"karaya oturmak / yolda kalmak","prateritum_form":"strandete","partizip2":"gestrandet","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Ein Wal strandet an der Küste.","tr":"Bir balina kıyıda karaya vuruyor."},{"tense":"PRÄTERITUM","de":"Das Schiff strandete bei schwerem Sturm.","tr":"Gemi şiddetli fırtınada karaya oturdu."},{"tense":"PERFEKT","de":"Wir sind am Flughafen gestrandet. (Deyim)","tr":"Havalimanında mahsur kaldık (yolda kaldık)."},{"tense":"FUTUR I","de":"Ohne Geld wirst du in der Fremde stranden.","tr":"Parasız yabancı bir yerde mahsur kalacaksın."},{"tense":"KONJ II","de":"Ich würde nicht gerne auf einer einsamen Insel stranden.","tr":"Issız bir adada mahsur kalmayı istemezdim."}]},{"category":"NACH + DAT / HABEN","verb":"streben","turkish":"çabalamak / hedeflemek / (bir şeye) can atmak","prateritum_form":"strebte","partizip2":"gestrebt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er strebt nach Macht und Erfolg.","tr":"Güç ve başarı için çabalıyor."},{"tense":"PRÄTERITUM","de":"Sie strebte immer nach Perfektion.","tr":"Daima mükemmeliyetçiliği hedefledi/çabaladı."},{"tense":"PERFEKT","de":"Hast du schon immer nach Unabhängigkeit gestrebt?","tr":"Her zaman bağımsızlık için mi çabaladın?"},{"tense":"FUTUR I","de":"Die Menschheit wird nach Frieden streben.","tr":"İnsanlık barış için çaba gösterecek."},{"tense":"KONJ II","de":"Ich würde nach mehr Glück im Leben streben.","tr":"Hayatta daha fazla mutluluk için çabalardım."}]},{"category":"AKK / REFL / HABEN","verb":"strecken","turkish":"uzatmak / germek / (sayıyı/süreyi) yaymak","prateritum_form":"streckte","partizip2":"gestreckt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich strecke mich nach dem Aufstehen.","tr":"Kalktıktan sonra geriniyorum."},{"tense":"PRÄTERITUM","de":"Er streckte mir die Hand entgegen.","tr":"Elini bana (uzatıp) verdi."},{"tense":"PERFEKT","de":"Hast du deine Beine mal richtig gestreckt?","tr":"Bacaklarını iyice gerdin mi?"},{"tense":"FUTUR I","de":"Wir werden die Zahlung über drei Monate strecken.","tr":"Ödemeyi üç aya yayacağız/uzatacağız."},{"tense":"KONJ II","de":"Ich würde mich nicht so weit aus dem Fenster strecken. (Deyim)","tr":"Riskli işlere bu kadar kalkışmazdım (pencereden sarkmazdım)."}]},{"category":"AKK / HABEN (DÜZENSİZ)","verb":"streichen","turkish":"boyamak / sürmek (ekmeğe vb.) / silmek-çizmek","prateritum_form":"strich","partizip2":"gestrichen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich streiche die Wand hellblau.","tr":"Duvarı açık maviye boyuyorum."},{"tense":"PRÄTERITUM","de":"Er strich die Butter auf das Brot.","tr":"Ekmeğe tereyağı sürdü."},{"tense":"PERFEKT","de":"Hat der Chef den Termin gestrichen?","tr":"Patron randevuyu iptal mi etti (çizdi mi)?"},{"tense":"FUTUR I","de":"Wir werden deinen Namen von der Liste streichen.","tr":"Adını listeden sileceğiz/çıkaracağız."},{"tense":"KONJ II","de":"Ich würde das Haus erst im Sommer streichen.","tr":"Evi ancak yazın boyardım."}]},{"category":"NOMINATIV / HABEN","verb":"streiken","turkish":"grev yapmak / çalışmayı reddetmek","prateritum_form":"streikte","partizip2":"gestreikt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Lokführer streiken heute wieder.","tr":"Makinistler bugün yine grev yapıyorlar."},{"tense":"PRÄTERITUM","de":"Das Personal streikte für höhere Löhne.","tr":"Personel daha yüksek ücretler için grev yaptı."},{"tense":"PERFEKT","de":"Hat mein Computer schon wieder gestreikt? (Deyim)","tr":"Bilgisayarım yine mi bozuldu (çalışmayı reddetti)?"},{"tense":"FUTUR I","de":"Die Arbeiter werden am Montag streiken.","tr":"İşçiler Pazartesi günü grev yapacaklar."},{"tense":"KONJ II","de":"Ich würde auch streiken, wenn die Bedingungen so schlecht wären.","tr":"Şartlar bu kadar kötü olsaydı ben de grev yapardım."}]},{"category":"REFL / MIT + DAT / HABEN (DÜZENSİZ)","verb":"streiten (sich)","turkish":"tartışmak / kavga etmek","prateritum_form":"stritt","partizip2":"gestritten","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie streiten sich ständig um das Geld.","tr":"Para için sürekli tartışıyorlar."},{"tense":"PRÄTERITUM","de":"Er stritt lautstark mit seinem Nachbarn.","tr":"Komşusuyla yüksek sesle kavga etti."},{"tense":"PERFEKT","de":"Habt ihr euch schon wieder gestritten?","tr":"Yine mi kavga ettiniz?"},{"tense":"FUTUR I","de":"Sie werden sich wegen jeder Kleinigkeit streiten.","tr":"Her küçük şey için tartışacaklar."},{"tense":"KONJ II","de":"Ich würde mich nicht wegen so etwas streiten.","tr":"Böyle bir şey için kavga etmezdim."}]},{"category":"NOMINATIV / SEIN","verb":"strömen","turkish":"akmak / sel gibi gelmek","prateritum_form":"strömte","partizip2":"geströmt","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Das Wasser strömt durch das Tal.","tr":"Su vadi boyunca akıyor."},{"tense":"PRÄTERITUM","de":"Menschenmassen strömten in das Stadion.","tr":"İnsan yığınları stadyuma akın etti."},{"tense":"PERFEKT","de":"Ist das Blut aus der Wunde geströmt?","tr":"Yaradan kan
