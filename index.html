çede vızıldıyorlar."},{"tense":"PRÄTERITUM","de":"Er summte leise ein Lied vor sich hin.","tr":"Kendi kendine alçak sesle bir şarkı mırıldandı."},{"tense":"PERFEKT","de":"Hast du diese Melodie gerade gesummt?","tr":"Az önce bu melodiyi mi mırıldandın?"},{"tense":"FUTUR I","de":"Das Radio wird bald nur noch summen. (Bozulma anlamında)","tr":"Radyo yakında sadece vızıldayacak/ses çıkaracak."},{"tense":"KONJ II","de":"Ich würde mitsummen, eğer ich den Text wüsste.","tr":"Sözleri bilseydim eşlik ederdim (mırıldanırdım)."}]},{"category":"NOMINATIV / HABEN","verb":"sündigen","turkish":"günah işlemek / hata yapmak","prateritum_form":"sündigte","partizip2":"gesündigt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wer sündigt, muss um Vergebung bitten.","tr":"Günah işleyen af dilemelidir."},{"tense":"PRÄTERITUM","de":"Er sündigte gegen die Verkehrsregeln.","tr":"Trafik kurallarına karşı hata yaptı (ihlal etti)."},{"tense":"PERFEKT","de":"Ich habe heute mit Schokolade gesündigt. (Deyimsel)","tr":"Bugün çikolata yiyerek (diyeti) bozdum/günah işledim."},{"tense":"FUTUR I","de":"Du wirst sündigen, wenn du das tust.","tr":"Bunu yaparsan günah işlemiş/hata yapmış olacaksın."},{"tense":"KONJ II","de":"Ich würde nicht so leichtfertig sündigen.","tr":"Bu kadar düşüncesizce günah işlemezdim/hata yapmazdım."}]},{"category":"NOMINATIV / HABEN","verb":"surfen","turkish":"sörf yapmak / internette gezinmek","prateritum_form":"surfte","partizip2":"gesurft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er surft jeden Abend im Internet.","tr":"Her akşam internette geziniyor."},{"tense":"PRÄTERITUM","de":"Wir surften den ganzen Urlaub in Portugal.","tr":"Portekiz'de tüm tatil boyunca sörf yaptık."},{"tense":"PERFEKT","de":"Hast du schon mal auf Hawaii gesurft?","tr":"Hiç Hawaii'de sörf yaptın mı?"},{"tense":"FUTUR I","de":"Ich werde morgen auf der neuen Website surfen.","tr":"Yarın yeni web sitesinde gezineceğim."},{"tense":"KONJ II","de":"Ich würde gerne surfen können.","tr":"Sörf yapabilmeyi isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"tackern","turkish":"zımbalamak","prateritum_form":"tackerte","partizip2":"getackert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Soll ich die Blätter tackern?","tr":"Kağıtları zımbalayayım mı?"},{"tense":"PRÄTERITUM","de":"Er tackerte die Notiz an die Wand.","tr":"Notu duvara zımbaladı."},{"tense":"PERFEKT","de":"Hast du das Dokument schon getackert?","tr":"Belgeyi çoktan zımbaladın mı?"},{"tense":"FUTUR I","de":"Ich werde die Quittungen später tackern.","tr":"Fişleri sonra zımbalayacağım."},{"tense":"KONJ II","de":"Ich würde es tackern, damit es nicht verloren geht.","tr":"Kaybolmasın diye onu zımbalardım."}]},{"category":"AKKUSATIV / HABEN","verb":"tadeln","turkish":"ayıplamak / kınamak / azarlamak","prateritum_form":"tadelte","partizip2":"getadelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Lehrer tadelt das Verhalten des Jungen.","tr":"Öğretmen çocuğun davranışını kınıyor/ayıplıyor."},{"tense":"PRÄTERITUM","de":"Man tadelte ihn wegen seiner Unpünktlichkeit.","tr":"Dakik olmadığı için onu kınadılar/azarladılar."},{"tense":"PERFEKT","de":"Wurdest du schon mal für deine Arbeit getadelt?","tr":"İşin için hiç kınandın mı (negatif eleştiri aldın mı)?"},{"tense":"FUTUR I","de":"Niemand wird dich dafür tadeln.","tr":"Kimse seni bunun için ayıplamayacak."},{"tense":"KONJ II","de":"Ich würde ihn nicht so streng tadeln.","tr":"Onu bu kadar sert kınamazdım."}]},{"category":"NOMINATIV / HABEN","verb":"tafeln","turkish":"ziyafet çekmek / şölen yapmak","prateritum_form":"tafelte","partizip2":"getafelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Herrschaften tafeln im großen Saal.","tr":"Beyler büyük salonda ziyafet çekiyorlar."},{"tense":"PRÄTERITUM","de":"Wir tafelten bis spät in die Nacht.","tr":"Gecenin geç saatlerine kadar şölen yaptık/yemek yedik."},{"tense":"PERFEKT","de":"Haben die Gäste schon zu Ende getafelt?","tr":"Misafirler ziyafeti bitirdi mi?"},{"tense":"FUTUR I","de":"Wir werden am Hochzeitstag fürstlich tafeln.","tr":"Düğün gününde krallara layık bir ziyafet çekeceğiz."},{"tense":"KONJ II","de":"Ich würde gerne jeden Tag so opulent tafeln.","tr":"Her gün böyle görkemli ziyafet çekmek isterdim."}]},{"category":"NOMINATIV / HABEN","verb":"tagen","turkish":"toplantı yapmak (kurul vb.) / şafak sökmek","prateritum_form":"tagte","partizip2":"getagt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Vorstand tagt heute im Konferenzraum.","tr":"Yönetim kurulu bugün konferans salonunda toplanıyor."},{"tense":"PRÄTERITUM","de":"Die Kommission tagte die ganze Woche.","tr":"Komisyon bütün hafta toplantı yaptı."},{"tense":"PERFEKT","de":"Es hat bereits getagt, als wir aufbrachen. (Hava aydınlandı)","tr":"Biz yola çıktığımızda şafak çoktan sökmüştü."},{"tense":"FUTUR I","de":"Man wird über dieses Thema morgen tagen.","tr":"Bu konu üzerine yarın toplantı yapılacak."},{"tense":"KONJ II","de":"Wenn der Rat tagen würde, wüssten wir mehr.","tr":"Konsey toplansaydı daha fazlasını bilirdik."}]},{"category":"NOMINATIV / HABEN","verb":"tagträumen","turkish":"gündüz düşü kurmak / hayallere dalmak","prateritum_form":"tagträumte","partizip2":"getagträumt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie tagträumt oft während der Arbeit.","tr":"Çalışırken sık sık hayallere dalıyor."},{"tense":"PRÄTERITUM","de":"Er tagträumte von einer Reise um die Welt.","tr":"Dünya turuna çıktığının düşlerini kurdu."},{"tense":"PERFEKT","de":"Hast du heute schon wieder nur getagträumt?","tr":"Bugün yine sadece hayallere mi daldın?"},{"tense":"FUTUR I","de":"Sie wird den ganzen Nachmittag tagträumen.","tr":"Bütün öğleden sonra hayallere dalacak."},{"tense":"KONJ II","de":"Ich würde nicht tagträumen, wenn ich viel zu tun hätte.","tr":"Yapacak çok işim olsaydı hayallere dalmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"takten","turkish":"tempolu hale getirmek / ritimle düzenlemek","prateritum_form":"taktete","partizip2":"getaktet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Maschine taktet die Produktion.","tr":"Makine üretimi ritmik bir tempoya sokuyor."},{"tense":"PRÄTERITUM","de":"Er taktete seine Schritte zur Musik.","tr":"Adımlarını müziğin temposuna uydurdu."},{"tense":"PERFEKT","de":"Ist der Prozess gut getaktet worden?","tr":"Süreç iyi bir tempoya/ritme oturtuldu mu?"},{"tense":"FUTUR I","de":"Wir werden die Züge genauer takten.","tr":"Trenlerin kalkış saatlerini (temposunu) daha hassas düzenleyeceğiz."},{"tense":"KONJ II","de":"Ich würde den Ablauf effizienter takten.","tr":"Akışı daha verimli bir tempoya sokardım."}]},{"category":"AKKUSATIV / HABEN","verb":"tanken","turkish":"yakıt almak / benzin doldurmak","prateritum_form":"tankte","partizip2":"getankt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich tanke meistens an dieser Tankstelle.","tr":"Genelde bu istasyondan yakıt alıyorum."},{"tense":"PRÄTERITUM","de":"Er tankte Diesel statt Benzin.","tr":"Benzin yerine dizel doldurdu."},{"tense":"PERFEKT","de":"Hast du das Auto schon getankt?","tr":"Arabaya yakıt aldın mı/doldurdun mu?"},{"tense":"FUTUR I","de":"Wir werden vor der Reise noch tanken.","tr":"Yolculuktan önce yakıt alacağız."},{"tense":"KONJ II","de":"Ich würde tanken, wenn ich Geld dabei hätte.","tr":"Yanımda para olsaydı yakıt alırdım."}]},{"category":"NOMINATIV / HABEN","verb":"tanzen","turkish":"dans etmek","prateritum_form":"tanzte","partizip2":"getanzt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Tanzt du gerne Tango?","tr":"Tango yapmayı/dans etmeyi sever misin?"},{"tense":"PRÄTERITUM","de":"Sie tanzten die ganze Nacht.","tr":"Bütün gece dans ettiler."},{"tense":"PERFEKT","de":"Hast du schon mal auf einer Hochzeit getanzt?","tr":"Hiç bir düğünde dans ettin mi?"},{"tense":"FUTUR I","de":"Wir werden auf deiner Party tanzen.","tr":"Senin partinde dans edeceğiz."},{"tense":"KONJ II","de":"Ich würde tanzen, eğer mir die Musik gefiele.","tr":"Müziği beğenseydim dans ederdim."}]},{"category":"AKK / REFL / HABEN","verb":"tarnen (sich)","turkish":"kamufle etmek / gizlenmek","prateritum_form":"tarnte","partizip2":"getarnt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Chamäleon tarnt sich perfekt.","tr":"Bukalemun kendini mükemmel şekilde kamufle ediyor."},{"tense":"PRÄTERITUM","de":"Die Soldaten tarnten die Panzer mit Zweigen.","tr":"Askerler tankları dallarla kamufle ettiler."},{"tense":"PERFEKT","de":"Er hat seine wahre Absicht gut getarnt.","tr":"Gerçek niyetini iyi gizledi/kamufle etti."},{"tense":"FUTUR I","de":"Du wirst dich im Wald tarnen müssen.","tr":"Ormanda kendini kamufle etmen gerekecek."},{"tense":"KONJ II","de":"Ich würde mich als Baum tarnen.","tr":"Kendimi bir ağaç olarak kamufle ederdim."}]},{"category":"NACH + DAT / HABEN","verb":"tasten","turkish":"el yordamıyla aramak / dokunarak hissetmek","prateritum_form":"tastete","partizip2":"getastet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich taste im Dunkeln nach dem Lichtschalter.","tr":"Karanlıkta el yordamıyla ışık düğmesini arıyorum."},{"tense":"PRÄTERITUM","de":"Er tastete vorsichtig an der Wand entlang.","tr":"Dikkatlice duvar boyunca (dokunarak) ilerledi."},{"tense":"PERFEKT","de":"Hast du nach deinem Handy in der Tasche getastet?","tr":"Çantanda el yordamıyla telefonunu mu aradın?"},{"tense":"FUTUR I","de":"Wir werden uns langsam vorwärts tasten. (Deyimsel)","tr":"Yavaş yavaş (yolumuzu bularak) ilerleyeceğiz."},{"tense":"KONJ II","de":"Ich würde nicht blind im Dunkeln tasten.","tr":"Karanlıkta körü körüne el yordamıyla aramazdım."}]},{"category":"NOM / HABEN / SEIN","verb":"tauchen","turkish":"dalmak / daldırmak","prateritum_form":"","partizip2":"","hilfsverb":"","examples":[{"tense":"PRÄSENS","de":"Er taucht nach Perlen.","tr":"İnci için dalıyor."},{"tense":"PRÄTERITUM","de":"Sie tauchte den Keks in den Tee.","tr":"Bisküviyi çaya daldırdı."},{"tense":"PERFEKT","de":"Bist du schon mal mit Haien getaucht?","tr":"Hiç köpekbalıkl kseklerde/tahtta) durmak isterdim."}]},{"category":"NOMINATIV / HABEN","verb":"ticken","turkish":"tıkırdamak / (kafa yapısı) çalışmak","prateritum_form":"tickte","partizip2":"getickt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Uhr tickt laut im Wohnzimmer. / Wie tickst du eigentlich?","tr":"Saat salonda yüksek sesle tıkırdıyor. / Sen nasıl düşünüyorsun (kafan nasıl çalışıyor)?"},{"tense":"PRÄTERITUM","de":"Früher tickten die Uhren anders. (Deyimsel)","tr":"Eskiden işler farklı yürürdü (saatler farklı tıkırdardı)."},{"tense":"PERFEKT","de":"Hast du gehört, wie die Bombe getickt hat?","tr":"Bombanın nasıl tıkırdadığını duydun mu?"},{"tense":"FUTUR I","de":"Die Zeit wird gegen uns ticken.","tr":"Zaman aleyhimize işleyecek."},{"tense":"KONJ II","de":"Es würde nicht so nervös ticken, wenn...","tr":"Eğer ... olsaydı bu kadar gergin işlemezdi."}]},{"category":"AKKUSATIV / HABEN","verb":"tilgen","turkish":"borç ödemek (itfa) / silmek / yok etmek","prateritum_form":"tilgte","partizip2":"getilgt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er tilgt seine Schulden monatlich.","tr":"Borçlarını aylık olarak ödüyor (kapatıyor)."},{"tense":"PRÄTERITUM","de":"Man tilgte seinen Namen aus den Akten.","tr":"Adını kayıtlardan sildiler/yok ettiler."},{"tense":"PERFEKT","de":"Hast du den Kredit schon komplett getilgt?","tr":"Krediyi çoktan tamamen kapattın mı?"},{"tense":"FUTUR I","de":"Die Zeit wird die Erinnerung tilgen.","tr":"Zaman hatıraları silecek."},{"tense":"KONJ II","de":"Ich würde die Schuld gerne sofort tilgen.","tr":"Borcu hemen kapatmayı isterdim."}]},{"category":"AKK / AUF + AKK / HABEN","verb":"tippen","turkish":"klavyede yazmak / dokunmak / tahmin etmek (skor vb.)","prateritum_form":"tippte","partizip2":"getippt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich tippe eine E-Mail. / Worauf tippst du beim Spiel?","tr":"Bir e-posta yazıyorum. / Maç için tahminin (skor) ne?"},{"tense":"PRÄTERITUM","de":"Er tippte mir vorsichtig auf PERFEKT","de":"Hast du dich endlich getraut zu fragen?","tr":"Sonunda sormaya cesaret edebildin mi?"},{"tense":"FUTUR I","de":"Du wirst dich schon noch trauen.","tr":"Elbet (yakında) cesaret edeceksin."},{"tense":"KONJ II","de":"Ich würde mich das niemals trauen.","tr":"Buna asla cesaret edemezdim."}]},{"category":"VON + DAT / HABEN","verb":"träumen","turkish":"rüya görmek / hayal kurmak","prateritum_form":"träumte","partizip2":"geträumt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich träume von einem Haus am Meer.","tr":"Deniz kenarında bir ev hayal ediyorum."},{"tense":"PRÄTERITUM","de":"Gestern träumte ich etwas sehr Seltsames.","tr":"Dün çok garip bir rüya gördüm."},{"tense":"PERFEKT","de":"Hast du schlecht geträumt?","tr":"Kötü rüya mı gördün?"},{"tense":"FUTUR I","de":"Wir werden von einer besseren Welt träumen.","tr":"Daha iyi bir dünya hayal edeceğiz."},{"tense":"KONJ II","de":"Ich würde nicht nur träumen, sondern handeln.","tr":"Sadece hayal kurmaz, harekete geçerdim."}]},{"category":"AKK / REFL / HABEN (DÜZENSİZ)","verb":"treffen","turkish":"buluşmak / karşılaşmak / vurmak (hedefi)","prateritum_form":"traf","partizip2":"getroffen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich treffe mich heute mit Freunden. (du triffst)","tr":"Bugün arkadaşlarımla buluşuyorum."},{"tense":"PRÄTERITUM","de":"Der Pfeil traf das Ziel genau in der Mitte.","tr":"Ok hedefi tam ortasından vurdu."},{"tense":"PERFEKT","de":"Hast du ihn zufällig in der Stadt getroffen?","tr":"Onunla şehirde tesadüfen karşılaştın mı?"},{"tense":"FUTUR I","de":"Wir werden eine wichtige Entscheidung treffen. (Deyimsel)","tr":"Önemli bir karar vereceğiz (alacağız)."},{"tense":"KONJ II","de":"Ich würde mich gerne öfter mit dir treffen.","tr":"Seninle daha sık buluşmayı isterdim."}]},{"category":"AKK / HABEN / SEIN (DÜZENSİZ)","verb":"treiben","turkish":"sürüklemek / (spor vb.) yapmak / uğraşmak","prateritum_form":"","partizip2":"","hilfsverb":"","examples":[{"tense":"PRÄSENS", II","de":"Ich würde nicht auf die frische Farbe treten.","tr":"Taze boyaya basmazdım."}]},{"category":"VOR + DAT / HABEN","verb":"triefen","turkish":"damlamak / sırılsıklam olmak","prateritum_form":"triefte","partizip2":"getrieft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Seine Kleidung trieft vor Nässe.","tr":"Kıyafetleri ıslaklıktan damlıyor (sırılsıklam)."},{"tense":"PRÄTERITUM","de":"Der Braten triefte vor Fett.","tr":"Kızartma yağdan damlıyordu (vıcık vıcıktı)."},{"tense":"PERFEKT","de":"Hat deine Nase die ganze Zeit getrieft? (Nezle durumu)","tr":"Burnun bütün vakit aktı mı?"},{"tense":"FUTUR I","de":"Der Regenschirm wird auf den Boden triefen.","tr":"Şemsiye yere damlatacak."},{"tense":"KONJ II","de":"Es würde nicht so triefen, wenn du es abtrocknetest.","tr":"Kurulasaydın bu kadar damlamazdı."}]},{"category":"AKKUSATIV / HABEN (DÜZENSİZ)","verb":"trinken","turkish":"içmek","prateritum_form":"trank","partizip2":"getrunken","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Trinkst du morgens lieber Tee oder Kaffee?","tr":"Sabahları çay mı yoksa kahve mi içmeyi tercih edersin?"},{"tense":"PRÄTERITUM","de":"Er trank das Glas in einem Zug leer.","tr":"Bardağı bir dikişte bitirdi (içti)."},{"tense":"PERFEKT","de":"Hast du heute genug Wasser getrunken?","tr":"Bugün yeterince su içtin mi?"},{"tense":"FUTUR I","de":"Wir werden auf deinen Erfolg trinken.","tr":"Başarının şerefine içeceğiz."},{"tense":"KONJ II","de":"Ich würde jetzt gerne einen Saft trinken.","tr":"Şimdi bir meyve suyu içmeyi isterdim."}]},{"category":"ÜBER + AKK / HABEN","verb":"triumphieren","turkish":"zafer kazanmak / galip gelmek","prateritum_form":"triumphierte","partizip2":"triumphiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Gerechtigkeit triumphiert am Ende immer.","tr":"Adalet sonunda daima zafer kazanır."},{"tense":"PRÄTERITUM","de":"Er triumphierte über seine Rivalen.","tr":"Rakiplerine karşı galip geldi."},{"tense":"PERFEKT","de":"Haben sie im Finale triumphiert?","tr":"Finalde zafer kazandılar mı?"},{"tense":"FUTUR I","de":"Du wirst über deine Ängste triumphieren.","tr":"Korkularına galip geleceksin."},{"tense":"KONJ II","de":"Ich würde nicht zu früh triumphieren.","tr":"Çok erken zafer sarhoşluğuna kapılmazdım (galibiyet kutlamazdım)."}]},{"category":"AKK / NOM / HABEN / SEIN","verb":"trocknen","turkish":"kurumak / kurulamak","prateritum_form":"","partizip2":"","hilfsverb":"","examples":[{"tense":"PRÄSENS","de":"HABEN / SEIN","tr":"Die Wäsche trocknet in der Sonne. (sein) / Ich trockne mir die Hände."},{"tense":"PRÄTERITUM","de":"Sie trocknete ihre Tränen.","tr":"Gözyaşlarını kuruladı/sildi."},{"tense":"PERFEKT","de":"Ist der Boden schon getrocknet? (sein)","tr":"Yer çoktan kurudu mu?"},{"tense":"FUTUR I","de":"Die Farbe wird schnell trocknen.","tr":"Boya hızlıca kuruyacak."},{"tense":"KONJ II","de":"Ich würde das Haar föhnen, damit es schneller trocknet.","tr":"Daha hızlı kuruması için saçıma fön çekerdim."}]},{"category":"NOMINATIV / HABEN","verb":"trommeln","turkish":"davul çalmak / parmakla tıkırdatmak","prateritum_form":"trommelte","partizip2":"getrommelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er trommelt nervös auf den Tisch.","tr":"Gergin bir şekilde masaya (parmaklarıyla) tıkırdatıyor."},{"tense":"PRÄTERITUM","de":"Die Kinder trommelten im Musikunterricht.","tr":"Çocuklar müzik dersinde davul çaldılar."},{"tense":"PERFEKT","de":"Hat es heute Nacht laut auf das Dach getrommelt? (Yağmur için)","tr":"Bugün gece çatıya (yağmur) şiddetle vurdu mu?"},{"tense":"FUTUR I","de":"Wir werden für die neue Kampagne trommeln. (Deyimsel)","tr":"Yeni kampanya için yaygara koparacağız (reklam yapacağız)."},{"tense":"KONJ II","de":"Ich würde nicht so laut trommeln.","tr":"Bu kadar yüksek sesle davul çalmazdım/tıkırdatmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"trösten","turkish":"teselli etmek / avutmak","prateritum_form":"tröstete","partizip2":"getröstet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie tröstet das weinende Kind.","tr":"Ağlayan çocuğu teselli ediyor."},{"tense":"PRÄTERITUM","de":"Er tröstete mich nach dem Unfall.","tr":"Kazadan sonra beni teselli etti."},{"tense":"PERFEKT","de":"Hast du sie wegen des Verlusts getröstet?","tr":"Kayıptan dolayı onu teselli ettin mi?"},{"tense":"FUTUR I","de":"Niemand wird dich so gut trösten können wie sie.","tr":"Kimse seni onun kadar iyi teselli edemeyecek."},{"tense":"KONJ II","de":"Ich würde mich mit Schokolade trösten. (Deyimsel)","tr":"Kendimi çikolatayla avuturdum."}]},{"category":"DATIV / HABEN","verb":"trotzen","turkish":"meydan okumak / direnmek / kafa tutmak","prateritum_form":"trotzte","partizip2":"getrotzt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er trotzt allen Schwierigkeiten.","tr":"Tüm zorluklara meydan okuyor/direniyor."},{"tense":"PRÄTERITUM","de":"Die alte Eiche trotzte dem Sturm.","tr":"Yaşlı meşe fırtınaya direndi."},{"tense":"PERFEKT","de":"Hast du deinem Schicksal getrotzt?","tr":"Kaderine kafa tuttun mu?"},{"tense":"FUTUR I","de":"Wir werden jeder Gefahr trotzen.","tr":"Her türlü tehlikeye göğüs gereceğiz (kafa tutacağız)."},{"tense":"KONJ II","de":"Ich würde dieser Entscheidung trotzen.","tr":"Bu karara direnirdim/kafa tutardım."}]},{"category":"AKKUSATIV / HABEN","verb":"trüben","turkish":"bulandırmak / karartmak / bozmak (neşe vb.)","prateritum_form":"trübte","partizip2":"getrübt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Regen trübt meine Stimmung.","tr":"Yağmur neşemi/modumu bozuyor (karartıyor)."},{"tense":"PRÄTERITUM","de":"Der Schlamm trübte das klare Wasser.","tr":"Çamur berrak suyu bulandırdı."},{"tense":"PERFEKT","de":"Hat nichts eure Freude getrübt?","tr":"Hiçbir şey sevincinizi gölgelemedi (bulandırmadı) mi?"},{"tense":"FUTUR I","de":"Diese Nachricht wird den Abend trüben.","tr":"Bu haber akşamı karartacak/keyfini kaçıracak."},{"tense":"KONJ II","de":"Ich würde die Aussicht nicht trüben wollen.","tr":"Manzarayı (veya geleceği) karartmak istemezdim."}]},{"category":"NOMINATIV / HABEN","verb":"trumpfen","turkish":"kozunu oynamak / üstünlük sağlamak","prateritum_form":"trumpfte","partizip2":"getrumpft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er trumpft mit seinem Fachwissen auf. (Auftrumpfen)","tr":"Uzmanlık bilgisiyle üstünlük sağlıyor (havasını atıyor)."},{"tense":"PRÄTERITUM","de":"Sie trumpfte im letzten Moment mit einem neuen Argument.","tr":"Son anda yeni bir argümanla kozunu oynadı."},{"tense":"PERFEKT","de":"Hast du bei der Verhandlung getrumpft?","tr":"Görüşmede kozunu (etkili kartını) oynadın mı?"},{"tense":"FUTUR I","de":"Wir werden mit Qualität trumpfen.","tr":"Kaliteyle üstünlük sağlayacağız."},{"tense":"KONJ II","de":"Ich würde jetzt noch nicht trumpfen.","tr":"Henüz kozumu oynamazdım."}]},{"category":"REFL / HABEN","verb":"tummeln (sich)","turkish":"kalabalıkta oynaşmak / (bir yerde) toplanmak","prateritum_form":"tummelte","partizip2":"getummelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Viele Touristen tummeln sich am Strand.","tr":"Pek çok turist plajda cirit atıyor/toplanmış."},{"tense":"PRÄTERITUM","de":"Die Kinder tummelten sich auf dem Spielplatz.","tr":"Çocuklar oyun parkında (neşeyle) oynaştılar."},{"tense":"PERFEKT","de":"Hast du dich schon mal in einer Großstadt getummelt?","tr":"Hiç bir büyükşehrin kalabalığına karıştın mı?"},{"tense":"FUTUR I","de":"Morgen werden sich hier Tausende tummeln.","tr":"Yarın burada binlerce kişi toplanacak/bulunacak."},{"tense":"KONJ II","de":"Ich würde mich lieber im Wald tummeln.","tr":"Daha ziyade ormanda vakit geçirmeyi (dolaşmayı) isterdim."}]},{"category":"AKKUSATIV / HABEN (DÜZENSİZ)","verb":"tun","turkish":"yapmak / etmek","prateritum_form":"tat","partizip2":"getan","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Was tust du da? / Es tut mir leid.","tr":"Orada ne yapıyorsun? / Üzgünüm (bana acı veriyor)."},{"tense":"PRÄTERITUM","de":"Er tat alles für seinen Erfolg.","tr":"Başarısı için her şeyi yaptı."},{"tense":"PERFEKT","de":"Ich habe heute noch nichts getan.","tr":"Bugün henüz hiçbir şey yapmadım."},{"tense":"FUTUR I","de":"Du wirst das Richtige tun.","tr":"Doğru olanı yapacaksın."},{"tense":"KONJ II","de":"Ich würde es an deiner Stelle nicht tun.","tr":"Senin yerinde olsam bunu yapmazdım."}]},{"category":"AKK / AUF + AKK / HABEN","verb":"tupfen","turkish":"hafifçe dokunmak / tampon yapmak (tıbbi)","prateritum_form":"tupfte","partizip2":"getupft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie tupft sich das Parfüm auf den Hals.","tr":"Parfümü boynuna hafifçe (dokundurarak) sürüyor."},{"tense":"PRÄTERITUM","de":"Der Arzt tupfte die Wunde vorsichtig ab. (Abtupfen)","tr":"Doktor yarayı dikkatlice (pamukla) temizledi/tampon yaptı."},{"tense":"PERFEKT","de":"Hast du die Soße mit einem Tuch getupft?","tr":"Sosu (lekeyi) bir bezle mi sildin (hafifçe dokunarak)?"},{"tense":"FUTUR I","de":"Ich werde nur ein wenig Farbe darauf tupfen.","tr":"Üzerine sadece biraz renk dokunduracağım."},{"tense":"KONJ II","de":"Ich würde es ganz vorsichtig tupfen.","tr":"Onu çok dikkatli bir şekilde (dokunarak) temizlerdim."}]},{"category":"NOMINATIV / HABEN","verb":"turnen","turkish":"jimnastik yapmak / aletli spor yapmak","prateritum_form":"turnte","partizip2":"geturnt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Schüler turnen in der Sporthalle.","tr":"Öğrenciler spor salonunda jimnastik yapıyorlar."},{"tense":"PRÄTERITUM","de":"Er turnte früher im Verein.","tr":"Eskiden kulüpte jimnastik yapardı."},{"tense":"PERFEKT","de":"Bist du schon mal am Barren geturnt?","tr":"Hiç paralelde jimnastik yaptın mı?"},{"tense":"FUTUR I","de":"Wir werden nächste Woche wieder turnen.","tr":"Gelecek hafta yine jimnastik yapacağız."},{"tense":"KONJ II","de":"Ich würde turnen, eğer ich beweglicher wäre.","tr":"Daha esnek olsaydım jimnastik yapardım."}]},{"category":"NOMINATIV / HABEN","verb":"tuscheln","turkish":"fısıldaşmak (genelde gizli/dedikodu)","prateritum_form":"tuschelte","partizip2":"getuschelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Kollegen tuscheln in der Ecke.","tr":"İş arkadaşları köşede fısıldaşıyorlar."},{"tense":"PRÄTERITUM","de":"Sie tuschelten über die neue Chefin.","tr":"Yeni kadın patron hakkında fısıldaştılar."},{"tense":"PERFEKT","de":"Haben sie die ganze Zeit nur getuschelt?","tr":"Bütün vakit sadece fısıldaştılar mı?"},{"tense":"FUTUR I","de":"Man wird hinter deinem Rücken tuscheln.","tr":"Arkanızdan fısıldaşacaklar."},{"tense":"KONJ II","de":"Ich würde nicht so auffällig tuscheln.","tr":"Bu kadar dikkat çekici şekilde fısıldaşmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"üben","turkish":"alıştırma yapmak / pratik yapmak","prateritum_form":"übte","partizip2":"geübt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Übst du jeden Tag Klavier?","tr":"Her gün piyano çalışıyor musun (pratik yapıyor musun)?"},{"tense":"PRÄTERITUM","de":"Er übte stundenlang für die Prüfung.","tr":"Sınav için saatlerce alıştırma yaptı."},{"tense":"PERFEKT","de":"Hast du genug für den Test geübt?","tr":"Test için yeterince pratik yaptın mı?"},{"tense":"FUTUR I","de":"Wir werden die Aussprache gemeinsam üben.","tr":"Telaffuzu birlikte çalışacağız."},{"tense":"KONJ II","de":"Ich würde mehr üben, wenn ich motiviert wäre.","tr":"Motive olsaydım daha fazla pratik yapardım."}]},{"category":"NOMINATIV / HABEN","verb":"übernachten","turkish":"gecelemek / konaklamak","prateritum_form":"übernachtete","partizip2":"übernachtet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir übernachten in einem kleinen Hotel.","tr":"Küçük bir otelde konaklıyoruz."},{"tense":"PRÄTERITUM","de":"Sie übernachteten bei Freunden in Hamburg.","tr":"Hamburg'da arkadaşlarında gecelediler."},{"tense":"PERFEKT","de":"Hast du schon mal im Zelt übernachtet?","tr":"Hiç çadırda geceledin mi?"},{"tense":"FUTUR I","de":"Ich werde heute bei meiner Schwester übernachten.","tr":"Bugün kız kardeşimde kalacağım (geceleyeceğim)."},{"tense":"KONJ II","de":"Ich würde lieber zu Hause übernachten.","tr":"Evde gelemeyi (kalmayı) tercih ederdim."}]},{"category":"AKKUSATIV / HABEN","verb":"überraschen","turkish":"şaşırtmak / sürpriz yapmak","prateritum_form":"überraschte","partizip2":"überrascht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Du überraschst mich immer wieder.","tr":"Beni her seferinde şaşırtıyorsun."},{"tense":"PRÄTERITUM","de":"Er überraschte sie mit Blumen.","tr":"Ona çiçeklerle sürpriz yaptı."},{"tense":"PERFEKT","de":"Hat dich das Ergebnis überrascht?","tr":"Sonuç seni şaşırttı mı?"},{"tense":"FUTUR I","de":"Wir werden ihn mit einer Party überraschen.","tr":"Ona bir partiyle sürpriz yapacağız."},{"tense":"KONJ II","de":"Ich würde dich gerne überraschen.","tr":"Sana sürpriz yapmayı isterdim."}]},{"category":"AKK / ZU + DAT / HABEN","verb":"überreden","turkish":"ikna etmek (razı etmek)","prateritum_form":"überredete","partizip2":"überredet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er überredet mich zu einer Reise.","tr":"Beni bir yolculuğa (çıkmaya) ikna ediyor/razı ediyor."},{"tense":"PRÄTERITUM","de":"Sie überredete ihn, mitzukommen.","tr":"Birlikte gelmesi için onu ikna etti."},{"tense":"PERFEKT","de":"Hast du deinen Vater überredet?","tr":"Babamı ikna ettin mi?"},{"tense":"FUTUR I","de":"Ich werde dich schon noch überreden.","tr":"Seni elbet ikna edeceğim."},{"tense":"KONJ II","de":"Ich würde mich nicht so leicht überreden lassen.","tr":"Bu kadar kolay ikna olmazdım (razı gelmezdim)."}]},{"category":"AKK / IN + AKK / HABEN","verb":"übersetzen","turkish":"çeviri yapmak (tercüme etmek)","prateritum_form":"übersetzte","partizip2":"übersetzt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich übersetze den Text ins Deutsche.","tr":"Metni Almancaya çeviriyorum."},{"tense":"PRÄTERITUM","de":"Er übersetzte das Buch in drei Sprachen.","tr":"Kitabı üç dile çevirdi."},{"tense":"PERFEKT","de":"Hat sie die Dokumente bereits übersetzt?","tr":"Belgeleri çoktan çevirdi mi?"},{"tense":"FUTUR I","de":"Wir werden den Vertrag morgen übersetzen.","tr":"Sözleşmeyi yarın tercüme edeceğiz."},{"tense":"KONJ II","de":"Ich würde es für dich übersetzen.","tr":"Senin için onu tercüme ederdim."}]},{"category":"AKK / DATIV / HABEN (DÜZENSİZ)","verb":"überweisen","turkish":"havale etmek / (doktor) sevk etmek","prateritum_form":"überwies","partizip2":"überwiesen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich überweise die Miete heute Abend.","tr":"Kirayı bu akşam havale ediyorum."},{"tense":"PRÄTERITUM","de":"Der Arzt überwies mich an einen Spezialisten.","tr":"Doktor beni bir uzmana sevk etti."},{"tense":"PERFEKT","de":"Hast du das Geld schon überwiesen?","tr":"Parayı çoktan havale ettin mi?"},{"tense":"FUTUR I","de":"Die Bank wird den Betrag morgen überweisen.","tr":"Banka tutarı yarın havale edecek."},{"tense":"KONJ II","de":"Ich würde es sofort überweisen, eğer ich könnte.","tr":"Eğer yapabilseydim hemen havale ederdim."}]},{"category":"AKK / VON + DAT / HABEN","verb":"überzeugen","turkish":"inandırmak / ikna etmek (kanıtla)","prateritum_form":"überzeugte","partizip2":"überzeugt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Dein Argument überzeugt mich nicht.","tr":"Argümanın beni ikna etmiyor (inandırmıyor)."},{"tense":"PRÄTERITUM","de":"Er überzeugte alle von seinem Plan.","tr":"Herkesi planına (başaracağına) inandırdı."},{"tense":"PERFEKT","de":"Ich habe mich selbst davon überzeugt.","tr":"Buna kendim (bizzat görerek) ikna oldum."},{"tense":"FUTUR I","de":"Die Qualität wird dich überzeugen.","tr":"Kalite seni ikna edecek (inandıracak)."},{"tense":"KONJ II","de":"Ich würde ihn gerne von der Wahrheit überzeugen.","tr":"Onu gerçeğe inandırmayı isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"umarmen","turkish":"kucaklamak / sarılmak","prateritum_form":"umarmte","partizip2":"umarmt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie umarmen sich zur Begrüßung.","tr":"Selaml rb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich vergesse oft meine Schlüssel. (du vergisst)","tr":"Anahtarlarımı sık sık unutuyorum."},{"tense":"PRÄTERITUM","de":"Er vergaß unseren Hochzeitstag.","tr":"Evlilik yıldönümümüzü unuttu."},{"tense":"PERFEKT","de":"Hast du die Hausaufgaben vergessen?","tr":"Ödevleri unuttun mu?"},{"tense":"FUTUR I","de":"Ich werde dich niemals vergessen.","tr":"Seni asla unutmayacağım."},{"tense":"KONJ II","de":"Ich würde das nicht so schnell vergessen.","tr":"Bunu bu kadar çabuk unutmazdım."}]},{"category":"AKK / MIT + DAT / HABEN (DÜZENSİZ)","verb":"vergleichen","turkish":"karşılaştırmak / kıyaslamak","prateritum_form":"verglich","partizip2":"verglichen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Man kann Äpfel nicht mit Birnen vergleichen.","tr":"Elmalarla armutlar kıyaslanamaz (Deyim)."},{"tense":"PRÄTERITUM","de":"Er verglich die Preise im Internet.","tr":"İnternetteki fiyatları karşılaştırdı."},{"tense":"PERFEKT","de":"Hast du die beiden Angebote verglichen?","tr":"İki teklifi karşılaştırdın mı?"},{"tense":"FUTUR I","de":"Wir werden die Ergebnisse später vergleichen.","tr":"Sonuçları sonra karşılaştıracağız."},{"tense":"KONJ II","de":"Ich würde mich nicht mit anderen vergleichen.","tr":"Kendimi başkalarıyla kıyaslamazdım."}]},{"category":"AKK / REFL / HABEN","verb":"vergrößern","turkish":"büyütmek / genişletmek","prateritum_form":"vergrößerte","partizip2":"vergrößert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Firma vergrößert ihr Team.","tr":"Şirket ekibini büyütüyor."},{"tense":"PRÄTERITUM","de":"Er vergrößerte das Foto am Computer.","tr":"Bilgisayarda fotoğrafı büyüttü."},{"tense":"PERFEKT","de":"Hat sich der Abstand vergrößert?","tr":"Mesafe (aradaki fark) büyüdü mü?"},{"tense":"FUTUR I","de":"Wir werden unsere Wohnung vergrößern.","tr":"Evimizi genişleteceğiz/büyüteceğiz."},{"tense":"KONJ II","de":"Ich würde mein Wissen gerne vergrößern.","tr":"Bilgimi genişletmeyi isterdim."}]},{"category":"AKK / DATIV / HABEN","verb":"verkaufen","turkish":"satmak","prateritum_form":"verkaufte","partizip2":"verkauft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er verkauft sein altes Auto.","tr":"Eski arabasını satıyor."},{"tense":"PRÄTERITUM","de":"Sie verkauften das Haus für viel Geld.","tr":"Evi çok paraya sattılar."},{"tense":"PERFEKT","de":"Hast du deine Seele verkauft? (Deyimsel)","tr":"Ruhunu mu sattın?"},{"tense":"FUTUR I","de":"Ich werde mein Handy auf eBay verkaufen.","tr":"Telefonumu eBay'de satacağım."},{"tense":"KONJ II","de":"Ich würde das niemals verkaufen.","tr":"Bunu asla satmazdım."}]},{"category":"AKKUSATIV / HABEN (DÜZENSİZ)","verb":"verlieren","turkish":"kaybetmek / yitirmek","prateritum_form":"verlor","partizip2":"verloren","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Unsere Mannschaft verliert oft.","tr":"Takımımız sık sık kaybediyor."},{"tense":"PRÄTERITUM","de":"Er verlor seinen Geldbeutel im Park.","tr":"Cüzdanını parkta kaybetti."},{"tense":"PERFEKT","de":"Ich habe den Überblick verloren.","tr":"Genel bakışı (kontrolü/odağı) kaybettim."},{"tense":"FUTUR I","de":"Du wirst dein Ziel nicht verlieren.","tr":"Hedefini (gözden) kaybetmeyeceksin."},{"tense":"KONJ II","de":"Ich würde keine Zeit verlieren.","tr":"Zaman kaybetmezdim."}]},{"category":"AKKUSATIV / HABEN (DÜZENSİZ)","verb":"vermeiden","turkish":"kaçınmak / önlemek / sakınmak","prateritum_form":"vermied","partizip2":"vermieden","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich vermeide unnötigen Stress.","tr":"Gereksiz stresten kaçınıyorum."},{"tense":"PRÄTERITUM","de":"Er vermied jeden Kontakt zu ihm.","tr":"Onunla her türlü temastan kaçındı."},{"tense":"PERFEKT","de":"Hättest du diesen Fehler vermeiden können?","tr":"Bu hatayı önleyebilir miydin (kaçınabilir miydin)?"},{"tense":"FUTUR I","de":"Wir werden Missverständnisse vermeiden.","tr":"Yanlış anlaşılmaları önleyeceğiz."},{"tense":"KONJ II","de":"Ich würde das Risiko vermeiden.","tr":"Riski (riskten) eine Fotos.","tr":"Bana fotoğraflarını gösterdi."},{"tense":"PERFEKT","de":"Das hat uns allen gezeigt, wie stark du bist.","tr":"Bu hepimize senin ne kadar güçlü olduğunu gösterdi."},{"tense":"FUTUR I","de":"Die Zukunft wird es zeigen.","tr":"Gelecek gösterecek."},{"tense":"KONJ II","de":"Ich würde dir gerne meine Stadt zeigen.","tr":"Sana şehrimi göstermeyi isterdim."}]}];

const GROUP_SIZE = 50;
const TOTAL_GROUPS = Math.ceil(ALL_CARDS.length / GROUP_SIZE);
const progress = JSON.parse(localStorage.getItem('fc_progress') || '{}');

let currentGroup = 0;
let currentIndex = 0;
let groupCards = [];
let isFlipped = false;

function saveProgress() {
  localStorage.setItem('fc_progress', JSON.stringify(progress));
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── GROUP GRID ──
function renderGroups() {
  const grid = document.getElementById('groupGrid');
  grid.innerHTML = '';
  for (let g = 0; g < TOTAL_GROUPS; g++) {
    const start = g * GROUP_SIZE + 1;
    const end = Math.min((g + 1) * GROUP_SIZE, ALL_CARDS.length);
    const done = progress[g] || 0;
    const completed = done >= (end - start + 1);
    const btn = document.createElement('button');
    btn.className = 'group-btn' + (completed ? ' completed' : '');
    btn.innerHTML = `
      <span class="gnum">${g + 1}</span>
      <span class="glabel">${start}–${end}</span>
      <span class="gprog">${done > 0 ? done + '/' + (end - start + 1) + ' görüldü' : 'Başlanmadı'}</span>
    `;
    btn.onclick = () => startGroup(g);
    grid.appendChild(btn);
  }
}

function startGroup(g) {
  currentGroup = g;
  currentIndex = 0;
  const start = g * GROUP_SIZE;
  const end = Math.min((g + 1) * GROUP_SIZE, ALL_CARDS.length);
  groupCards = ALL_CARDS.slice(start, end);
  isFlipped = false;
  showScreen('cardScreen');
  renderCard();
}

function goBack() {
  showScreen('groupScreen');
  renderGroups();
}

// ── CARD RENDER ──
function renderCard() {
  const card = groupCards[currentIndex];
  const total = groupCards.length;

  // Progress
  const pct = ((currentIndex + 1) / total * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${currentIndex + 1} / ${total}`;

  // Front
  const cat = card.category || '';
  document.getElementById('frontCategory').textContent = cat;
  document.getElementById('frontCategory').style.display = cat ? 'block' : 'none';
  document.getElementById('frontVerb').textContent = card.verb || '';
  document.getElementById('frontTurkish').textContent = card.turkish || '';

  // Back
  const back = document.getElementById('cardBack');
  let html = '';

  // Conjugation
  if (card.prateritum_form || card.partizip2 || card.hilfsverb) {
    html += `<div class="conj-row">`;
    if (card.prateritum_form) html += `<div class="conj-item"><div class="conj-label">Präteritum</div><div class="conj-val">${card.prateritum_form}</div></div>`;
    if (card.partizip2) html += `<div class="conj-item"><div class="conj-label">Partizip II</div><div class="conj-val">${card.partizip2}</div></div>`;
    if (card.hilfsverb) html += `<div class="conj-item"><div class="conj-label">Hilfsverb</div><div class="conj-val">${card.hilfsverb}</div></div>`;
    html += `</div>`;
  }

  // Examples
  if (card.examples && card.examples.length) {
    html += `<div class="examples-title">Örnek Cümleler</div>`;
    card.examples.forEach(ex => {
      html += `<div class="example">
        <div class="example-tense">${ex.tense}</div>
        <div class="example-de">${ex.de}</div>
        <div class="example-tr">${ex.tr}</div>
      </div>`;
    });
  }

  back.innerHTML = html;

  // Unflip
  const mainCard = document.getElementById('mainCard');
  mainCard.classList.remove('flipped');
  isFlipped = false;

  // Track progress
  const seen = progress[currentGroup] || 0;
  if (currentIndex + 1 > seen) {
    progress[currentGroup] = currentIndex + 1;
    saveProgress();
  }
}

function flipCard() {
  const mainCard = document.getElementById('mainCard');
  isFlipped = !isFlipped;
  mainCard.classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if (currentIndex < groupCards.length - 1) {
    currentIndex++;
    renderCard();
  } else {
    showDone();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard();
  }
}

function showDone() {
  const start = currentGroup * GROUP_SIZE + 1;
  const end = Math.min((currentGroup + 1) * GROUP_SIZE, ALL_CARDS.length);
  document.getElementById('doneMsg').textContent = 
    `${currentGroup + 1}. grubu (${start}–${end}. kartlar) tamamladın! İstersen grubu tekrar çalışabilir ya da başka bir grup seçebilirsin.`;
  showScreen('doneScreen');
}

function repeatGroup() {
  startGroup(currentGroup);
}

// Init
renderGroups();
</script>
</body>
</html>
