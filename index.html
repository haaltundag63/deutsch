<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almanca Fiil Kartları</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #083d44;
    --surface: #0a5260;
    --surface2: #0c6070;
    --border: #1a8595;
    --accent: #a0e8e0;
    --accent2: #6dd6cb;
    --text: #f0fafa;
    --text2: #80ccc5;
    --green: #6dd6cb;
    --red: #f08888;
    --tense-bg: #062f35;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  .header {
    width: 100%;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .header-info {
    font-size: 0.82rem;
    color: var(--text2);
  }

  /* ── GROUP SELECTOR ── */
  .group-screen {
    max-width: 820px;
    width: 100%;
    padding: 48px 24px;
  }
  .group-screen h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    margin-bottom: 8px;
    color: var(--text);
  }
  .group-screen p {
    color: var(--text2);
    margin-bottom: 36px;
    font-size: 0.9rem;
  }
  .group-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }
  .group-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .group-btn:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-2px);
  }
  .group-btn.completed {
    border-color: var(--green);
  }
  .group-btn.completed::after {
    content: '✓';
    position: absolute;
    top: 8px;
    right: 10px;
    color: var(--green);
    font-size: 0.75rem;
    font-weight: 600;
  }
  .group-btn .gnum {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
  }
  .group-btn .glabel {
    font-size: 0.75rem;
    color: var(--text2);
  }
  .group-btn .gprog {
    font-size: 0.7rem;
    color: var(--text2);
    margin-top: 4px;
  }

  /* ── FLASHCARD SCREEN ── */
  .card-screen {
    max-width: 720px;
    width: 100%;
    padding: 24px 24px 32px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 0.78rem;
    color: var(--text2);
    white-space: nowrap;
  }

  /* Card */
  .card-container {
    perspective: 1200px;
    margin-bottom: 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .card {
    position: relative;
    width: 100%;
    flex: 1;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
  }
  .card.flipped {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    text-align: center;
  }
  .card-face.back {
    transform: rotateY(180deg);
    background: var(--surface2);
    align-items: flex-start;
    text-align: left;
    overflow-y: auto;
    justify-content: flex-start;
    padding: 36px 36px;
  }
  .card-category {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent2);
    background: rgba(247,201,106,0.08);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
    font-weight: 600;
  }
  .card-verb {
    font-family: 'DM Serif Display', serif;
    font-size: 3rem;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 16px;
  }
  .card-turkish {
    font-size: 1.15rem;
    color: var(--text2);
    font-style: italic;
  }
  .tap-hint {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.72rem;
    color: var(--text2);
    opacity: 0.6;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* Back face */
  .conj-row {
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
    width: 100%;
    flex-wrap: wrap;
  }
  .conj-item {
    background: var(--tense-bg);
    border-radius: 10px;
    padding: 14px 18px;
    flex: 1;
    min-width: 100px;
  }
  .conj-label {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .conj-val {
    font-size: 1.15rem;
    color: var(--text);
    font-weight: 500;
  }
  .examples-title {
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 14px;
    font-weight: 600;
  }
  .example {
    margin-bottom: 16px;
    border-left: 3px solid var(--border);
    padding-left: 16px;
  }
  .example-tense {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .example-de {
    font-size: 1.08rem;
    color: var(--text);
    margin-bottom: 4px;
  }
  .example-tr {
    font-size: 1rem;
    color: var(--text2);
    font-style: italic;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .btn {
    padding: 12px 28px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    transition: all 0.18s;
  }
  .btn-flip {
    background: var(--accent);
    color: #fff;
  }
  .btn-flip:hover { background: #6a59e6; transform: translateY(-1px); }
  .btn-next {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-next:hover { border-color: var(--accent); transform: translateY(-1px); }
  .btn-prev {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-prev:hover { border-color: var(--accent); transform: translateY(-1px); }
  .btn-back {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    font-size: 0.8rem;
    padding: 10px 20px;
  }
  .btn-back:hover { color: var(--text); border-color: var(--text2); }

  .nav-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
  }

  /* Done screen */
  .done-screen {
    max-width: 520px;
    width: 100%;
    padding: 64px 24px;
    text-align: center;
    display: none;
  }
  .done-screen h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    margin-bottom: 12px;
    color: var(--accent2);
  }
  .done-screen p {
    color: var(--text2);
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .done-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-green {
    background: var(--green);
    color: #fff;
  }
  .btn-green:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-purple {
    background: var(--accent);
    color: #fff;
  }
  .btn-purple:hover { opacity: 0.9; transform: translateY(-1px); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.35s ease forwards; }

  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; align-items: center; width: 100%; flex: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>Almanca Fiil Kartları</h1>
  <span class="header-info" id="headerInfo">1000 kart · 20 grup</span>
</div>

<div class="screen active" id="groupScreen">
  <div class="group-screen">
    <h2>Grup Seç</h2>
    <p>Her grup 50 kart içerir. Bir grubu bitirdikten sonra diğerine geçebilirsin.</p>
    <div class="group-grid" id="groupGrid"></div>
  </div>
</div>

<div class="screen" id="cardScreen">
  <div class="card-screen">
    <div class="progress-wrap">
      <button class="btn btn-back" onclick="goBack()">← Gruplar</button>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="progress-text" id="progressText"></span>
    </div>

    <div class="card-container">
      <div class="card" id="mainCard" onclick="flipCard()">
        <div class="card-face front" id="cardFront">
          <div class="card-category" id="frontCategory"></div>
          <div class="card-verb" id="frontVerb"></div>
          <div class="card-turkish" id="frontTurkish"></div>
          <div class="tap-hint">↕ çevirmek için tıkla</div>
        </div>
        <div class="card-face back" id="cardBack">
          <!-- filled dynamically -->
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-prev" onclick="prevCard()">← Önceki</button>
      <button class="btn btn-flip" onclick="flipCard()">Çevir</button>
      <button class="btn btn-next" id="nextBtn" onclick="nextCard()">Sonraki →</button>
    </div>
  </div>
</div>

<div class="screen" id="doneScreen">
  <div class="done-screen">
    <h2>🎉 Grup Tamamlandı!</h2>
    <p id="doneMsg"></p>
    <div class="done-actions">
      <button class="btn btn-green" onclick="repeatGroup()">Grubu Tekrarla</button>
      <button class="btn btn-purple" onclick="goBack()">Grup Seçimine Dön</button>
    </div>
  </div>
</div>

<script>
const ALL_CARDS = [{"category":"VON + DATIV","verb":"abbringen","turkish":"birini bir şeyden vazgeçirmek","prateritum_form":"brachte ab","partizip2":"abgebracht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Niemand bringt mich von meinem Plan ab.","tr":"Kimse beni planımdan vazgeçiremez."},{"tense":"PRÄTERITUM","de":"Er brachte ihn von der riskanten Idee ab.","tr":"Onu bu riskli fikirden vazgeçirdi."},{"tense":"PERFEKT","de":"Hat dich der Teufel von Gott abgebracht?","tr":"Şeytan seni Tanrı'dan uzaklaştırdı mı?"},{"tense":"FUTUR I","de":"Ich werde ihn von diesem Weg abbringen.","tr":"Onu bu yoldan döndüreceğim."},{"tense":"KONJ II","de":"Könntest du ihn von seiner Meinung abbringen?","tr":"Onu fikrinden vazgeçirebilir miydin?"}]},{"category":"AYRILABILIR / SEIN","verb":"abfahren","turkish":"hareket etmek / (araç) kalkmak","prateritum_form":"fuhr ab","partizip2":"abgefahren","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Der Zug fährt pünktlich ab.","tr":"Tren tam vaktinde hareket ediyor."},{"tense":"PRÄTERITUM","de":"Der Bus fuhr vor zehn Minuten ab.","tr":"Otobüs on dakika önce kalktı."},{"tense":"PERFEKT","de":"Wann ist das Schiff abgefahren?","tr":"Gemi ne zaman hareket etti?"},{"tense":"FUTUR I","de":"Wir werden bald abfahren müssen.","tr":"Yakında hareket etmemiz gerekecek."},{"tense":"KONJ II","de":"Wenn wir jetzt abführen, kämen wir rechtzeitig an.","tr":"Şimdi hareket etseydik, vaktinde varırdık."}]},{"category":"VON + DATIV","verb":"abhalten","turkish":"uzak tutmak / mani olmak","prateritum_form":"hielt ab","partizip2":"abgehalten","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Lärm hält mich von der Arbeit ab.","tr":"Gürültü beni çalışmaktan alıkoyuyor."},{"tense":"PRÄTERITUM","de":"Das Wetter hielt uns vom Wandern ab.","tr":"Hava bizi yürüyüş yapmaktan alıkoydu."},{"tense":"PERFEKT","de":"Ich habe ihn von der Kündigung abgehalten.","tr":"Onun istifa etmesine engel oldum."},{"tense":"FUTUR I","de":"Nichts wird mich von meinem Ziel abhalten.","tr":"Hiçbir şey beni hedefimden alıkoyamayacak."},{"tense":"KONJ II","de":"Würdest du ihn davon abhalten?","tr":"Ona engel olur muydun?"}]},{"category":"VON + DATIV","verb":"abhängen","turkish":"bir şeye bağlı/tabi olmak","prateritum_form":"hing ab","partizip2":"abgehangen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Es hängt von deiner Entscheidung ab.","tr":"Bu senin kararına bağlı."},{"tense":"PRÄTERITUM","de":"Alles hing vom Wetter ab.","tr":"Her şey havaya bağlıydı."},{"tense":"PERFEKT","de":"Der Erfolg hat nur vom Timing abgehangen.","tr":"Başarı sadece zamanlamaya bağlıydı."},{"tense":"FUTUR I","de":"Die Preise werden von der Menge abhängen.","tr":"Fiyatlar miktara bağlı olacak."},{"tense":"KONJ II","de":"Das würde ganz von dir abhängen.","tr":"Bu tamamen sana bağlı olurdu."}]},{"category":"AKKUSATIV","verb":"abhängen","turkish":"bir şeyi (asılı yerden) indirmek","prateritum_form":"hängte ab","partizip2":"abgehängt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er hängt das Bild von der Wand ab.","tr":"Resmi duvardan indiriyor."},{"tense":"PRÄTERITUM","de":"Sie hängte die Wäsche ab.","tr":"Çamaşırları (ipten) topladı/indirdi."},{"tense":"PERFEKT","de":"Hast du die Vorhänge schon abgehängt?","tr":"Perdeleri çoktan indirdin mi?"},{"tense":"FUTUR I","de":"Morgen werde ich das Schild abhängen.","tr":"Yarın tabelayı indireceğim."},{"tense":"KONJ II","de":"Ich würde den Kalender jetzt abhängen.","tr":"Takvimi şimdi indirirdim."}]},{"category":"AKKUSATIV","verb":"abheben","turkish":"para çekmek / havalanmak","prateritum_form":"hob ab","partizip2":"abgehoben","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich hebe 100 Euro am Automaten ab.","tr":"Bankamatikten 100 Euro çekiyorum."},{"tense":"PRÄTERITUM","de":"Das Flugzeug hob pünktlich ab.","tr":"Uçak vaktinde havalandı."},{"tense":"PERFEKT","de":"Hast du schon Geld abgehoben?","tr":"Çoktan para çektin mi?"},{"tense":"FUTUR I","de":"Er wird morgen seine Ersparnisse rd heute brennen.","tr":"Güneş bugün yakacak."},{"tense":"KONJ II","de":"Es würde ohne Holz nicht brennen.","tr":"Odun olmadan yanmazdı."}]},{"category":"DATIV + AKK / HABEN","verb":"bringen","turkish":"getirmek","prateritum_form":"brachte","partizip2":"gebracht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich bringe dir ein Glas Wasser.","tr":"Sana bir bardak su getiriyorum."},{"tense":"PRÄTERITUM","de":"Er brachte mir das Buch zurück.","tr":"Kitabı bana geri getirdi."},{"tense":"PERFEKT","de":"Hast du die Unterlagen gebracht?","tr":"Belgeleri getirdin mi?"},{"tense":"FUTUR I","de":"Ich werde dich nach Hause bringen.","tr":"Seni eve götüreceğim (getireceğim)."},{"tense":"KONJ II","de":"Ich würde es dir morgen bringen.","tr":"Onu sana yarın getirirdim."}]},{"category":"REGELMÄSSIG / HABEN","verb":"brüllen","turkish":"kükremek / bağırmak","prateritum_form":"brüllte","partizip2":"gebrüllt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Löwe brüllt im Zoo.","tr":"Aslan hayvanat bahçesinde kükrüyor."},{"tense":"PRÄTERITUM","de":"Er brüllte vor Wut.","tr":"Öfkeden kükredi (bağırdı)."},{"tense":"PERFEKT","de":"Warum hast du so gebrüllt?","tr":"Neden o kadar bağırdın?"},{"tense":"FUTUR I","de":"Er wird uns wieder anbrüllen.","tr":"Bize yine bağıracak."},{"tense":"KONJ II","de":"Ich würde nicht so laut brüllen.","tr":"O kadar yüksek sesle bağırmazdım."}]},{"category":"REGELMÄSSIG / HABEN","verb":"brummen","turkish":"vızıldamak / mırıldanmak","prateritum_form":"brummte","partizip2":"gebrummt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Bär brummt leise.","tr":"Ayı sessizce mırıldanıyor/homurdanıyor."},{"tense":"PRÄTERITUM","de":"Der Motor brummte monoton.","tr":"Motor monoton bir şekilde vızıldadı."},{"tense":"PERFEKT","de":"Mein Kopf hat gestern gebrummt.","tr":"Dün kafam zonkladı (vızıldadı)."},{"tense":"FUTUR I","de":"Die Heizung wird bald brummen.","tr":"Isıtıcı yakında ses yapacak."},{"tense":"KONJ II","de":"Wenn er sauer wäre er Arzt stellt die Diagnose fest.","tr":"Doktor teşhisi koyuyor (tespit ediyor)."},{"tense":"PRÄTERITUM","de":"Ich stellte fest, dass ich meinen Schlüssel vergessen hatte.","tr":"Anahtarımı unuttuğumu fark ettim (saptadım)."},{"tense":"PERFEKT","de":"Haben Sie Mängel festgestellt?","tr":"Herhangi bir kusur tespit ettiniz mi?"},{"tense":"FUTUR I","de":"Die Untersuchung wird die Ursache feststellen.","tr":"Araştırma nedeni saptayacak."},{"tense":"KONJ II","de":"Das würde ich gerne sicher feststellen.","tr":"Bunu kesin olarak saptamak isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"finden","turkish":"bulmak / (fikir) düşünmek","prateritum_form":"fand","partizip2":"gefunden","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich finde meinen Schlüssel nicht.","tr":"Anahtarımı bulamıyorum."},{"tense":"PRÄTERITUM","de":"Wie fandest du den Film?","tr":"Filmi nasıl buldun? (Beğendin mi?)"},{"tense":"PERFEKT","de":"Hast du eine Lösung gefunden?","tr":"Bir çözüm buldun mu?"},{"tense":"FUTUR I","de":"Du wirst sicher einen Job finden.","tr":"Eminim bir iş bulacaksın."},{"tense":"KONJ II","de":"Ich würde es toll finden.","tr":"Bunu harika bulurdum."}]},{"category":"NOM / RICHTUNG / SEIN","verb":"fliegen","turkish":"uçmak / (uçakla) gitmek","prateritum_form":"flog","partizip2":"geflogen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Der Vogel fliegt nach Süden.","tr":"Kuş güneye uçuyor."},{"tense":"PRÄTERITUM","de":"Wir flogen letztes Jahr in die USA.","tr":"Geçen yıl ABD'ye uçtuk."},{"tense":"PERFEKT","de":"Bist du schon mal allein geflogen?","tr":"Hiç yalnız uçtun mu?"},{"tense":"FUTUR I","de":"Wann wirst du nach Hause fliegen?","tr":"Ne zaman eve uçacaksın?"},{"tense":"KONJ II","de":"Ich würde gerne zum Mond fliegen.","tr":"Ay'a uçmayı isterdim."}]},{"category":"VOR + DAT / SEIN","verb":"fliehen","turkish":"kaçmak / firar etmek","prateritum_form":"floh","partizip2":"geflohen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Die Menschen fliehen vor en","examples":[{"tense":"PRÄSENS","de":"Wir setzen das Gespräch morgen fort.","tr":"Görüşmeye yarın devam ediyoruz."},{"tense":"PRÄTERITUM","de":"Der Autor setzte die Serie fort.","tr":"Yazar seriyi devam ettirdi."},{"tense":"PERFEKT","de":"Hast du die Arbeit fortgesetzt?","tr":"İşe devam ettin mi?"},{"tense":"FUTUR I","de":"Sie werden die Tradition fortsetzen.","tr":"Geleneği sürdürecekler."},{"tense":"KONJ II","de":"Ich würde die Reise gerne fortsetzen.","tr":"Seyahate devam etmeyi isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"fotografieren","turkish":"fotoğraf çekmek","prateritum_form":"fotografierte","partizip2":"fotografiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich fotografiere gerne Tiere.","tr":"Hayvanları fotoğraflamayı severim."},{"tense":"PRÄTERITUM","de":"Er fotografierte die schöne Aussicht.","tr":"Güzel manzarayı fotoğrafladı."},{"tense":"PERFEKT","de":"Hast du die Dokumente fotografiert?","tr":"Belgelerin fotoğrafını çektin mi?"},{"tense":"FUTUR I","de":"Wirst du uns auf der Hochzeit fotografieren?","tr":"Düğünde bizi çekecek misin?"},{"tense":"KONJ II","de":"Ich würde alles fotografieren, wenn ich könnte.","tr":"Elimde olsa her şeyi fotoğraflardım."}]},{"category":"AKK / NACH + DAT / HABEN","verb":"fragen","turkish":"sormak","prateritum_form":"fragte","partizip2":"gefragt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich frage den Polizisten nach dem Weg.","tr":"Polise yolu soruyorum."},{"tense":"PRÄTERITUM","de":"Sie fragte mich, ob ich Zeit hätte.","tr":"Bana vaktim olup olmadığını sordu."},{"tense":"PERFEKT","de":"Hast du ihn nach seiner Meinung gefragt?","tr":"Ona fikrini sordun mu?"},{"tense":"FUTUR I","de":"Ich werde morgen den Chef fragen.","tr":"Yarın patrona soracağım."},{"tense":"KONJ II","de":"Darf ich dich etwas fragen?","tr":"Sana bir şey sorabilir miyim?"}]},{"category":"NOMINATIV / SEIN","verb":"frei sein","turkish":"özgür / boş / serbest olmak","prateritum_form":"war frei","partizip2":"frei gewesen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Ist dieser Platz noch frei?","tr":"Bu yer hala boş mu?"},{"tense":"PRÄTERITUM","de":"Gestern war ich endlich frei von Sorgen.","tr":"Dün nihayet dertlerimden arınmış (özgür) idim."},{"tense":"PERFEKT","de":"Ist das Zimmer früher frei gewesen?","tr":"Oda daha önce boş muydu?"},{"tense":"FUTUR I","de":"Ab morgen werde ich frei sein.","tr":"Yarından itibaren özgür (veya tatil) olacağım."},{"tense":"KONJ II","de":"Ich wäre gerne frei wie ein Vogel.","tr":"Bir kuş gibi özgür olmak isterdim."}]},{"category":"AKK / REFL / HABEN","verb":"freimachen","turkish":"boşaltmak / soyunmak (üstünü açmak)","prateritum_form":"machte frei","partizip2":"freigemacht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Machen Sie bitte den Oberkörper frei.","tr":"Lütfen üstünüzü çıkarın (muayene için açın)."},{"tense":"PRÄTERITUM","de":"Wir machten den Weg frei.","tr":"Yolu boşalttık/açtık."},{"tense":"PERFEKT","de":"Hast du dir den Nachmittag freigemacht?","tr":"Öğleden sonranı boşalttın (vakit ayırdın) mı?"},{"tense":"FUTUR I","de":"Ich werde den Tisch freimachen.","tr":"Masayı boşaltacağım."},{"tense":"KONJ II","de":"Ich würde mich gerne von Stress freimachen.","tr":"Stresten arınmak (kurtulmak) isterdim."}]},{"category":"REFL / AUF-ÜBER / HABEN","verb":"freuen","turkish":"sevinmek / mutlu olmak","prateritum_form":"freute","partizip2":"gefreut","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich freue mich auf den Urlaub.","tr":"Tatili (gelecekteki) sabırsızlıkla bekliyorum."},{"tense":"PRÄTERITUM","de":"Er freute sich über das Geschenk.","tr":"Hediyeye (geçmişte olan) sevindi."},{"tense":"PERFEKT","de":"Es hat mich sehr gefreut, dich zu sehen.","tr":"Seni gördüğüme çok sevindim."},{"tense":"FUTUR I","de":"Du wirst dich sicher freuen.","tr":"Eminim sevineceksin."},{"tense":"KONJ II","de":"Das würde mich sehr freuen.","tr":"Bu beni çok mutlu ederdi."}]},{"category":"NOMINATIV / HABEN-SEIN","verb":"frieren","turkish":"üşümek / donmak","prateritum_form":"fror","partizip2":"gefroren","hilfsverb":"haben/sein","examples":[{"tense":"PRÄSENS","de":"Frierst du? Soll ich die Heizung anmachen?","tr":"Üşüyor musun? Kaloriferi açayım mı?"},{"tense":"PRÄTERITUM","de":"Er fror den ganzen Tag im Freien.","tr":"Tüm gün dışarıda üşüdü."},{"tense":"PERFEKT","de":"Der See ist über Nacht gefroren.","tr":"Göl bir gecede dondu."},{"tense":"FUTUR I","de":"Morgen wird es sicher frieren.","tr":"Yarın kesin don (ayaz) olacak."},{"tense":"KONJ II","de":"Ohne Jacke würde ich frieren.","tr":"Ceketsiz üşürdüm."}]},{"category":"NOMINATIV / HABEN","verb":"frühstücken","turkish":"kahvaltı yapmak","prateritum_form":"frühstückte","partizip2":"gefrühstückt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wann frühstücken wir morgen?","tr":"Yarın ne zaman kahvaltı yapıyoruz?"},{"tense":"PRÄTERITUM","de":"Er frühstückte heute nur kurz.","tr":"Bugün sadece kısa bir kahvaltı yaptı."},{"tense":"PERFEKT","de":"Hast du schon gefrühstückt?","tr":"Kahvaltını yaptın mı?"},{"tense":"FUTUR I","de":"Wir werden im Garten frühstücken.","tr":"Bahçede kahvaltı yapacağız."},{"tense":"KONJ II","de":"Ich würde gerne in Ruhe frühstücken.","tr":"Huzur içinde kahvaltı yapmak isterdim."}]},{"category":"AKK / REFL / HABEN","verb":"fühlen","turkish":"hissetmek / sezmek","prateritum_form":"fühlte","partizip2":"gefühlt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich fühle mich heute nicht gut.","tr":"Bugün kendimi iyi hissetmiyorum."},{"tense":"PRÄTERITUM","de":"Er fühlte den Puls des Patienten.","tr":"Hastanın nabzını hissetti (ölçtü)."},{"tense":"PERFEKT","de":"Hast du die Kälte gefühlt?","tr":"Soğuğu hissettin mi?"},{"tense":"FUTUR I","de":"Du wirst dich bald besser fühlen.","tr":"Yakında daha iyi hissedeceksin."},{"tense":"KONJ II","de":"Wie würdest du dich an meiner Stelle fühlen?","tr":"Benim yerimde olsan nasıl hissederdin?"}]},{"category":"AKK / ZU + DAT / HABEN","verb":"führen","turkish":"yol göstermek / liderlik etmek / yürütmek","prateritum_form":"führte","partizip2":"geführt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Dieser Weg führt direkt zum See.","tr":"Bu yol doğrudan göle çıkıyor (götürüyor)."},{"tense":"PRÄTERITUM","de":"Sie führte die Gruppe durch das Museum.","tr":"Gruba müze boyunca rehberlik etti."},{"tense":"PERFEKT","de":"Wir haben ein langes Gespräch geführt.","tr":"Uzun bir görüşme yaptık (yürüttük)."},{"tense":"FUTUR I","de":"Wohin wird das alles führen?","tr":"Tüm bunlar nereye varacak?"},{"tense":"KONJ II","de":"Ich würde gerne ein eigenes Team führen.","tr":"Kendi ekibimi yönetmek (liderlik etmek) isterdim."}]},{"category":"AKK / MIT + DAT / HABEN","verb":"füllen","turkish":"doldurmak","prateritum_form":"füllte","partizip2":"gefüllt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich fülle das Glas mit Wasser.","tr":"Bardağı suyla dolduruyorum."},{"tense":"PRÄTERITUM","de":"Die Halle füllte sich langsam.","tr":"Salon yavaşça doldu."},{"tense":"PERFEKT","de":"Hast du das Formular ausgefüllt?","tr":"Formu doldurdun mu? (not: ausfüllen daha yaygın)"},{"tense":"FUTUR I","de":"Wir werden die Lücken füllen.","tr":"Boşlukları dolduracağız."},{"tense":"KONJ II","de":"Ich würde den Koffer nicht so voll füllen.","tr":"Valizi bu kadar çok doldurmazdım."}]},{"category":"AKK / REFL / VOR / HABEN","verb":"fürchten","turkish":"korkmak / endişelenmek","prateritum_form":"fürchtete","partizip2":"gefürchtet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich fürchte mich vor der Dunkelheit.","tr":"Karanlıktan korkuyorum."},{"tense":"PRÄTERITUM","de":"Er fürchtete die Konsequenzen.","tr":"Sonuçlardan korktu."},{"tense":"PERFEKT","de":"Hast du dich sehr gefürchtet?","tr":"Çok mu korktun?"},{"tense":"FUTUR I","de":"Wir werden nichts zu fürchten haben.","tr":"Korkacak hiçbir şeyimiz olmayacak."},{"tense":"KONJ II","de":"Das wäre zu befürchten.","tr":"Bundan korkulur (korkulması gerekirdi)."}]},{"category":"AKKUSATIV / HABEN","verb": verb":"garen","turkish":"pişirmek (kıvamında)","prateritum_form":"garte","partizip2":"gegart","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich gare das Gemüse bei niedriger Hitze.","tr":"Sebzeleri düşük ateşte pişiriyorum."},{"tense":"PRÄTERITUM","de":"Sie garte das Fleisch im Ofen.","tr":"Eti fırında pişirdi."},{"tense":"PERFEKT","de":"Ist das Hähnchen schon durchgegart?","tr":"Tavuk (tamamen) pişti mi?"},{"tense":"FUTUR I","de":"Ich werde den Fisch im Dampf garen.","tr":"Balığı buharda pişireceğim."},{"tense":"KONJ II","de":"Ich würde es lieber schonend garen.","tr":"Onu daha nazikçe (yavaşça) pişirmeyi tercih ederdim."}]},{"category":"AKKUSATIV / HABEN","verb":"gebären","turkish":"doğurmak / dünyaya getirmek","prateritum_form":"gebar","partizip2":"geboren","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wann gebiert sie das Kind?","tr":"Çocuğu ne zaman doğuracak?"},{"tense":"PRÄTERITUM","de":"Sie gebar gesunde Zwillinge.","tr":"Sağlıklı ikizler doğurdu."},{"tense":"PERFEKT","de":"Wann bist du geboren?","tr":"Ne zaman doğdun? (Pasif Perfekt kullanımı en yaygınıdır)"},{"tense":"FUTUR I","de":"Sie wird bald ein Baby gebären.","tr":"Yakında bir bebek doğuracak."},{"tense":"KONJ II","de":"Das würde eine neue Hoffnung gebären.","tr":"Bu yeni bir umut doğururdu."}]},{"category":"DAT + AKK / HABEN","verb":"geben","turkish":"vermek / (es gibt: var)","prateritum_form":"gab","partizip2":"gegeben","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Gibst du mir bitte das Salz?","tr":"Bana tuzu verir misin lütfen?"},{"tense":"PRÄTERITUM","de":"Es gab keine andere Wahl.","tr":"Başka seçenek yoktu."},{"tense":"PERFEKT","de":"Hast du ihm den Schlüssel gegeben?","tr":"Anahtarı ona verdin mi?"},{"tense":"FUTUR I","de":"Morgen wird es Regen geben.","tr":"Yarın yağmur olacak (yağacak)."},{"tense":"KONJ II","de":"Ich würde dir alles geben.","tr":"Sana her şeyi verirdim."}]},{"category":"AKKUSATIV / HABEN","verb":"gebrauchen","turkish":"kullanmak / ihtiyacı o rüßte","partizip2":"gegrüßt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich grüße meine Nachbarn immer freundlich.","tr":"Komşularımı her zaman nazikçe selamlarım."},{"tense":"PRÄTERITUM","de":"Er grüßte mich flüchtig im Vorbeigehen.","tr":"Geçerken beni kısaca selamladı."},{"tense":"PERFEKT","de":"Hast du ihn von mir gegrüßt?","tr":"Ona benden selam söyledin mi?"},{"tense":"FUTUR I","de":"Bitte grüßen Sie Ihre Frau von mir!","tr":"Lütfen eşinize benden selam söyleyin!"},{"tense":"KONJ II","de":"Ich würde sie grüßen, wenn ich sie sähe.","tr":"Onu görseydim selam verirdim."}]},{"category":"NOM / AKK / HABEN","verb":"gucken","turkish":"bakmak / izlemek (gayriresmi)","prateritum_form":"guckte","partizip2":"geguckt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Guck mal, da ist ein Regenbogen!","tr":"Bak bakayım, orada bir gökkuşağı var!"},{"tense":"PRÄTERITUM","de":"Wir guckten den ganzen Abend Fernsehen.","tr":"Tüm akşam televizyon izledik."},{"tense":"PERFEKT","de":"Hast du in die Schublade geguckt?","tr":"Çekmeceye baktın mı?"},{"tense":"FUTUR I","de":"Ich werde später mal nach dem Rechten gucken.","tr":"Sonra bir her şey yolunda mı diye bakacağım."},{"tense":"KONJ II","de":"Ich würde nicht so neugierig gucken.","tr":"Bu kadar meraklı bakmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"haben","turkish":"sahip olmak / var (bende var)","prateritum_form":"hatte","partizip2":"gehabt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich habe heute keine Zeit.","tr":"Bugün vaktim yok."},{"tense":"PRÄTERITUM","de":"Früher hatte ich einen Hund.","tr":"Eskiden bir köpeğim vardı."},{"tense":"PERFEKT","de":"Hast du Glück gehabt?","tr":"Şansın yaver gitti mi (Şansın oldu mu)?"},{"tense":"FUTUR I","de":"Du wirst bald ein neues Auto haben.","tr":"Yakında yeni bir araban olacak."},{"tense":"KONJ II","de":"Ich hätte gerne ein Eis.","tr":"Bir dondurma alabilir miyim (isterdim)."}]},{"category":"IMPERSONAL / HABEN","verb":"hageln","turkish":"dolu y egory":"AKK / FÜR / HABEN","verb":"halten","turkish":"tutmak / durmak / (sanmak)","prateritum_form":"hielt","partizip2":"gehalten","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Hält der Bus hier? - Ich halte mein Versprechen.","tr":"Otobüs burada duruyor mu? - Sözümü tutuyorum."},{"tense":"PRÄTERITUM","de":"Er hielt mich für einen Experten.","tr":"Beni bir uzman sandı (yerine koydu)."},{"tense":"PERFEKT","de":"Hast du die Tasche fest gehalten?","tr":"Çantayı sıkı tuttun mu?"},{"tense":"FUTUR I","de":"Die Qualität wird lange halten.","tr":"Kalite uzun süre dayanacak."},{"tense":"KONJ II","de":"Was würdest du davon halten?","tr":"Bu konuda ne düşünürdün (fikrin ne olurdu)?"}]},{"category":"AKK / GEGEN / HABEN","verb":"hämmern","turkish":"çekiçlemek / (kalp) güm güm atmak","prateritum_form":"hämmerte","partizip2":"gehämmert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er hämmert einen Nagel in die Wand.","tr":"Duvara bir çivi çakıyor (çekiçliyor)."},{"tense":"PRÄTERITUM","de":"Mein Herz hämmerte vor Angst.","tr":"Kalbim korkudan güm güm atıyordu."},{"tense":"PERFEKT","de":"Wer hat da so laut gegen die Tür gehämmert?","tr":"Kim kapıya o kadar sert vurdu (yumrukladı)?"},{"tense":"FUTUR I","de":"Der Specht wird am Baum hämmern.","tr":"Ağaçkakan ağaca vuracak."},{"tense":"KONJ II","de":"Ich würde nicht so spät am Abend hämmern.","tr":"Akşamın bu saatinde çekiçle vurmazdım."}]},{"category":"VON / MIT / HABEN","verb":"handeln","turkish":"harekete geçmek / ticaret yapmak / (konu) olmak","prateritum_form":"handelte","partizip2":"gehandelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wovon handelt der Film? - Wir müssen handeln!","tr":"Film ne hakkında? - Harekete geçmeliyiz!"},{"tense":"PRÄTERITUM","de":"Er handelte mit alten Autos.","tr":"Eski arabaların ticaretini yapıyordu."},{"tense":"PERFEKT","de":"Hast du im Affekt gehandelt?","tr":"Anlık bir öfkeyle mi hareket ettin?"},{"tense":"FUTUR I","de":"Es wird sich um ein Missverständnis handeln.","tr":"Bir yanlış anlaşılma söz konusu olacak."},{"tense":"KONJ II","de":"An deiner Stelle würde ich klüger handeln.","tr":"Senin yerinde olsam daha akıllıca hareket ederdim."}]},{"category":"AKK / DAT / HABEN/SEIN","verb":"hängen","turkish":"asmak (haben) / asılı durmak (sein)","prateritum_form":"hängte/hing","partizip2":"gehängt/gehangen","hilfsverb":"haben/sein","examples":[{"tense":"PRÄSENS","de":"Ich hänge das Bild an die Wand. (Akk)","tr":"Resmi duvara asıyorum."},{"tense":"PRÄTERITUM","de":"Das Bild hing an der Wand. (Dat)","tr":"Resim duvarda asılıydı."},{"tense":"PERFEKT","de":"Hast du die Wäsche schon aufgehängt?","tr":"Çamaşırları çoktan astın mı?"},{"tense":"FUTUR I","de":"Wir werden die Plakate überall hängen.","tr":"Afişleri her yere asacağız."},{"tense":"KONJ II","de":"Das würde ich nicht so tief hängen.","tr":"Onu bu kadar aşağıya asmazdım (önemsemezdim)."}]},{"category":"AKKUSATIV / HABEN","verb":"hassen","turkish":"nefret etmek","prateritum_form":"hasste","partizip2":"gehasst","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich hasse es, im Stau zu stehen.","tr":"Trafikte beklemekten nefret ederim."},{"tense":"PRÄTERITUM","de":"Er hasste seinen alten Job.","tr":"Eski işinden nefret ediyordu."},{"tense":"PERFEKT","de":"Hat er dich wirklich gehasst?","tr":"Senden gerçekten nefret mi etti?"},{"tense":"FUTUR I","de":"Sie werden die Wahrheit hassen.","tr":"Gerçekten nefret edecekler."},{"tense":"KONJ II","de":"Ich würde dich niemals hassen.","tr":"Senden asla nefret etmezdim."}]},{"category":"AKK / HABEN","verb":"hauchen","turkish":"üflemek / fısıldamak (hafifçe)","prateritum_form":"hauchte","partizip2":"gehaucht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er haucht einen Kuss in die Luft.","tr":"Havaya bir öpücük üflüyor."},{"tense":"PRÄTERITUM","de":"\"Ich liebe dich\", hauchte sie leise.","tr":"\"Seni seviyorum\" diye fısıldadı (nefes gibi)."},{"tense":"PERFEKT","de":"Hast du die Scheibe angehaucht?","tr":"Cama (buğulansın ,{"tense":"PERFEKT","de":"Hast du das Dokument in den Ordner geheftet?","tr":"Belgeyi klasöre taktın mı?"},{"tense":"FUTUR I","de":"Wir werden die Quittungen abheften.","tr":"Makbuzları dosyalayacağız (tutturacağız)."},{"tense":"KONJ II","de":"Ich würde es an deiner Stelle festheften.","tr":"Senin yerinde olsam onu sıkıca tuttururdum."}]},{"category":"AKK / NOM / HABEN/SEIN","verb":"heilen","turkish":"iyileştirmek (haben) / iyileşmek (sein)","prateritum_form":"heilte","partizip2":"geheilt","hilfsverb":"haben/sein","examples":[{"tense":"PRÄSENS","de":"Die Wunde heilt sehr gut.","tr":"Yara çok iyi iyileşiyor."},{"tense":"PRÄTERITUM","de":"Der Arzt heilte die Krankheit.","tr":"Doktor hastalığı iyileştirdi."},{"tense":"PERFEKT","de":"Ist der Bruch schon geheilt?","tr":"Kırık çoktan iyileşti mi?"},{"tense":"FUTUR I","de":"Die Zeit wird alle Wunden heilen.","tr":"Zaman tüm yaraları iyileştirecek."},{"tense":"KONJ II","de":"Das würde die Situation nicht heilen.","tr":"Bu, durumu düzeltmezdi (iyileştirmezdi)."}]},{"category":"AKKUSATIV / HABEN","verb":"heiraten","turkish":"evlenmek","prateritum_form":"heiratete","partizip2":"geheiratet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Willst du mich heiraten?","tr":"Benimle evlenir misin?"},{"tense":"PRÄTERITUM","de":"Sie heirateten ganz heimlich in Las Vegas.","tr":"Las Vegas'ta gizlice evlendiler."},{"tense":"PERFEKT","de":"Habt ihr letztes Jahr geheiratet?","tr":"Geçen yıl mı evlendiniz?"},{"tense":"FUTUR I","de":"Wir werden nächsten Sommer heiraten.","tr":"Gelecek yaz evleneceğiz."},{"tense":"KONJ II","de":"Ich würde dich auch ohne Geld heiraten.","tr":"Para olmasa da seninle evlenirdim."}]},{"category":"NOMINATIV / HABEN","verb":"heißen","turkish":"adı olmak / ... anlamına gelmek","prateritum_form":"hieß","partizip2":"geheißen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wie heißt das auf Deutsch?","tr":"Bunun Almancadaki adı nedir (Almancada ne denir)?"},{"tense":"PRÄTERITUM","de":"Früher hieß die b":"haben","examples":[{"tense":"PRÄSENS","de":"Die Firma stellt Solarmodule her.","tr":"Firma güneş panelleri üretiyor."},{"tense":"PRÄTERITUM","de":"Früher stellte man hier Brot her.","tr":"Eskiden burada ekmek üretilirdi."},{"tense":"PERFEKT","de":"Wo wurde dieses Auto hergestellt?","tr":"Bu araba nerede üretildi?"},{"tense":"FUTUR I","de":"Wir werden bald eine Verbindung herstellen.","tr":"Yakında bir bağlantı kuracağız (oluşturacağız)."},{"tense":"KONJ II","de":"Ich würde das Produkt lieber selbst herstellen.","tr":"Ürünü kendim üretmeyi tercih ederdim."}]},{"category":"NOM / HABEN / SEIN","verb":"hetzen","turkish":"acele etmek / kışkırtmak / kovalamak","prateritum_form":"hetzte","partizip2":"gehetzt","hilfsverb":"h/s","examples":[{"tense":"PRÄSENS","de":"Hetz mich nicht so!","tr":"Beni böyle sıkıştırma (acele ettirme)!"},{"tense":"PRÄTERITUM","de":"Er hetzte zum Bahnhof.","tr":"İstasyona doğru yardırdı (koşturdu)."},{"tense":"PERFEKT","de":"Sind wir umsonst so gehetzt?","tr":"Boşuna mı bu kadar acele ettik?"},{"tense":"FUTUR I","de":"Die Medien werden gegen ihn hetzen.","tr":"Medya ona karşı kışkırtma yapacak."},{"tense":"KONJ II","de":"Ich würde nicht so durch das Leben hetzen.","tr":"Hayatın içinde böyle koşturup durmazdım."}]},{"category":"NOMINATIV / HABEN","verb":"heulen","turkish":"uluma / zırıl zırıl ağlamak","prateritum_form":"heulte","partizip2":"geheult","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Hör auf zu heulen!","tr":"Ağlamayı (zırlamayı) kes!"},{"tense":"PRÄTERITUM","de":"Der Wind heulte die ganze Nacht.","tr":"Rüzgar bütün gece uğuldadı (uludu)."},{"tense":"PERFEKT","de":"Hast du wegen des Films geheult?","tr":"Film yüzünden mi ağladın?"},{"tense":"FUTUR I","de":"Der Wolf wird den Mond anheulen.","tr":"Kurt aya karşı uluyacak."},{"tense":"KONJ II","de":"Ich würde nicht wegen jeder Kleinigkeit heulen.","tr":"Her küçük şey için ağlamazdım."}]},{"category":"AN + DAT / HABEN","verb":"hindern","turkish":"engel olmak / mani olmak","prateritum_form":"hinderte","partizip2":"gehindert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Niemand hindert dich daran zu gehen.","tr":"Gitmen için kimse sana engel olmuyor."},{"tense":"PRÄTERITUM","de":"Der Regen hinderte uns an der Arbeit.","tr":"Yağmur çalışmamıza engel oldu."},{"tense":"PERFEKT","de":"Hat er dich an deinem Erfolg gehindert?","tr":"Başarılı olmanı mı engelledi?"},{"tense":"FUTUR I","de":"Das wird dich nicht am Sieg hindern.","tr":"Bu senin zaferine engel olmayacak."},{"tense":"KONJ II","de":"Ich würde dich niemals daran hindern.","tr":"Sana asla engel olmazdım."}]},{"category":"AUF + AKK / HABEN","verb":"hinweisen","turkish":"işaret etmek / dikkat çekmek","prateritum_form":"wies hin","partizip2":"hingewiesen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich weise Sie auf die Gefahren hin.","tr":"Sizi tehlikelere karşı uyarıyorum (dikkat çekiyorum)."},{"tense":"PRÄTERITUM","de":"Er wies auf das Schild an der Wand hin.","tr":"Duvardaki tabelayı işaret etti."},{"tense":"PERFEKT","de":"Haben wir schon auf den Termin hingewiesen?","tr":"Randevuyu çoktan belirttik mi?"},{"tense":"FUTUR I","de":"Ich werde ihn noch einmal darauf hinweisen.","tr":"Bunu ona bir kez daha hatırlatacağım (işaret edeceğim)."},{"tense":"KONJ II","de":"Ich würde gerne auf diesen Punkt hinweisen.","tr":"Bu noktaya dikkat çekmek isterdim."}]},{"category":"AUF + AKK / HABEN","verb":"hoffen","turkish":"umut etmek","prateritum_form":"hoffte","partizip2":"gehofft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich hoffe auf eine baldige Antwort.","tr":"Yakın zamanda bir cevap almayı umuyorum."},{"tense":"PRÄTERITUM","de":"Wir hofften auf besseres Wetter.","tr":"Daha iyi bir hava umuyorduk."},{"tense":"PERFEKT","de":"Hast du wirklich darauf gehofft?","tr":"Gerçekten bunu mu umdun?"},{"tense":"FUTUR I","de":"Wir werden bis zum Ende hoffen.","tr":"Sonuna kadar umut edeceğiz."},{"tense":"KONJ II","de":"Ich hätte so sehr auf dich gehofft.","tr":"Senden yana çok umutlu olurdum."}]},{"category":"AKK / DAT / HABEN","verb":"holen","turkish":"gidip almak / getirmek","prateritum_form":"holte","partizip2":"geholt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich hole mir schnell einen Kaffee.","tr":"Hemen kendime bir kahve alıp geliyorum."},{"tense":"PRÄTERITUM","de":"Er holte die Kinder von der Schule ab.","tr":"Çocukları okuldan aldı (almaya gitti)."},{"tense":"PERFEKT","de":"Hast du die Pakete schon geholt?","tr":"Paketleri çoktan aldın mı?"},{"tense":"FUTUR I","de":"Soll ich dir ein Glas Wasser holen?","tr":"Sana bir bardak su getireyim mi?"},{"tense":"KONJ II","de":"Ich würde Hilfe holen, wenn es nötig wäre.","tr":"Gerekli olsaydı yardım çağırırdım (getirirdim)."}]},{"category":"AUF + AKK / HABEN","verb":"horchen","turkish":"kulak kabartmak / dinlemek","prateritum_form":"horchte","partizip2":"gehorcht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie horcht an der Tür.","tr":"Kapıyı dinliyor (kulak kabartıyor)."},{"tense":"PRÄTERITUM","de":"Wir horchten auf die Geräusche im Wald.","tr":"Ormandaki seslere kulak kabarttık."},{"tense":"PERFEKT","de":"Hast du auf meine Worte gehorcht?","tr":"Sözlerimi dinledin mi (itaat anlamında da kullanılır)?"},{"tense":"FUTUR I","de":"Er wird gespannt horchen.","tr":"Heyecanla kulak kabartacak."},{"tense":"KONJ II","de":"Ich würde nicht so neugierig horchen.","tr":"Böyle merakla kulak misafiri olmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"hören","turkish":"duymak / dinlemek","prateritum_form":"hörte","partizip2":"gehört","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Hörst du mich? - Ich höre gerne Musik.","tr":"Beni duyuyor musun? - Müzik dinlemeyi severim."},{"tense":"PRÄTERITUM","de":"Er hörte einen lauten Knall.","tr":"Yüksek bir patlama duydu."},{"tense":"PERFEKT","de":"Hast du schon die Nachrichten gehört?","tr":"Haberleri duydun mu (dinledin mi)?"},{"tense":"FUTUR I","de":"Wir werden uns bald wieder hören.","tr":"Yakında tekrar görüşece :"Corona aşısı oldun mu (aşılı mısın)?"},{"tense":"FUTUR I","de":"Wir werden alle Haustiere impfen lassen.","tr":"Tüm evcil hayvanları aşılatacağız."},{"tense":"KONJ II","de":"Ich würde mich impfen, wenn ich du wäre.","tr":"Senin yerinde olsam aşı olurdum."}]},{"category":"DATIV / HABEN","verb":"imponieren","turkish":"etkilemek / hayran bırakmak","prateritum_form":"imponierte","partizip2":"imponiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sein Mut imponiert mir sehr.","tr":"Onun cesareti beni çok etkiliyor."},{"tense":"PRÄTERITUM","de":"Sie imponierte allen durch ihr Wissen.","tr":"Bilgisiyle herkesi etkiledi (kendine hayran bıraktı)."},{"tense":"PERFEKT","de":"Hat dir seine Leistung imponiert?","tr":"Onun performansı seni etkiledi mi?"},{"tense":"FUTUR I","de":"Du wirst ihr sicher imponieren.","tr":"Onu kesinlikle etkileyeceksin."},{"tense":"KONJ II","de":"Das würde mir überhaupt nicht imponieren.","tr":"Bu beni hiç de etkilemezdi."}]},{"category":"AKKUSATIV / HABEN","verb":"importieren","turkish":"ithal etmek","prateritum_form":"importierte","partizip2":"importiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir importieren Kaffee aus Brasilien.","tr":"Brezilya'dan kahve ithal ediyoruz."},{"tense":"PRÄTERITUM","de":"Deutschland importierte letztes Jahr viel Gas.","tr":"Almanya geçen yıl çok fazla gaz ithal etti."},{"tense":"PERFEKT","de":"Hast du die Daten schon importiert?","tr":"Verileri çoktan içe aktardın (ithal ettin) mı?"},{"tense":"FUTUR I","de":"Wir werden mehr Bio-Produkte importieren.","tr":"Daha fazla organik ürün ithal edeceğiz."},{"tense":"KONJ II","de":"Ich würde diese Ware nicht importieren.","tr":"Bu malı ithal etmezdim."}]},{"category":"AKK / ÜBER / HABEN","verb":"informieren","turkish":"bilgilendirmek / bilgi almak","prateritum_form":"informierte","partizip2":"informiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich informiere mich über die Reise.","tr":"Seyahat hakkında bilgi alıyorum (kendimi bilg injizierte","partizip2":"injiziert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Arzt injiziert das Medikament.","tr":"Doktor ilacı enjekte ediyor."},{"tense":"PRÄTERITUM","de":"Die Schwester injizierte den Wirkstoff in den Muskel.","tr":"Hemşire etken maddeyi kas içine enjekte etti."},{"tense":"PERFEKT","de":"Wurde das Serum bereits injiziert?","tr":"Serum çoktan enjekte edildi mi?"},{"tense":"FUTUR I","de":"Wir werden die Lösung vorsichtig injizieren.","tr":"Çözeltiyi dikkatlice enjekte edeceğiz."},{"tense":"KONJ II","de":"Man würde es direkt in die Ader injizieren.","tr":"Onu doğrudan damara enjekte ederlerdi."}]},{"category":"AKKUSATIV / HABEN","verb":"inkludieren","turkish":"dahil etmek / kapsamak","prateritum_form":"inkludierte","partizip2":"inkludiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Preis inkludiert das Frühstück.","tr":"Fiyat kahvaltıyı da kapsıyor (dahil ediyor)."},{"tense":"PRÄTERITUM","de":"Das Angebot inkludierte auch die Reisekosten.","tr":"Teklif seyahat masraflarını da kapsıyordu."},{"tense":"PERFEKT","de":"Haben Sie alle Nebenkosten inkludiert?","tr":"Tüm yan masrafları dahil ettiniz mi?"},{"tense":"FUTUR I","de":"Wir werden alle Teilnehmer inkludieren.","tr":"Tüm katılımcıları dahil edeceğiz."},{"tense":"KONJ II","de":"Ich würde diesen Service gerne inkludieren.","tr":"Bu hizmeti dahil etmeyi isterdim."}]},{"category":"NOMINATIV / SEIN","verb":"inkrafttreten","turkish":"yürürlüğe girmek","prateritum_form":"trat in Kraft","partizip2":"inkraftgetreten","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Das Gesetz tritt morgen in Kraft.","tr":"Yasa yarın yürürlüğe giriyor."},{"tense":"PRÄTERITUM","de":"Die Verordnung trat letztes Jahr in Kraft.","tr":"Yönetmelik geçen yıl yürürlüğe girdi."},{"tense":"PERFEKT","de":"Ist der Vertrag schon inkraftgetreten?","tr":"Sözleşme çoktan yürürlüğe girdi mi?"},{"tense":"FUTUR I","de":"Die neuen Regeln werden bald inkrafttreten.","tr":"Yeni kurallar yakında yürürlüğe girecek."},{"tense":"KONJ II","de":"Wenn es inkrafttreten würde, gäbe es Probleme.","tr":"Eğer yürürlüğe girseydi, sorunlar çıkardı."}]},{"category":"AKK / HABEN","verb":"innovieren","turkish":"yenilik yapmak / inovasyon yapmak","prateritum_form":"innovierte","partizip2":"innoviert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Unternehmen innoviert ständig.","tr":"Şirket sürekli yenilik yapıyor."},{"tense":"PRÄTERITUM","de":"Sie innovierten den gesamten Sektor.","tr":"Tüm sektörü yenilediler."},{"tense":"PERFEKT","de":"Haben sie ihre Produkte genug innoviert?","tr":"Ürünlerinde yeterince inovasyon yaptılar mı?"},{"tense":"FUTUR I","de":"Wir werden diesen Bereich innovieren.","tr":"Bu alanı modernize edeceğiz/yenileyeceğiz."},{"tense":"KONJ II","de":"Ich würde gerne den Markt innovieren.","tr":"Pazarda yenilik yapmak isterdim."}]},{"category":"AKK / HABEN","verb":"inquirieren","turkish":"soruşturmak / araştırmak","prateritum_form":"inquirierte","partizip2":"inquiriert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Detektiv inquiriert im Mordfall.","tr":"Dedektif cinayet vakasını soruşturuyor."},{"tense":"PRÄTERITUM","de":"Man inquirierte stundenlang die Zeugen.","tr":"Tanıklar saatlerce sorgulandı/araştırıldı."},{"tense":"PERFEKT","de":"Hat die Polizei gründlich inquiriert?","tr":"Polis titizlikle soruşturdu mu?"},{"tense":"FUTUR I","de":"Die Kommission wird den Vorfall inquirieren.","tr":"Komisyon olayı soruşturacak."},{"tense":"KONJ II","de":"Ich würde an deiner Stelle genauer inquirieren.","tr":"Senin yerinde olsam daha detaylı araştırırdım."}]},{"category":"AKK / HABEN","verb":"inserieren","turkish":"ilan vermek (gazete vb.)","prateritum_form":"inserierte","partizip2":"inseriert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir inserieren die Wohnung im Internet.","tr":"Daireyi internette ilana koyuyoruz."},{"tense":"PRÄTERITUM","de":"Er inserierte gestern sein altes Auto.","tr":"Dün eski arabasının ilanını verdi."},{" avaşmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"kapieren","turkish":"anlamak / çakmak (argo)","prateritum_form":"kapierte","partizip2":"kapiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Hast du das endlich kapiert?","tr":"Bunu sonunda anladın mı (çaktın mı köfteyi)?"},{"tense":"PRÄTERITUM","de":"Niemand kapierte, was er wollte.","tr":"Kimse ne istediğini anlamadı."},{"tense":"PERFEKT","de":"Ich habe es sofort kapiert.","tr":"Hemen anladım."},{"tense":"FUTUR I","de":"Er wird es wohl nie kapieren.","tr":"Bunu muhtemelen asla anlamayacak."},{"tense":"KONJ II","de":"Ich würde es kapieren, wenn du es besser erklärtest.","tr":"Daha iyi açıklasaydın anlardım."}]},{"category":"AKKUSATIV / HABEN","verb":"kassieren","turkish":"para tahsil etmek / kasa yapmak","prateritum_form":"kassierte","partizip2":"kassiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wer kassiert hier das Geld?","tr":"Burada parayı kim tahsil ediyor (kasaya bakıyor)?"},{"tense":"PRÄTERITUM","de":"Der Kellner kassierte den Betrag.","tr":"Garson tutarı tahsil etti."},{"tense":"PERFEKT","de":"Hast du die Gebühren schon kassiert?","tr":"Ücretleri çoktan aldın mı?"},{"tense":"FUTUR I","de":"Wir werden morgen bei den Kunden kassieren.","tr":"Yarın müşterilerden parayı tahsil edeceğiz."},{"tense":"KONJ II","de":"Ich würde lieber bar kassieren.","tr":"Nakit tahsil etmeyi tercih ederdim."}]},{"category":"AKK / DAT / HABEN","verb":"kaufen","turkish":"satın almak","prateritum_form":"kaufte","partizip2":"gekauft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich kaufe mir ein neues Auto.","tr":"Kendime yeni bir araba satın alıyorum."},{"tense":"PRÄTERITUM","de":"Gestern kaufte er Brot beim Bäcker.","tr":"Dün fırından ekmek aldı."},{"tense":"PERFEKT","de":"Was hast du im Supermarkt gekauft?","tr":"Süpermarkette ne satın aldın?"},{"tense":"FUTUR I","de":"Wir werden bald ein Haus kaufen.","tr":"Yakında bir ev satın alacağız."},{"tense":"KONJ II","de":"Ich würde das Handy kaufen, wenn ich Geld hätte.","tr":"Param olsaydı cep telefonunu alırdım."}]},{"category":"AKKUSATIV / HABEN","verb":"kauen","turkish":"çiğnemek","prateritum_form":"kaute","partizip2":"gekaut","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Kaugummi kauen ist hier verboten.","tr":"Burada sakız çiğnemek yasaktır."},{"tense":"PRÄTERITUM","de":"Der Hund kaute stundenlang an dem Knochen.","tr":"Köpek saatlerce kemiği çiğnedi (kemirdi)."},{"tense":"PERFEKT","de":"Hast du deine Fingernägel gekaut?","tr":"Tırnaklarını mı yedin (çiğnedin)?"},{"tense":"FUTUR I","de":"Du wirst das Fleisch gut kauen müssen.","tr":"Eti iyi çiğnemen gerekecek."},{"tense":"KONJ II","de":"Ich würde das nicht kauen, es ist zu hart.","tr":"Bunu çiğnemezdim, çok sert."}]},{"category":"AKKUSATIV / HABEN","verb":"kehren","turkish":"süpürmek / dönmek","prateritum_form":"kehrte","partizip2":"gekehrt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er kehrt den Boden vor dem Haus.","tr":"Evin önündeki yeri süpürüyor."},{"tense":"PRÄTERITUM","de":"Sie kehrte der Stadt den Rücken.","tr":"Şehre sırtını döndü."},{"tense":"PERFEKT","de":"Hast du die Straße schon gekehrt?","tr":"Sokağı çoktan süpürdün mü?"},{"tense":"FUTUR I","de":"Neue Besen kehren gut. (Atasözü)","tr":"Yeni süpürge iyi süpürür."},{"tense":"KONJ II","de":"Ich würde den Staub unter den Teppich kehren.","tr":"Tozu halının altına süpürürdüm (mecazi)."}]},{"category":"AKKUSATIV / HABEN","verb":"kennen","turkish":"tanımak / bilmek","prateritum_form":"kannte","partizip2":"gekannt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Kennst du diesen Mann? - Ich kenne die Wahrheit.","tr":"Bu adamı tanıyor musun? - Gerçeği biliyorum."},{"tense":"PRÄTERITUM","de":"Ich kannte ihn schon aus der Kindheit.","tr":"Onu çocukluğumdan beri tanıyordum."},{"tense":"PERFEKT","de":"Hast du das neue Restaurant schon gekannt?","tr":"Yeni restoranı zaten biliyor muydun?"},{"tense":"FUTUR I","de":"Bald wirst du alle Regeln kennen.","tr":"Yakında tüm kuralları bileceksin."},{"tense":"KONJ II","de":"Ich würde ihn gerne persönlich kennen.","tr":"Onu şahsen tanımak isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"kennenlernen","turkish":"tanışmak / yeni öğrenmek","prateritum_form":"lernte kennen","partizip2":"kennengelernt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich lerne viele neue Leute kennen.","tr":"Birçok yeni insanla tanışıyorum."},{"tense":"PRÄTERITUM","de":"Wir lernten uns im Urlaub kennen.","tr":"Tatilde tanıştık."},{"tense":"PERFEKT","de":"Freut mich, Sie kennenzulernen!","tr":"Sizinle tanıştığıma memnun oldum!"},{"tense":"FUTUR I","de":"Du wirst noch viele Freunde kennenlernen.","tr":"Daha çok arkadaşla tanışacaksın."},{"tense":"KONJ II","de":"Ich würde gerne deine Familie kennenlernen.","tr":"Ailenle tanışmak isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"kennzeichnen","turkish":"işaretlemek / tanımlamak","prateritum_form":"kennzeichnete","partizip2":"gekennzeichnet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Bitte kennzeichnen Sie die richtige Antwort.","tr":"Lütfen doğru cevabı işaretleyin."},{"tense":"PRÄTERITUM","de":"Er kennzeichnete die Kisten mit Nummern.","tr":"Kutuları numaralarla işaretledi."},{"tense":"PERFEKT","de":"Hast du die Gefahrenstelle gekennzeichnet?","tr":"Tehlikeli yeri işaretledin mi?"},{"tense":"FUTUR I","de":"Diese Krise wird die Ära kennzeichnen.","tr":"Bu kriz dönemi tanımlayacak (damga vuracak)."},{"tense":"KONJ II","de":"Ich würde den Weg deutlich kennzeichnen.","tr":"Yolu belirgin bir şekilde işaretlerdim."}]},{"category":"NOMINATIV / HABEN","verb":"kichern","turkish":"kıkırdamak","prateritum_form":"kicherte","partizip2":"gekichert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Warum kichert ihr so leise?","tr":"Neden böyle sessizce kıkırdıyorsunuz?"},{"tense":"PRÄTERITUM","de":"Sie kicherte den ganzen Abend.","tr":"Bütün akşam kıkırdadı."},{"tense":"PERFEKT","de":"Hat er über meinen Witz gekichert?","tr":"Esprime kıkırdadı mı?"},{"tense":"FUTUR I","de":"Die Mädchen werden hinten im Bus kichern.","tr":"Kızlar otobüsün arkasında kıkırdayacaklar."},{"tense":"KONJ II","de":"Ich würde nicht kichern, wenn es ernst wäre.","tr":"Ciddi olsaydı kıkırdamazdım."}]},{"category":"NOM / AKK / H/S","verb":"kippen","turkish":"devrilmek / devirmek / dökmek","prateritum_form":"kippte","partizip2":"gekippt","hilfsverb":"h/s","examples":[{"tense":"PRÄSENS","de":"Pass auf, das Glas kippt gleich!","tr":"Dikkat et, bardak birazdan devrilecek!"},{"tense":"PRÄTERITUM","de":"Er kippte den Abfall in die Tonne.","tr":"Çöpü bidona boşalttı (devirdi)."},{"tense":"PERFEKT","de":"Ist die Stimmung plötzlich gekippt?","tr":"Hava (atmosfer) aniden değişti mi (bozuldu mu)?"},{"tense":"FUTUR I","de":"Der LKW wird die Erde hier kippen.","tr":"Kamyon toprağı buraya boşaltacak."},{"tense":"KONJ II","de":"Ich würde das Fenster nur kippen.","tr":"Pencereyi sadece üstten aralardım (yarım açardım)."}]},{"category":"ÜBER / GEGEN / HABEN","verb":"klagen","turkish":"şikayet etmek / dava açmak","prateritum_form":"klagte","partizip2":"geklagt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er klagt ständig über Kopfschmerzen.","tr":"Sürekli baş ağrısından şikayet ediyor."},{"tense":"PRÄTERITUM","de":"Sie klagte gegen den Vermieter.","tr":"Ev sahibine dava açtı."},{"tense":"PERFEKT","de":"Hast du über den Lärm geklagt?","tr":"Gürültüden şikayetçi oldun mu?"},{"tense":"FUTUR I","de":"Wir werden vor Gericht klagen.","tr":"Mahkemede dava açacağız."},{"tense":"KONJ II","de":"Ich würde nicht klagen, wenn ich du wäre.","tr":"Senin yerinde olsam şikayet etmezdim."}]},{"category":"NOMINATIV / HABEN","verb":"klappen","turkish":"olmak / tıkırında gitmek / katlamak","prateritum_form":"klappte","partizip2":"geklappt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Es klappt! - Wir klappen den Tisch zusammen.","tr":"Oluyor (halloluyor)! - Masayı katlıyoruz."},{"tense":"PRÄTERITUM","de":"Gestern klappte alles wunderbar.", ":"kombinierte","partizip2":"kombiniert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie kombiniert die Tasche mit den Schuhen.","tr":"Çantayı ayakkabılarla kombinliyor."},{"tense":"PRÄTERITUM","de":"Der Detektiv kombinierte messerscharf.","tr":"Dedektif çok keskin akıl yürüttü (bağlantı kurdu)."},{"tense":"PERFEKT","de":"Hast du die Farben gut kombiniert?","tr":"Renkleri iyi birleştirdin mi?"},{"tense":"FUTUR I","de":"Wir werden Theorie ve Praxis kombinieren.","tr":"Teori ile pratiği birleştireceğiz."},{"tense":"KONJ II","de":"Ich würde diese beiden Ansätze kombinieren.","tr":"Bu iki yaklaşımı birleştirirdim."}]},{"category":"NOMINATIV / SEIN","verb":"kommen","turkish":"gelmek","prateritum_form":"kam","partizip2":"gekommen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Wann kommst du nach Hause?","tr":"Eve ne zaman geliyorsun?"},{"tense":"PRÄTERITUM","de":"Gestern kam er zu spät zum Meeting.","tr":"Dün toplantıya geç geldi."},{"tense":"PERFEKT","de":"Bist du gut angekommen?","tr":"İyi vardın (geldin) mi?"},{"tense":"FUTUR I","de":"Alles wird wieder in Ordnung kommen.","tr":"Her şey tekrar düzelecek (yoluna girecek)."},{"tense":"KONJ II","de":"Ich würde kommen, wenn ich Zeit hätte.","tr":"Vaktim olsaydı gelirdim."}]},{"category":"AKKUSATIV / HABEN","verb":"kommentieren","turkish":"yorum yapmak / yorumlamak","prateritum_form":"kommentierte","partizip2":"kommentiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er kommentiert jeden Beitrag auf Facebook.","tr":"Facebook'taki her paylaşıma yorum yapıyor."},{"tense":"PRÄTERITUM","de":"Der Sprecher kommentierte das Spiel live.","tr":"Spiker maçı canlı olarak yorumladı."},{"tense":"PERFEKT","de":"Hat sie das Gerücht kommentiert?","tr":"Söylenti hakkında yorum yaptı mı?"},{"tense":"FUTUR I","de":"Niemand wird diesen Vorfall kommentieren.","tr":"Kimse bu olay hakkında yorum yapmayacak."},{"tense":"KONJ II","de":"Ich würde das lieber nicht kommentieren.","tr":"Buna yorum yapmamayı tercih ede ","de":"Er leckte sich die Lippen.","tr":"Dudaklarını yaladı."},{"tense":"PERFEKT","de":"Das Eis hat am Finger geleckt.","tr":"Dondurma parmağa aktı/yaladı (bulaştı)."},{"tense":"FUTUR I","de":"Die Katze wird die Milch lecken.","tr":"Kedi sütü yalayacak."},{"tense":"KONJ II","de":"Ich würde mir die Finger danach lecken. (Deyim)","tr":"Onun için parmaklarımı yalardım (çok isterdim)."}]},{"category":"AKKUSATIV / HABEN","verb":"leeren","turkish":"boşaltmak","prateritum_form":"leerte","partizip2":"geleert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich leere den Mülleimer jeden Tag.","tr":"Çöp kovasını her gün boşaltıyorum."},{"tense":"PRÄTERITUM","de":"Er leerte das Glas in einem Zug.","tr":"Bardağı bir dikişte boşalttı (içti)."},{"tense":"PERFEKT","de":"Hast du dein Postfach schon geleert?","tr":"Posta kutunu çoktan boşalttın mı?"},{"tense":"FUTUR I","de":"Wir werden das Haus morgen leeren.","tr":"Evi yarın boşaltacağız."},{"tense":"KONJ II","de":"Ich würde den Speicher lieber leeren.","tr":"Hafızayı (belleği) boşaltmayı tercih ederdim."}]},{"category":"AKK + RICHTUNG / HABEN","verb":"legen","turkish":"yatay koymak / yerleştirmek","prateritum_form":"legte","partizip2":"gelegt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich lege das Buch auf den Tisch.","tr":"Kitabı masanın üzerine (yatay olarak) koyuyorum."},{"tense":"PRÄTERITUM","de":"Er legte sich kurz ins Bett.","tr":"Kısa süreliğine yatağa uzandı."},{"tense":"PERFEKT","de":"Hast du die Wäsche schon in den Schrank gelegt?","tr":"Çamaşırları çoktan dolaba koydun mu?"},{"tense":"FUTUR I","de":"Wir werden die Karten auf den Tisch legen. (Deyim)","tr":"Kartları açık oynayacağız (her şeyi dürüstçe söyleyeceğiz)."},{"tense":"KONJ II","de":"Ich würde mehr Wert auf Qualität legen. (Deyim)","tr":"Kaliteye daha fazla önem verirdim."}]},{"category":"AN / GEGEN + AKK / HABEN","verb":"lehnen","turkish":"yaslanmak / dayamak","prateritum_form":"lehnte","partizip2":"gelehnt","hilfsverb":"haben","example izip2":"gelockert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich lockere meine Krawatte.","tr":"Kravatımı gevşetiyorum."},{"tense":"PRÄTERITUM","de":"Die Massage lockerte seine Muskeln.","tr":"Masaj kaslarını gevşetti."},{"tense":"PERFEKT","de":"Haben sie die Corona-Regeln gelockert?","tr":"Korona kurallarını gevşettiler mi?"},{"tense":"FUTUR I","de":"Die Stimmung wird sich bald lockern.","tr":"Ortam yakında yumuşayacak/rahatlayacak."},{"tense":"KONJ II","de":"Ich würde die Schraube etwas lockern.","tr":"Vidayı biraz gevşetirdim."}]},{"category":"NOMINATIV / HABEN","verb":"lodern","turkish":"alev alev yanmak / parlamak","prateritum_form":"loderte","partizip2":"gelodert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Feuer lodert im Kamin.","tr":"Şöminede ateş alev alev yanıyor."},{"tense":"PRÄTERITUM","de":"Zorn loderte in seinem Gesicht auf.","tr":"Yüzünde öfke parladı."},{"tense":"PERFEKT","de":"Hat die Flamme lange gelodert?","tr":"Alev uzun süre yandı mı?"},{"tense":"FUTUR I","de":"Die Leidenschaft wird wieder lodern.","tr":"Tutku tekrar alevlenecek."},{"tense":"KONJ II","de":"Es würde heller lodern, wenn wir mehr Holz hätten.","tr":"Daha fazla odunumuz olsaydı daha parlak yanardı."}]},{"category":"AKKUSATIV / HABEN","verb":"löffeln","turkish":"kaşıklamak / (çorbayı) içmek","prateritum_form":"löffelte","partizip2":"gelöffelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er löffelt seine Suppe schweigend.","tr":"Çorbasını sessizce kaşıklıyor."},{"tense":"PRÄTERITUM","de":"Sie löffelte den Joghurt direkt aus dem Becher.","tr":"Yoğurdu doğrudan kaptan kaşıkladı."},{"tense":"PERFEKT","de":"Hast du die ganze Schüssel leer gelöffelt?","tr":"Bütün kaseyi kaşıklayıp bitirdin mi?"},{"tense":"FUTUR I","de":"Du wirst die Suppe jetzt auslöffeln müssen. (Deyim)","tr":"(Mecaz) Bu hatanın sonucuna katlanmak zorunda kalacaksın."},{"tense":"KONJ II","de":"Ich würde es löffeln, wenn es warm wäre.","tr":"Sıcak olsaydı kaşıklardım (içerdim)."}]},{"category":"REFL / NOM / HABEN","verb":"lohnen","turkish":"değmek / yararlı olmak","prateritum_form":"lohnte","partizip2":"gelohnt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Es lohnt sich nicht, darüber zu streiten.","tr":"Bunun üzerine tartışmaya değmez."},{"tense":"PRÄTERITUM","de":"Der Ausflug lohnte den Aufwand kaum.","tr":"Gezi zahmete pek değmedi."},{"tense":"PERFEKT","de":"Hat sich die ganze Arbeit gelohnt?","tr":"Tüm bu çalışmaya değdi mi?"},{"tense":"FUTUR I","de":"Ehrlichkeit wird sich am Ende lohnen.","tr":"Dürüstlük sonunda meyvesini verecek (değecek)."},{"tense":"KONJ II","de":"Das würde sich für uns beide lohnen.","tr":"Bu ikimiz için de değerdi (kazançlı olurdu)."}]},{"category":"NOMINATIV / HABEN","verb":"losen","turkish":"kura çekmek","prateritum_form":"loste","partizip2":"gelost","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir losen aus, wer anfangen darf.","tr":"Kimin başlayacağına kura çekerek karar veriyoruz."},{"tense":"PRÄTERITUM","de":"Sie losten die Gruppen für das Turnier.","tr":"Turnuva gruplarını kura ile belirlediler."},{"tense":"PERFEKT","de":"Wer hat heute gelost?","tr":"Bugün kurayı kim çekti?"},{"tense":"FUTUR I","de":"Wir werden morgen im Training losen.","tr":"Yarın idmanda kura çekeceğiz."},{"tense":"KONJ II","de":"Ich würde nicht losen, sondern entscheiden.","tr":"Kura çekmezdim, karar verirdim."}]},{"category":"AKKUSATIV / HABEN","verb":"löschen","turkish":"silmek / söndürmek / iptal etmek","prateritum_form":"löschte","partizip2":"gelöscht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Lösch bitte das Licht! - Er löscht die Datei.","tr":"Lütfen ışığı söndür! - O dosyayı siliyor."},{"tense":"PRÄTERITUM","de":"Die Feuerwehr löschte den Brand schnell.","tr":"İtfaiye yangını hızla söndürdü."},{"tense":"PERFEKT","de":"Hast du meinen Namen von der Liste gelöscht?","tr":"Adımı listeden sildin mi?"},{"tense":"FUTUR I","de":"Das System wird alle alten Daten löschen.","tr":"Sistem tüm eski veri
