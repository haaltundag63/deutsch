EN","verb":"manipulieren","turkish":"manipüle etmek / yönlendirmek (hileyle)","prateritum_form":"manipulierte","partizip2":"manipuliert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er manipuliert die öffentliche Meinung.","tr":"Kamuoyunu manipüle ediyor."},{"tense":"PRÄTERITUM","de":"Jemand manipulierte die Bremsen des Autos.","tr":"Birisi arabanın frenleriyle oynadı (manipüle etti)."},{"tense":"PERFEKT","de":"Hast du die Ergebnisse manipuliert?","tr":"Sonuçları manipüle mi ettin?"},{"tense":"FUTUR I","de":"Niemand wird mich manipulieren.","tr":"Kimse beni manipüle edemeyecek."},{"tense":"KONJ II","de":"Ich würde mich nicht so leicht manipulieren lassen.","tr":"Kendimi bu kadar kolay manipüle ettirmezdim."}]},{"category":"AKKUSATIV / HABEN","verb":"markieren","turkish":"işaretlemek","prateritum_form":"markierte","partizip2":"markiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich markiere die wichtigen Stellen im Text.","tr":"Metindeki önemli yerleri işaretliyorum."},{"tense":"PRÄTERITUM","de":"Er markierte den Termin im Kalender.","tr":"Takvimde tarihi işaretledi."},{"tense":"PERFEKT","de":"Hast du die Kartons markiert?","tr":"Kutuları işaretledin mi?"},{"tense":"FUTUR I","de":"Das System wird Fehler automatisch markieren.","tr":"Sistem hataları otomatik olarak işaretleyecek."},{"tense":"KONJ II","de":"Ich würde es rot markieren, damit man es sieht.","tr":"Görülmesi için kırmızıyla işaretlerdim."}]},{"category":"AKKUSATIV / HABEN","verb":"martern","turkish":"işkence etmek / eziyet etmek","prateritum_form":"marterte","partizip2":"gemartert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Schuldgefühle martern sein Gewissen.","tr":"Suçluluk duygusu vicdanına eziyet ediyor."},{"tense":"PRÄTERITUM","de":"Man marterte die Gefangenen im Mittelalter.","tr":"Orta Çağ'da tutsaklara işkence ederlerdi."},{"tense":"PERFEKT","de":"Hast du dir den Kopf darüber gemartert? (Deyim)","tr":"Bunun üzerine çok mu kafa yordun (kendine eziyet mi ettin)?"},{"tense":"FUTUR I","de":"Diese Ungewissheit wird ihn weiter martern.","tr":"Bu belirsizlik ona eziyet etmeye devam edecek."},{"tense":"KONJ II","de":"Ich würde mich nicht wegen einer kleinen Sache martern.","tr":"Küçük bir şey için kendime eziyet etmezdim."}]},{"category":"NOMINATIV / HABEN","verb":"masturbieren","turkish":"mastürbasyon yapmak","prateritum_form":"masturbierte","partizip2":"masturbiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Menschen masturbieren aus verschiedenen Gründen.","tr":"İnsanlar çeşitli nedenlerle mastürbasyon yaparlar."},{"tense":"PRÄTERITUM","de":"Er masturbierte heimlich.","tr":"Gizlice mastürbasyon yaptı."},{"tense":"PERFEKT","de":"Hast du heute schon masturbiert?","tr":"Bugün mastürbasyon yaptın mı?"},{"tense":"FUTUR I","de":"Die Jugend wird immer masturbieren.","tr":"Gençlik her zaman mastürbasyon yapacaktır."},{"tense":"KONJ II","de":"Das Thema würde weniger tabu sein, wenn wir drüber sprächen.","tr":"Hakkında konuşsaydık konu daha az tabu olurdu."}]},{"category":"AKKUSATIV / HABEN","verb":"mästen","turkish":"besiye çekmek / (hayvanı) şişmanlatmak","prateritum_form":"mästete","partizip2":"gemästet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Bauer mästet die Schweine für die Schlacht.","tr":"Çiftçi domuzları kesim için besiye çekiyor."},{"tense":"PRÄTERITUM","de":"Man mästete die Gans vor Weihnachten.","tr":"Noel öncesi kazı şişmanlattılar."},{"tense":"PERFEKT","de":"Hast du das Tier zu sehr gemästet?","tr":"Hayvanı çok mu besiye çektin (şişmanlattın)?"},{"tense":"FUTUR I","de":"In der Massentierhaltung wird man sie schnell mästen.","tr":"Endüstriyel hayvancılıkta onları hızlıca besiye çekecekler."},{"tense":"KONJ II","de":"Ich würde meine Katze nicht so mästen.","tr":"Kedimi bu kadar şişmanlatmazdım (besiye çekmezdim)."}]},{"category":"AKK / NOM / HABEN","verb":"mauern","turkish":"duvar örmek / (mecaz) ağzını sıkı tutmak","prateritum_form":"mauerte","partizip2":"gemauert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Maurer mauert die Wand. - Die Regierung mauert bei Fragen.","tr":"Duvarcı duvarı örüyor. - Hükümet sorularda ketum davranıyor."},{"tense":"PRÄTERITUM","de":"Er mauerte das Fenster zu.","tr":"Pencereyi duvarla kapattı (ördü)."},{"tense":"PERFEKT","de":"Habt ihr die Gartenmauer selbst gemauert?","tr":"Bahçe duvarını kendiniz mi ördünüz?"},{"tense":"FUTUR I","de":"Wir werden das Loch in der Mauer zumauern.","tr":"Duvarın içindeki deliği örerek kapatacağız."},{"tense":"KONJ II","de":"Ich würde nicht mauern, sondern die Wahrheit sagen.","tr":"Ketum davranmazdım (duvar örmezdim), gerçeği söylerdim."}]},{"category":"NOMINATIV / HABEN","verb":"maulen","turkish":"surat asmak / söylenmek (şikayetçi)","prateritum_form":"maulte","partizip2":"gemault","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Hör auf zu maulen ve iss dein Gemüse!","tr":"Söylenmeyi (surat asmayı) bırak ve sebzeni ye!"},{"tense":"PRÄTERITUM","de":"Das Kind maulte den ganzen Nachmittag.","tr":"Çocuk tüm öğleden sonra surat astı/söylendi."},{"tense":"PERFEKT","de":"Hat er wegen der Verspätung gemault?","tr":"Gecikme yüzünden söylendi (surat astı) mi?"},{"tense":"FUTUR I","de":"Du wirst sicher wieder maulen, wenn es regnet.","tr":"Yağmur yağarsa kesin yine söyleneceksin."},{"tense":"KONJ II","de":"Ich würde nicht maulen, wenn ich an deiner Stelle wäre.","tr":"Senin yerinde olsam söylenmezdim."}]},{"category":"AKKUSATIV / HABEN","verb":"maximieren","turkish":"maksimize etmek / en üst düzeye çıkarmak","prateritum_form":"maximierte","partizip2":"maximiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Firma maximiert ihren Gewinn.","tr":"Şirket kârını maksimize ediyor."},{"tense":"PRÄTERITUM","de":"Wir maximierten die Effizienz des Prozesses.","tr":"Sürecin verimliliğini en üst düzeye çıkardık."},{"tense":"PERFEKT","de":"Hast du die Fenstergröße maximiert?","tr":"Pencere boyutunu (ekranı) maksimize ettin mi?"},{"tense":"FUTUR I","de":"Wir werden unsere Erfolgschancen maximieren.","tr":"Başarı şansımızı en üst düzeye çıkaracağız."},{"tense":"KONJ II","de":"Ich würde die Zeit für das Lernen maximieren.","tr":"Ders çalışma süresini maksimize ederdim."}]},{"category":"AKKUSATIV / HABEN","verb":"mechanisieren","turkish":"mekanize etmek / makineleşmek","prateritum_form":"mechanisierte","partizip2":"mechanisiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Landwirtschaft mechanisiert sich immer mehr.","tr":"Tarım gittikçe daha fazla makineleşiyor."},{"tense":"PRÄTERITUM","de":"Man mechanisierte die Produktion in den 20er Jahren.","tr":"20'li yıllarda üretimi makineleştirdiler."},{"tense":"PERFEKT","de":"Wurde die Fabrik vollständig mechanisiert?","tr":"Fabrika tamamen makineleştirildi mi?"},{"tense":"FUTUR I","de":"KI wird viele Aufgaben weiter mechanisieren.","tr":"Yapay zeka birçok görevi daha fazla makineleştirecek."},{"tense":"KONJ II","de":"Es würde die Arbeit erleichtern, wenn wir sie mechanisieren würden.","tr":"Makineleştirseydik işi kolaylaştırırdı."}]},{"category":"ÜBER + AKK / HABEN","verb":"meckern","turkish":"mızmızlanmak / dırdır etmek / (keçi gibi) melemek","prateritum_form":"meckerte","partizip2":"gemeckert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Hör auf über das Essen zu meckern!","tr":"Yemek hakkında mızmızlanmayı bırak!"},{"tense":"PRÄTERITUM","de":"Die Ziege meckerte laut auf der Wiese.","tr":"Keçi çayırda yüksek sesle meledi."},{"tense":"PERFEKT","de":"Hat er schon wieder über die Arbeit gemeckert?","tr":"Yine iş hakkında dırdır mı etti?"},{"tense":"FUTUR I","de":"Die Leute werden immer über die Steuern meckern.","tr":"İnsanlar her zaman vergiler hakkında mızmızlanacak."},{"tense":"KONJ II","de":"Ich würde nicht meckern, wenn alles perfekt wäre.","tr":"Her şey mükemmel olsaydı dırdır etmezdim."}]},{"category":"NOMINATIV / HABEN","verb":"meditieren","turkish":"meditasyon yapmak","prateritum_form":"meditierte","partizip2":"meditiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich meditiere 20 Minuten am Tag.","tr":"Günde 20 dakika meditasyon yapıyorum."},{"tense":"PRÄTERITUM","de":"Er meditierte oft im Wald.","tr":"Sık sık ormanda meditasyon yapardı."},{"tense":"PERFEKT","de":"Hast du heute Morgen schon meditiert?","tr":"Bu sabah meditasyon yaptın mı?"},{"tense":"FUTUR I","de":"Du wirst dich besser fühlen, wenn du meditierst.","tr":"Meditasyon yaparsan (yaptığında) daha iyi hissedeceksin."},{"tense":"KONJ II","de":"Ich würde öfter meditieren, wenn ich Zeit hätte.","tr":"Vaktim olsaydı daha sık meditasyon yapardım."}]},{"category":"AKKUSATIV / HABEN","verb":"meiden","turkish":"kaçınmak / sakınmak","prateritum_form":"mied","partizip2":"gemieden","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er meidet fettiges Essen.","tr":"Yağlı yiyeceklerden kaçınıyor."},{"tense":"PRÄTERITUM","de":"Sie mied jeden Blickkontakt.","tr":"Göz temasından (her türlüsünden) kaçındı."},{"tense":"PERFEKT","de":"Hast du diesen Ort absichtlich gemieden?","tr":"Bu yerden bilerek mi kaçındın?"},{"tense":"FUTUR I","de":"Ich werde Konflikte in Zukunft meiden.","tr":"Gelecekte çatışmalardan kaçınacağım."},{"tense":"KONJ II","de":"Ich würde dieses Risiko an deiner Stelle meiden.","tr":"Senin yerinde olsam bu riskten kaçınırdım."}]},{"category":"AKK / ZU + DAT / HABEN","verb":"meinen","turkish":"kastetmek / düşünmek / sanmak","prateritum_form":"meinte","partizip2":"gemeint","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Was meinst du damit? - Ich meine es ernst.","tr":"Bununla neyi kastediyorsun? - Ciddiyim (ciddi düşünüyorum)."},{"tense":"PRÄTERITUM","de":"Er meinte, dass er keine Zeit habe.","tr":"Vakti olmadığını söyledi/düşündü."},{"tense":"PERFEKT","de":"Das habe ich nicht so gemeint!","tr":"Öyle demek istemedim! (Onu kastetmedim!)"},{"tense":"FUTUR I","de":"Er wird es nur gut mit dir meinen.","tr":"O sadece senin iyiliğini isteyecektir (niyeti iyidir)."},{"tense":"KONJ II","de":"Ich würde meinen, dass das die beste Lösung ist.","tr":"Bunun en iyi çözüm olduğunu düşünürdüm."}]},{"category":"AKKUSATIV / HABEN","verb":"meistern","turkish":"başarmak / üstesinden gelmek / ustalaşmak","prateritum_form":"meisterte","partizip2":"gemeistert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie meistert alle Aufgaben mit Bravour.","tr":"Tüm görevleri üstün başarıyla yerine getiriyor."},{"tense":"PRÄTERITUM","de":"Er meisterte die Krise ganz allein.","tr":"Krizin üstesinden tek başına geldi."},{"tense":"PERFEKT","de":"Hast du die Prüfung endlich gemeistert?","tr":"Sınavı nihayet başardın mı?"},{"tense":"FUTUR I","de":"Wir werden auch diese Hürde meistern.","tr":"Bu engeli de aşacağız (üstesinden geleceğiz)."},{"tense":"KONJ II","de":"Ich würde es meistern, wenn ich mehr Hilfe hätte.","tr":"Daha fazla yardımım olsaydı bunun üstesinden gelirdim."}]},{"category":"AKK / REFL / HABEN","verb":"melden","turkish":"bildirmek / haber vermek / (kendini) tanıtmak","prateritum_form":"meldete","partizip2":"gemeldet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Bitte melden Sie den Fehler sofort.","tr":"Lütfen hatayı derhal bildirin."},{"tense":"PRÄTERITUM","de":"Er meldete sich krank.","tr":"Hasta olduğunu bildirdi."},{"tense":"PERFEKT","de":"Hast du dich schon bei ihm gemeldet?","tr":"Ona (ulaşıp) haber verdin mi / kendini hatırlattın mı?"},{"tense":"FUTUR I","de":"Ich werde mich morgen bei dir melden.","tr":"Seni yarın arayacağım / sana yarın haber vereceğim."},{"tense":"KONJ II","de":"Würdest du dich bitte melden, wenn du ankommst?","tr":"Vardığında lütfen haber verir misin?"}]},{"category":"AKKUSATIV / HABEN","verb":"melken","turkish":"sağmak (süt)","prateritum_form":"molk / melkte","partizip2":"gemolken","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Bauer melkt die Kühe um fünf Uhr morgens.","tr":"Çiftçi inekleri sabah beşte sağıyor."},{"tense":"PRÄTERITUM","de":"Früher molk man die Ziegen noch von Hand.","tr":"Eskiden keçileri elle sağarlardı."},{"tense":"PERFEKT","de":"Ist die Kuh schon gemolken worden?","tr":"İnek çoktan sağıldı mı?"},{"tense":"FUTUR I","de":"Eine Maschine wird die Arbeit melken.","tr":"Sağma işini bir makine yapacak."},{"tense":"KONJ II","de":"Ich würde melken, wenn ich wüsste, wie es geht.","tr":"Nasıl yapıldığını bilseydim sağardım."}]},{"category":"AKK / REFL / HABEN","verb":"mengen","turkish":"karıştırmak / (bir şeye) katmak","prateritum_form":"mengte","partizip2":"gemengt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er mengt das Salz unter den Teig.","tr":"Tuzu hamura katıyor (karıştırıyor)."},{"tense":"PRÄTERITUM","de":"Sie mengte sich unter die Leute.","tr":"İnsanların arasına karıştı."},{"tense":"PERFEKT","de":"Hast du die Zutaten gut gemengt?","tr":"Malzemeleri iyi karıştırdın mı?"},{"tense":"FUTUR I","de":"Wir werden den Dünger unter die Erde mengen.","tr":"Gübreyi toprağa katacağız."},{"tense":"KONJ II","de":"Ich würde mich nicht in ihre Angelegenheiten mengen.","tr":"Onların işlerine karışmazdım."}]},{"category":"AKK / DAT (REFL) / HABEN","verb":"merken","turkish":"fark etmek / akılda tutmak","prateritum_form":"merkte","partizip2":"gemerkt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich merke mir deine Telefonnummer. - Merkst du den Unterschied?","tr":"Telefon numaranı aklımda tutuyorum. - Farkı fark ediyor musun?"},{"tense":"PRÄTERITUM","de":"Er merkte sofort, dass etwas nicht stimmt.","tr":"Bir şeylerin ters gittiğini hemen fark etti."},{"tense":"PERFEKT","de":"Hast du dir das Datum gemerkt?","tr":"Tarihi aklında tuttun mu?"},{"tense":"FUTUR I","de":"Du wirst es früh genug merken.","tr":"Bunu yeterince erken fark edeceksin."},{"tense":"KONJ II","de":"Das würde ich mir nie merken können.","tr":"Bunu asla aklımda tutamazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"messen","turkish":"ölçmek","prateritum_form":"maß","partizip2":"gemessen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Arzt misst meinen Blutdruck. (ich messe, du misst, er misst)","tr":"Doktor tansiyonumu ölçüyor."},{"tense":"PRÄTERITUM","de":"Wir maßen die Länge des Zimmers.","tr":"Odanın uzunluğunu ölçtük."},{"tense":"PERFEKT","de":"Hast du schon Fieber gemessen?","tr":"Ateşini ölçtün mü?"},{"tense":"FUTUR I","de":"Die Sensoren werden die Temperatur messen.","tr":"Sensörler sıcaklığı ölçecek."},{"tense":"KONJ II","de":"Ich würde es noch einmal messen, um sicher zu gehen.","tr":"Emin olmak için bir kez daha ölçerdim."}]},{"category":"AKKUSATIV / HABEN","verb":"mieten","turkish":"kiralamak (tutan kişi için)","prateritum_form":"mietete","partizip2":"gemietet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir mieten eine Wohnung in Berlin.","tr":"Berlin'de bir daire kiralıyoruz."},{"tense":"PRÄTERITUM","de":"Er mietete für den Urlaub ein Auto.","tr":"Tatil için bir araba kiraladı."},{"tense":"PERFEKT","de":"Hast du das Haus schon gemietet?","tr":"Evi çoktan kiraladın mı?"},{"tense":"FUTUR I","de":"Wir werden uns ein Boot mieten.","tr":"Kendimize bir tekne kiralayacağız."},{"tense":"KONJ II","de":"Ich würde diese Wohnung nicht mieten, sie ist zu teuer.","tr":"Bu daireyi kiralamazdım, çok pahalı."}]},{"category":"AKKUSATIV / HABEN","verb":"mildern","turkish":"yumuşatmak / hafifletmek","prateritum_form":"milderter","partizip2":"gemildert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Diese Creme mildert Falten.","tr":"Bu krem kırışıklıkları hafifletiyor."},{"tense":"PRÄTERITUM","de":"Der Richter milderte das Urteil.","tr":"Hakim kararı (cezayı) hafifletti."},{"tense":"PERFEKT","de":"Hat der Regen die Hitze gemildert?","tr":"Yağmur sıcağı hafifletti mi?"},{"tense":"FUTUR I","de":"Wir werden die Auswirkungen der Krise mildern müssen.","tr":"Krizin etkilerini hafifletmek zorunda kalacağız."},{"tense":"KONJ II","de":"Ich würde den Geschmack mit etwas Zucker mildern.","tr":"Tadını biraz şekerle yumuşatırdım."}]},{"category":"AKKUSATIV / HABEN","verb":"mindern","turkish":"azaltmak / değerini düşürmek","prateritum_form":"minderte","partizip2":"gemindert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das mindert meine Freude an der Arbeit.","tr":"Bu, işteki sevincimi azaltıyor."},{"tense":"PRÄTERITUM","de":"Der Schaden minderte den Wert des Autos.","tr":"Hasar, arabanın değerini düşürdü."},{"tense":"PERFEKT","de":"Hat das dein Vertrauen gemindert?","tr":"Bu senin güvenini azalttı mı?"},{"tense":"FUTUR I","de":"Man wird die Steuern sicher nicht mindern.","tr":"Vergileri kesinlikle azaltmayacaklar."},{"tense":"KONJ II","de":"Das würde meine Chancen mindern.","tr":"Bu benim şansımı azaltırdı."}]},{"category":"AKK / REFL / HABEN","verb":"mischen","turkish":"karıştırmak / (kağıt) karmak","prateritum_form":"mischte","partizip2":"gemischt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich mische Blau ve Gelb. - Er mischt die Karten.","tr":"Mavi ve sarıyı karıştırıyorum. - Kağıtları karıyor."},{"tense":"PRÄTERITUM","de":"Sie mischte sich in das Gespräch ein.","tr":"Konuşmaya dahil oldu (karıştı)."},{"tense":"PERFEKT","de":"Hast du die Farben schon gemischt?","tr":"Renkleri çoktan karıştırdın mı?"},{"tense":"FUTUR I","de":"Die Karten werden neu gemischt. (Deyim)","tr":"Kartlar yeniden karılacak (her şey baştan başlayacak)."},{"tense":"KONJ II","de":"Ich würde mich da nicht einmischen.","tr":"Ben olsam buna karışmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"missachten","turkish":"hiçe saymak / görmezden gelmek / ihlal etmek","prateritum_form":"missachtete","partizip2":"missachtet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er missachtet die Verkehrsregeln.","tr":"Trafik kurallarını hiçe sayıyor (ihlal ediyor)."},{"tense":"PRÄTERITUM","de":"Sie missachtete meine Warnung.","tr":"Uyarımı görmezden geldi (hiçe saydı)."},{"tense":"PERFEKT","de":"Hast du die Sicherheitsvorschriften missachtet?","tr":"Güvenlik talimatlarını hiçe mi saydın?"},{"tense":"FUTUR I","de":"Wer die Natur missachtet, wird bestraft.","tr":"Doğayı hiçe sayan cezalandırılacak."},{"tense":"KONJ II","de":"Ich würde niemals seine Meinung missachten.","tr":"Onun fikrini asla hiçe saymazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"missbilligen","turkish":"onaylamamak / uygun bulmamak","prateritum_form":"missbilligte","partizip2":"missbilligt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Mein Vater missbilligt meinen Lebensstil.","tr":"Babam yaşam tarzımı onaylamıyor."},{"tense":"PRÄTERITUM","de":"Die Gesellschaft missbilligte ihr Verhalten.","tr":"Toplum onun davranışını onaylamadı."},{"tense":"PERFEKT","de":"Hat der Chef den Vorschlag missbilligt?","tr":"Patron öneriyi uygun bulmadı (onaylamadı) mı?"},{"tense":"FUTUR I","de":"Viele werden diese Entscheidung missbilligen.","tr":"Birçok kişi bu kararı onaylamayacak."},{"tense":"KONJ II","de":"Ich würde es missbilligen, wenn du rauchst.","tr":"Sigara içmeni onaylamazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"missbrauchen","turkish":"kötüye kullanmak / istismar etmek","prateritum_form":"missbrauchte","partizip2":"missbraucht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er missbraucht meine Gastfreundschaft.","tr":"Misafirperverliğimi kötüye kullanıyor."},{"tense":"PRÄTERITUM","de":"Jemand missbrauchte seine Kreditkartendaten.","tr":"Birisi kredi kartı bilgilerini kötüye kullandı (istismar etti)."},{"tense":"PERFEKT","de":"Hast du sein Vertrauen missbraucht?","tr":"Onun güvenini kötüye mi kullandın?"},{"tense":"FUTUR I","de":"Niemand wird seine Macht missbrauchen dürfen.","tr":"Kimsenin gücünü kötüye kullanmasına izin verilmeyecek."},{"tense":"KONJ II","de":"Ich würde niemals ein Kind missbrauchen.","tr":"Asla bir çocuğu istismar etmezdim."}]},{"category":"DATIV / HABEN","verb":"missfallen","turkish":"hoşuna gitmemek","prateritum_form":"missfiel","partizip2":"missfallen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Dein Ton missfällt mir sehr.","tr":"Ses tonun hiç hoşuma gitmiyor."},{"tense":"PRÄTERITUM","de":"Seine Antwort missfiel dem Lehrer.","tr":"Cevabı öğretmenin hoşuna gitmedi."},{"tense":"PERFEKT","de":"Hat dir das Hotel missfallen?","tr":"Otel hoşuna gitmedi mi?"},{"tense":"FUTUR I","de":"Die neue Regelung wird vielen Leuten missfallen.","tr":"Yeni düzenleme birçok insanın hoşuna gitmeyecek."},{"tense":"KONJ II","de":"Es würde mir missfallen, wenn du ohne mich gehst.","tr":"Bensiz gidersen hoşuma gitmezdi."}]},{"category":"DATIV / SEIN","verb":"misslingen","turkish":"başarısız olmak / (işi) rast gitmemek","prateritum_form":"misslang","partizip2":"misslungen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Der Versuch misslingt meistens beim ersten Mal.","tr":"Deney genellikle ilk seferde başarısız olur."},{"tense":"PRÄTERITUM","de":"Der Kuchen misslang ihr völlig.","tr":"Kek (yapımı) onda tamamen başarısız oldu (keki beceremedi)."},{"tense":"PERFEKT","de":"Ist der Plan misslungen?","tr":"Plan başarısız mı oldu (suya mı düştü)?"},{"tense":"FUTUR I","de":"Es wird uns nicht noch einmal misslingen.","tr":"Bir kez daha başarısız olmayacağız."},{"tense":"KONJ II","de":"Ich hätte Angst, dass es mir misslingen würde.","tr":"Başarısız olmaktan korkardım."}]},{"category":"AKKUSATIV / HABEN","verb":"missverstehen","turkish":"yanlış anlamak","prateritum_form":"missverstand","partizip2":"missverstanden","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Du missverstehst mich völlig.","tr":"Beni tamamen yanlış anlıyorsun."},{"tense":"PRÄTERITUM","de":"Er missverstand den Hinweis.","tr":"İpucunu (işareti) yanlış anladı."},{"tense":"PERFEKT","de":"Habe ich etwas missverstanden?","tr":"Bir şeyi yanlış mı anladım?"},{"tense":"FUTUR I","de":"Man wird die Nachricht sicher nicht missverstehen.","tr":"Mesajı kesinlikle yanlış anlamayacaklar."},{"tense":"KONJ II","de":"Ich würde dich nie missverstehen wollen.","tr":"Seni asla yanlış anlamak istemezdim."}]},{"category":"AKKUSATIV / HABEN","verb":"miterleben","turkish":"(birlikte) yaşamak / tanık olmak","prateritum_form":"erlebte mit","partizip2":"miterlebt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich erlebe den Sonnenaufgang mit.","tr":"Gün doğumuna (birlikte/o an oradayken) tanık oluyorum."},{"tense":"PRÄTERITUM","de":"Er erlebte den Mauerfall in Berlin mit.","tr":"Berlin Duvarı'nın yıkılışına (orada bulunarak) tanık oldu."},{"tense":"PERFEKT","de":"Hast du das Konzert miterlebt?","tr":"Konseri (canlı olarak/orada bulunarak) deneyimledin mi?"},{"tense":"FUTUR I","de":"Wir werden diesen historischen Moment miterleben.","tr":"Bu tarihi ana tanıklık edeceğiz (birlikte yaşayacağız)."},{"tense":"KONJ II","de":"Ich würde das gerne noch einmal miterleben.","tr":"Buna bir kez daha tanık olmayı/yaşamayı çok isterdim."}]},{"category":"MIT + DAT / HABEN","verb":"mitfühlen","turkish":"duygularını paylaşmak / empati kurmak","prateritum_form":"fühlte mit","partizip2":"mitgefühlt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich fühle mit dir mit.","tr":"Acını/duygularını paylaşıyorum (seninle hissediyorum)."},{"tense":"PRÄTERITUM","de":"Alle fühlten mit den Opfern mit.","tr":"Herkes kurbanların duygularını paylaştı (empati kurdu)."},{"tense":"PERFEKT","de":"Hast du jemals so mit jemandem mitgefühlt?","tr":"Hiç biriyle bu kadar empati kurdun mu?"},{"tense":"FUTUR I","de":"Die Menschen werden immer mitfühlen.","tr":"İnsanlar her zaman empati kuracaktır."},{"tense":"KONJ II","de":"Ich würde mehr mitfühlen, wenn ich die Situation verstünde.","tr":"Durumu anlasaydım daha çok empati kurardım."}]},{"category":"DAT + AKK / HABEN","verb":"mitteilen","turkish":"bildirmek / haber vermek / paylaşmak","prateritum_form":"teilte mit","partizip2":"mitgeteilt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich teile dir meine Entscheidung später mit.","tr":"Kararımı sana daha sonra bildireceğim."},{"tense":"PRÄTERITUM","de":"Er teilte uns den Termin schriftlich mit.","tr":"Tarihi bize yazılı olarak bildirdi."},{"tense":"PERFEKT","de":"Hat man dir das Ergebnis schon mitgeteilt?","tr":"Sonuç sana çoktan bildirildi mi?"},{"tense":"FUTUR I","de":"Wir werden euch alles Wichtige mitteilen.","tr":"Önemli olan her şeyi size bildireceğiz."},{"tense":"KONJ II","de":"Ich würde es dir mitteilen, eğer bir haber alırsam.","tr":"Bir haber alırsam sana bildirirdim."}]},{"category":"AKKUSATIV / HABEN","verb":"modifizieren","turkish":"modifiye etmek / üzerinde değişiklik yapmak","prateritum_form":"modifizierte","partizip2":"modifiziert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er modifiziert sein Auto für das Rennen.","tr":"Yarış için arabasını modifiye ediyor."},{"tense":"PRÄTERITUM","de":"Wir modifizierten den Plan im letzten Moment.","tr":"Planı son anda değiştirdik (üzerinde oynadık)."},{"tense":"PERFEKT","de":"Hast du die Software modifiziert?","tr":"Yazılımı modifiye ettin mi?"},{"tense":"FUTUR I","de":"Wir werden das Design noch einmal modifizieren.","tr":"Tasarımı bir kez daha modifiye edeceğiz."},{"tense":"KONJ II","de":"Ich würde die Regeln etwas modifizieren.","tr":"Kuralları biraz değiştirirdim (modifiye ederdim)."}]},{"category":"AKK / ZU + DAT / HABEN","verb":"motivieren","turkish":"motive etmek / teşvik etmek","prateritum_form":"motivierte","partizip2":"motiviert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Trainerin motiviert die Mannschaft.","tr":"Antrenör takımı motive ediyor."},{"tense":"PRÄTERITUM","de":"Sein Erfolg motivierte mich sehr.","tr":"Onun başarısı beni çok motive etti."},{"tense":"PERFEKT","de":"Wer hat dich zu diesem Schritt motiviert?","tr":"Seni bu adıma kim teşvik etti (motive etti)?"},{"tense":"FUTUR I","de":"Gute Noten werden dich weiter motivieren.","tr":"İyi notlar seni daha fazla motive edecek."},{"tense":"KONJ II","de":"Ich würde die Mitarbeiter besser motivieren.","tr":"Çalışanları daha iyi motive ederdim."}]},{"category":"MODALVERB / HABEN","verb":"müssen","turkish":"zorunda olmak / -meli / -malı","prateritum_form":"musste","partizip2":"gemusst","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich muss jetzt gehen. (ich muss, du musst, er muss)","tr":"Şimdi gitmek zorundayım (gitmeliyim)."},{"tense":"PRÄTERITUM","de":"Wir mussten lange warten.","tr":"Uzun süre beklemek zorunda kaldık."},{"tense":"PERFEKT","de":"Ich habe gestern arbeiten müssen. (Ersatzinfinitiv)","tr":"Dün çalışmak zorunda kaldım."},{"tense":"FUTUR I","de":"Du wirst es allein tun müssen.","tr":"Bunu tek başına yapmak zorunda kalacaksın."},{"tense":"KONJ II","de":"Müsste ich das nicht wissen?","tr":"Bunu bilmem gerekmez miydi (zorunda değil miydim)?"}]},{"category":"NOMINATIV / HABEN","verb":"mutmaßen","turkish":"tahmin etmek / varsaymak","prateritum_form":"mutmaßte","partizip2":"gemutmaßt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Experten mutmaßen über die Ursache.","tr":"Uzmanlar neden hakkında tahmin yürütüyorlar."},{"tense":"PRÄTERITUM","de":"Er mutmaßte, dass sie bereits weg sei.","tr":"Onun çoktan gitmiş olduğunu varsaydı."},{"tense":"PERFEKT","de":"Man hat viel über sein Privatleben gemutmaßt.","tr":"Özel hayatı hakkında çok tahmin yürütüldü."},{"tense":"FUTUR I","de":"Wir werden nur mutmaßen können.","tr":"Sadece tahminde bulunabileceğiz."},{"tense":"KONJ II","de":"Ich würde nicht mutmaßen, sondern Fakten prüfen.","tr":"Tahmin yürütmez, gerçekleri kontrol ederdim."}]},{"category":"AKKUSATIV / HABEN","verb":"nachahmen","turkish":"taklit etmek (birini/sesi)","prateritum_form":"ahmte nach","partizip2":"nachgeahmt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Papagei ahmt Stimmen nach.","tr":"Papağan sesleri taklit ediyor."},{"tense":"PRÄTERITUM","de":"Er ahmte den Gang seines Vaters nach.","tr":"Babasının yürüyüşünü taklit etti."},{"tense":"PERFEKT","de":"Hast du das Verhalten nachgeahmt?","tr":"Bu davranışı taklit mi ettin?"},{"tense":"FUTUR I","de":"Kinder werden ihre Vorbilder nachahmen.","tr":"Çocuklar rol modellerini taklit edecekler."},{"tense":"KONJ II","de":"Ich würde diesen Stil nicht nachahmen wollen.","tr":"Bu stili taklit etmek istemezdim."}]},{"category":"ÜBER + AKK / HABEN","verb":"nachdenken","turkish":"üzerine düşünmek / kafa yormak","prateritum_form":"dachte nach","partizip2":"nachgedacht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich denke über deinen Vorschlag nach.","tr":"Önerin üzerine düşünüyorum."},{"tense":"PRÄTERITUM","de":"Er dachte lange über die Antwort nach.","tr":"Cevap üzerine uzun süre düşündü."},{"tense":"PERFEKT","de":"Hast du darüber nachgedacht, was ich sagte?","tr":"Söylediğim şey hakkında düşündün mü?"},{"tense":"FUTUR I","de":"Wir werden gründlich darüber nachdenken.","tr":"Bunun üzerine derinlemesine düşüneceğiz."},{"tense":"KONJ II","de":"Ich würde an deiner Stelle noch mal nachdenken.","tr":"Senin yerinde olsam bir kez daha düşünürdüm."}]},{"category":"DATIV / SEIN","verb":"nachfolgen","turkish":"ardından gelmek / yerine geçmek (halefi olmak)","prateritum_form":"folgte nach","partizip2":"nachgefolgt","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Wer folgt dem König nach?","tr":"Kralın yerine kim geçecek (ardından gelecek)?"},{"tense":"PRÄTERITUM","de":"Er folgte seinem Vater im Geschäft nach.","tr":"İşte babasının yerine geçti."},{"tense":"PERFEKT","de":"Sie ist ihm als Schulleiterin nachgefolgt.","tr":"Okul müdürü olarak onun yerine geçti."},{"tense":"FUTUR I","de":"Eine neue Generation wird uns nachfolgen.","tr":"Ardımızdan yeni bir nesil gelecek."},{"tense":"KONJ II","de":"Es würde mich freuen, eğer sen bana nachfolgen würdest.","tr":"Eğer yerime sen geçseydin sevinirdim."}]},{"category":"DATIV / HABEN","verb":"nachgeben","turkish":"pes etmek / boyun eğmek / esnemek","prateritum_form":"gab nach","partizip2":"nachgegeben","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Klügere gibt nach. (Atasözü)","tr":"Akıllı olan (anlayışlı olan) pes eder/alttan alır."},{"tense":"PRÄTERITUM","de":"Er gab dem Druck schließlich nach.","tr":"Sonunda baskıya boyun eğdi."},{"tense":"PERFEKT","de":"Hat die Mauer dem Wasser nachgegeben?","tr":"Duvar suyun (basıncına) dayanamayıp çöktü mü?"},{"tense":"FUTUR I","de":"Ich werde keinen Millimeter nachgeben.","tr":"Bir milimetre bile taviz vermeyeceğim (gerilemeyeceğim)."},{"tense":"KONJ II","de":"Ich würde niemals so einfach nachgeben.","tr":"Asla bu kadar kolay pes etmezdim."}]},{"category":"DATIV / SEIN","verb":"nachkommen","turkish":"arkadan gelmek / (görevi) yerine getirmek","prateritum_form":"kam nach","partizip2":"nachgekommen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Geh schon vor, ich komme später nach.","tr":"Sen önden git, ben sonra arkadan gelirim."},{"tense":"PRÄTERITUM","de":"Er kam seinen Verpflichtungen nicht nach.","tr":"Yükümlülüklerini yerine getirmedi."},{"tense":"PERFEKT","de":"Sind alle Gäste nachgekommen?","tr":"Tüm misafirler (sonradan) geldi mi?"},{"tense":"FUTUR I","de":"Wir werden der Bitte gerne nachkommen.","tr":"Ricanızı memnuniyetle yerine getireceğiz."},{"tense":"KONJ II","de":"Ich würde dir gerne nachkommen, eğer yolumu bilseydim.","tr":"Yolu bilseydim arkandan gelirdim."}]},{"category":"NOMINATIV / HABEN","verb":"nachlassen","turkish":"azalmak / dinmek / gevşemek","prateritum_form":"ließ nach","partizip2":"nachgelassen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Regen lässt langsam nach.","tr":"Yağmur yavaş yavaş diniyor."},{"tense":"PRÄTERITUM","de":"Seine Kräfte ließen im Alter nach.","tr":"Yaşlandıkça gücü azaldı."},{"tense":"PERFEKT","de":"Hat der Schmerz endlich nachgelassen?","tr":"Ağrı nihayet dindi mi?"},{"tense":"FUTUR I","de":"Der Sturm wird bald nachlassen.","tr":"Fırtına yakında dindirecek (azalacak)."},{"tense":"KONJ II","de":"Ich würde nicht in meinen Bemühungen nachlassen.","tr":"Çabalarımda gevşemezdim (ara vermezdim)."}]},{"category":"DAT + AKK / HABEN","verb":"nachmachen","turkish":"taklit etmek / aynısını yapmak","prateritum_form":"machte nach","partizip2":"nachgemacht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Mach mir das erst mal nach!","tr":"Önce bir aynısını (benim yaptığım gibi) yap bakalım!"},{"tense":"PRÄTERITUM","de":"Er machte das Experiment im Labor nach.","tr":"Deneyi laboratuvarda tekrar etti (aynısını yaptı)."},{"tense":"PERFEKT","de":"Hast du die Unterschrift nachgemacht?","tr":"İmzayı taklit mi ettin (sahtesini mi yaptın)?"},{"tense":"FUTUR I","de":"Das wird mir so schnell keiner nachmachen.","tr":"Bunu kimse bu kadar çabuk benden görüp yapamaz."},{"tense":"KONJ II","de":"Ich würde dieses Rezept gerne nachmachen.","tr":"Bu tarifi (aynen) uygulamak/yapmak isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"nachprüfen","turkish":"kontrol etmek / tetkik etmek","prateritum_form":"prüfte nach","partizip2":"nachgeprüft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Polizei prüft die Angaben nach.","tr":"Polis bilgileri (tekrar) kontrol ediyor."},{"tense":"PRÄTERITUM","de":"Er prüfte die Rechnung genau nach.","tr":"Faturayı dikkatlice tetkik etti/kontrol etti."},{"tense":"PERFEKT","de":"Haben Sie die Daten schon nachgeprüft?","tr":"Verileri çoktan kontrol ettiniz mi?"},{"tense":"FUTUR I","de":"Wir werden die Fakten morgen nachprüfen.","tr":"Gerçekleri yarın tetkik edeceğiz."},{"tense":"KONJ II","de":"Ich würde es sicherheitshalber nachprüfen.","tr":"Güvenlik amacıyla kontrol ederdim."}]},{"category":"AKK / NOM / HABEN","verb":"nachschauen","turkish":"bakmak / kontrol etmek / arkasından bakmak","prateritum_form":"schaute nach","partizip2":"nachgeschaut","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schaue mal im Kühlschrank nach.","tr":"Bir buzdolabına bakayım (kontrol edeyim)."},{"tense":"PRÄTERITUM","de":"Er schaute ihr lange nach.","tr":"Uzun süre arkasından baktı."},{"tense":"PERFEKT","de":"Hast du im Wörterbuch nachgeschaut?","tr":"Sözlüğe baktın mı?"},{"tense":"FUTUR I","de":"Wir werden online nachschauen.","tr":"İnternetten kontrol edeceğiz/bakacağız."},{"tense":"KONJ II","de":"Könntest du bitte nachschauen, ob die Post da ist?","tr":"Posta gelmiş mi diye bir bakabilir misin lütfen?"}]},{"category":"AKKUSATIV / HABEN","verb":"nachschlagen","turkish":"(kitapta) aramak / bakmak","prateritum_form":"schlug nach","partizip2":"nachgeschlagen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich schlage das Wort im Lexikon nach.","tr":"Kelimeye ansiklopediden bakıyorum."},{"tense":"PRÄTERITUM","de":"Er schlug die Seite im Buch nach.","tr":"Kitaptan sayfayı bulup baktı."},{"tense":"PERFEKT","de":"Hast du die Adresse nachgeschlagen?","tr":"Adrese (kaynaklardan) baktın mı?"},{"tense":"FUTUR I","de":"Du wirst es im Internet nachschlagen können.","tr":"İnternetten bakabileceksin."},{"tense":"KONJ II","de":"Ich würde es nachschlagen, wenn ich das Buch hätte.","tr":"Kitap yanımda olsaydı bakardım."}]},{"category":"DAT + AKK / HABEN","verb":"nachsprechen","turkish":"tekrarlamak (söyleneni)","prateritum_form":"sprach nach","partizip2":"nachgesprochen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sprechen Sie mir bitte nach!","tr":"Lütfen benden sonra (dediklerimi) tekrar edin!"},{"tense":"PRÄTERITUM","de":"Die Kinder sprachen den Satz nach.","tr":"Çocuklar cümleyi tekrarladılar."},{"tense":"PERFEKT","de":"Hast du die Worte richtig nachgesprochen?","tr":"Kelimeleri doğru tekrarladın mı?"},{"tense":"FUTUR I","de":"Die Schüler werden die Vokabeln nachsprechen.","tr":"Öğrenciler kelimeleri tekrar edecekler."},{"tense":"KONJ II","de":"Ich würde es nachsprechen, eğer telaffuzu bilseydim.","tr":"Telaffuzu bilseydim tekrar ederdim."}]},{"category":"AKKUSATIV / HABEN","verb":"nähen","turkish":"dikmek (kumaş vb.)","prateritum_form":"nähte","partizip2":"genäht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Meine Oma näht ein neues Kleid.","tr":"Babaannem yeni bir elbise dikiyor."},{"tense":"PRÄTERITUM","de":"Er nähte den Knopf wieder an.","tr":"Düğmeyi yerine dikti."},{"tense":"PERFEKT","de":"Hast du das Loch in der Hose genäht?","tr":"Pantolondaki deliği diktin mi?"},{"tense":"FUTUR I","de":"Ich werde mir ein Kostüm nähen.","tr":"Kendime bir kostüm dikeceğim."},{"tense":"KONJ II","de":"Ich würde es nähen, wenn ich eine Nadel hätte.","tr":"İğnem olsaydı dikerdim."}]},{"category":"DAT / REFL / HABEN","verb":"nähern","turkish":"yaklaşmak","prateritum_form":"näherte","partizip2":"genähert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Schiff nähert sich dem Hafen.","tr":"Gemi limana yaklaşıyor."},{"tense":"PRÄTERITUM","de":"Wir näherten uns vorsichtig dem Haus.","tr":"Eve dikkatlice yaklaştık."},{"tense":"PERFEKT","de":"Hast du dich der Lösung genähert?","tr":"Çözüme yaklaştın mı?"},{"tense":"FUTUR I","de":"Das Flugzeug wird sich bald dem Ziel nähern.","tr":"Uçak yakında hedefe yaklaşacak."},{"tense":"KONJ II","de":"Ich würde mich ihm nicht nähern, er wirkt wütend.","tr":"Ona yaklaşmazdım, öfkeli görünüyor."}]},{"category":"AKK / REFL / HABEN","verb":"nähren","turkish":"beslemek / (mecaz) umut beslemek","prateritum_form":"nährte","partizip2":"genährt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Mutter nährt ihr Kind. - Misstrauen nährt Zweifel.","tr":"Anne çocuğunu besliyor. - Güvensizlik şüpheyi besler."},{"tense":"PRÄTERITUM","de":"Er nährte die Hoffnung auf einen Sieg.","tr":"Zafer umudunu besledi (diri tuttu)."},{"tense":"PERFEKT","de":"Wovon hast du dich im Urlaub genährt?","tr":"Tatilde neyle beslendin (ne yedin)?"},{"tense":"FUTUR I","de":"Diese Krise wird den Hass nur nähren.","tr":"Bu kriz nefreti sadece besleyecektir."},{"tense":"KONJ II","de":"Ich würde keine falschen Hoffnungen nähren.","tr":"Yersiz umutlar beslemezdim."}]},{"category":"AN + DAT / HABEN","verb":"naschen","turkish":"atıştırmak / (tatlı) aşırmak-yemek","prateritum_form":"naschte","partizip2":"genascht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Kind nascht heimlich aus der Keksdose.","tr":"Çocuk gizlice bisküvi kutusundan atıştırıyor."},{"tense":"PRÄTERITUM","de":"Wir naschten die Erdbeeren direkt vom Feld.","tr":"Çilekleri doğrudan tarladan aşırdık (yedik)."},{"tense":"PERFEKT","de":"Wer hat von der Schokolade genascht?", :"PRÄTERITUM","de":"Sie nickte kurz ein.","tr":"Kısa bir süre uyukladı (dalıp gitti)."},{"tense":"PERFEKT","de":"Hast du verstanden, was er genickt hat?","tr":"Onun başıyla onayladığı şeyi anladın mı?"},{"tense":"FUTUR I","de":"Alle werden freundlich nicken.","tr":"Herkes dostça başını sallayacak."},{"tense":"KONJ II","de":"Ich würde nicken, wenn ich einverstanden wäre.","tr":"Aynı fikirde olsaydım başımı sallardım."}]},{"category":"NOMINATIV / HABEN","verb":"niesen","turkish":"hapşırmak","prateritum_form":"nieste","partizip2":"geniest","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich muss ständig niesen.","tr":"Sürekli hapşırmam gerekiyor."},{"tense":"PRÄTERITUM","de":"Er nieste dreimal hintereinander.","tr":"Arka arkaya üç kez hapşırdı."},{"tense":"PERFEKT","de":"Hast du gerade geniest? - Gesundheit!","tr":"Az önce hapşırdın mı? - Çok yaşa!"},{"tense":"FUTUR I","de":"Wirst du schon wieder niesen?","tr":"Yine mi hapşıracaksın?"},{"tense":"KONJ II","de":"Ich würde nicht so laut niesen, wenn ich könnte.","tr":"Elimde olsaydı bu kadar yüksek sesle hapşırmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"nieten","turkish":"perçinlemek","prateritum_form":"nietete","partizip2":"genietet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Arbeiter nietet die Stahlplatten.","tr":"İşçi çelik plakaları perçinliyor."},{"tense":"PRÄTERITUM","de":"Man nietete die Teile fest zusammen.","tr":"Parçaları birbirine sıkıca perçinlediler."},{"tense":"PERFEKT","de":"Ist das Gehäuse genietet oder geschraubt?","tr":"Kasa perçinli mi yoksa vidalı mı?"},{"tense":"FUTUR I","de":"Wir werden das Blech morgen nieten.","tr":"Saçı yarın perçinleyeceğiz."},{"tense":"KONJ II","de":"Ich würde es nieten, damit es länger hält.","tr":"Daha uzun dayanması için perçinlerdim."}]},{"category":"AKKUSATIV / HABEN","verb":"nivellieren","turkish":"dengelemek / aynı seviyeye getirmek","prateritum_form":"nivellierte","partizip2":"nivelliert","hilfsverb":"haben","examples":[{"tense":"PRÄSE ion gerne normalisieren.","tr":"Durumu normalleştirmek isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"notieren","turkish":"not etmek / kaydetmek","prateritum_form":"notierte","partizip2":"notiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich notiere mir deine Adresse.","tr":"Adresini not ediyorum."},{"tense":"PRÄTERITUM","de":"Er notierte jedes Detail im Protokoll.","tr":"Her detayı protokole not etti."},{"tense":"PERFEKT","de":"Hast du die Telefonnummer notiert?","tr":"Telefon numarasını not ettin mi?"},{"tense":"FUTUR I","de":"Ich werde mir die Fragen notieren.","tr":"Soruları not edeceğim."},{"tense":"KONJ II","de":"Ich würde es mir notieren, wenn ich einen Stift hätte.","tr":"Kalemim olsaydı bunu not ederdim."}]},{"category":"AKK / ZU + DAT / HABEN","verb":"nötigen","turkish":"zorlamak / mecbur bırakmak","prateritum_form":"nötigte","partizip2":"genötigt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Niemand nötigt dich zu dieser Arbeit.","tr":"Kimse seni bu işe zorlamıyor."},{"tense":"PRÄTERITUM","de":"Er nötigte sie zur Unterschrift.","tr":"Onu imzaya zorladı (mecbur bıraktı)."},{"tense":"PERFEKT","de":"Fühlst du dich dazu genötigt?","tr":"Buna mecbur mu bırakılmış hissediyorsun?"},{"tense":"FUTUR I","de":"Man wird uns nicht zum Handeln nötigen können.","tr":"Bizi harekete geçmeye zorlayamayacaklar."},{"tense":"KONJ II","de":"Ich würde dich niemals dazu nötigen.","tr":"Seni buna asla zorlamazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"nuancieren","turkish":"ince farklarla belirtmek / nüans katmak","prateritum_form":"nuancierte","partizip2":"nuanciert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Maler nuanciert die Farben sehr fein.","tr":"Ressam renkleri çok ince nüanslarla işliyor."},{"tense":"PRÄTERITUM","de":"Er nuancierte seine Kritik ein wenig.","tr":"Eleştirisini biraz yumuşattı/farklılaştırdı."},{"tense":"PERFEKT","de":"Haben Sie Ihre Aussage genauer nuanciert?","tr":"İfadenizi daha detaylı/ayrıntıl ense":"FUTUR I","de":"Der Wind wird durch die Ritzen pfeifen.","tr":"Rüzgar çatlaklardan ıslık çalarak geçecek."},{"tense":"KONJ II","de":"Ich würde nicht in der Wohnung pfeifen.","tr":"Evin içinde ıslık çalmazdım."}]},{"category":"AKK / ZU + INF / HABEN","verb":"pflegen","turkish":"bakmak (hasta/cilt vb.) / özen göstermek / huyu olmak","prateritum_form":"pflegte","partizip2":"gepflegt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie pflegt ihren kranken Vater. - Er pflegt zu spät zu kommen.","tr":"Hasta babasına bakıyor. - Geç kalma huyu vardır."},{"tense":"PRÄTERITUM","de":"Er pflegte seinen Garten sehr sorgfältig.","tr":"Bahçesine çok özenle bakardı."},{"tense":"PERFEKT","de":"Hast du deine Kontakte gut gepflegt?","tr":"Bağlantılarını (arkadaşlıklarını) iyi korudun/sürdürdün mü?"},{"tense":"FUTUR I","de":"Wir werden diese Tradition pflegen.","tr":"Bu geleneği yaşatacağız/sürdüreceğiz."},{"tense":"KONJ II","de":"Ich würde meine Haut besser pflegen, wenn ich Zeit hätte.","tr":"Vaktim olsaydı cildime daha iyi bakardım."}]},{"category":"AKK / IN + AKK / HABEN","verb":"pfropfen","turkish":"tıkıştırmak / (bitki) aşılamak","prateritum_form":"pfropfte","partizip2":"gepfropft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er pfropft alles in den Koffer.","tr":"Her şeyi valize tıkıştırıyor."},{"tense":"PRÄTERITUM","de":"Der Gärtner pfropfte den Kirschbaum.","tr":"Bahçıvan kiraz ağacını aşıladı."},{"tense":"PERFEKT","de":"Hast du die Sachen einfach in den Schrank gepfropft?","tr":"Eşyaları öylece dolaba mı tıkıştırdın?"},{"tense":"FUTUR I","de":"Wir werden die Reben pfropfen müssen.","tr":"Asmaları aşılamamız gerekecek."},{"tense":"KONJ II","de":"Ich würde nicht so viel Kleidung in die Tasche pfropfen.","tr":"Çantaya bu kadar çok giysi tıkıştırmazdım."}]},{"category":"NOMINATIV / HABEN","verb":"phantasieren","turkish":"hayal kurmak / (hastalıkta) sayıklamak","prateritum_form":"phantasierte","partizip2":"phantasiert","hilfsverb":"haben","examples":[{" se":"KONJ II","de":"Ich würde mir die wichtigsten Punkte herauspicken.","tr":"En önemli noktaları cımbızla seçer gibi alırdım."}]},{"category":"NOMINATIV / HABEN","verb":"picknicken","turkish":"piknik yapmak","prateritum_form":"picknickte","partizip2":"gepicknickt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir picknicken am liebsten im Park.","tr":"En çok parkta piknik yapmayı seviyoruz."},{"tense":"PRÄTERITUM","de":"Sie picknickten am Ufer des Flusses.","tr":"Nehrin kıyısında piknik yaptılar."},{"tense":"PERFEKT","de":"Habt ihr am Wochenende gepicknickt?","tr":"Hafta sonu piknik yaptınız mı?"},{"tense":"FUTUR I","de":"Wir werden morgen im Wald picknicken.","tr":"Yarın ormanda piknik yapacağız."},{"tense":"KONJ II","de":"Ich würde picknicken, wenn es nicht regnen würde.","tr":"Yağmur yağmasaydı piknik yapardım."}]},{"category":"NOMINATIV / SEIN","verb":"pilgern","turkish":"hacca gitmek / bir yere akın etmek","prateritum_form":"pilgerte","partizip2":"gepilgert","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Tausende Fans pilgern zum Stadion.","tr":"Binlerce taraftar stadyuma akın ediyor."},{"tense":"PRÄTERITUM","de":"Er pilgerte nach Santiago de Compostela.","tr":"Santiago de Compostela'ya hac yolculuğu yaptı."},{"tense":"PERFEKT","de":"Sind sie zu dem heiligen Ort gepilgert?","tr":"Kutsal yere hacca/ziyarete mi gittiler?"},{"tense":"FUTUR I","de":"Viele Menschen werden zum Grab pilgern.","tr":"Birçok insan mezara akın edecek (ziyaret edecek)."},{"tense":"KONJ II","de":"Ich würde dorthin pilgern, wenn ich gläubig wäre.","tr":"İnançlı olsaydım oraya hac yolculuğu yapardım."}]},{"category":"NOMINATIV / HABEN","verb":"pimpeln","turkish":"mızmızlanmak / hastalıklı olmak","prateritum_form":"pimpelte","partizip2":"gepimpelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er pimpelt schon wieder wegen der Kälte.","tr":"Soğuk yüzünden yine mızmızlanıyor."},{"tense":"PRÄTERITUM","de":"Sie pimpelte die ganze Woche vor sich hin.","tr":"Bütün ha e","partizip2":"platziert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich platziere die Gläser im Schrank.","tr":"Bardakları dolaba yerleştiriyorum."},{"tense":"PRÄTERITUM","de":"Er platzierte den Ball genau im Eck.","tr":"Topu tam köşeye yerleştirdi (gönderdi)."},{"tense":"PERFEKT","de":"Hast du dich schon in der ersten Reihe platziert?","tr":"İlk sıraya yerleştin mi (oturdun mu)?"},{"tense":"FUTUR I","de":"Wir werden das Sofa am Fenster platzieren.","tr":"Kanepeyi pencere kenarına yerleştireceğiz."},{"tense":"KONJ II","de":"Ich würde die Lampe woanders platzieren.","tr":"Lambayı başka bir yere yerleştirirdim."}]},{"category":"REFL / HABEN","verb":"placken (sich)","turkish":"canı çıkana kadar çalışmak / didinmek","prateritum_form":"plackte","partizip2":"geplackt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er plackt sich den ganzen Tag für wenig Geld.","tr":"Az para için bütün gün didinip duruyor."},{"tense":"PRÄTERITUM","de":"Wir plackten uns wochenlang im Garten.","tr":"Bahçede haftalarca canımız çıkana kadar çalıştık."},{"tense":"PERFEKT","de":"Haben Sie sich umsonst so geplackt?","tr":"Boşuna mı bu kadar didindiniz?"},{"tense":"FUTUR I","de":"Du wirst dich nicht ewig so placken müssen.","tr":"Sonsuza kadar böyle didinmek zorunda kalmayacaksın."},{"tense":"KONJ II","de":"Ich würde mich nicht für diesen Chef placken.","tr":"Bu patron için kendimi paralamazdım (didinmezdim)."}]},{"category":"AKKUSATIV / HABEN","verb":"plagiieren","turkish":"intihal yapmak / (eser) çalmak","prateritum_form":"plagiierte","partizip2":"plagiiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Student plagiiert ganze Absätze aus dem Internet.","tr":"Öğrenci internetten koca paragrafları çalıyor/intihal yapıyor."},{"tense":"PRÄTERITUM","de":"Man warf ihm vor, er habe plagiieriert.","tr":"Onu intihal yapmakla (çalmakla) suçladılar."},{"tense":"PERFEKT","de":"Hat der Autor wirklich plagiiert?","tr":"Yazar gerçekten intihal mi yaptı?"},{"tense":"FUT ":"Ich würde die Wäsche plätten, wenn das Eisen heiß wäre.","tr":"Ütü sıcak olsaydı çamaşırları ütülerdim."}]},{"category":"NOMINATIV / SEIN","verb":"platzen","turkish":"patlamak / (randevu vb.) iptal olmak","prateritum_form":"platzte","partizip2":"geplatzt","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Der Luftballon platzt gleich!","tr":"Balon şimdi patlayacak!"},{"tense":"PRÄTERITUM","de":"Der Reifen platzte auf der Autobahn.","tr":"Lastik otobanda patladı."},{"tense":"PERFEKT","de":"Ist das Geschäft im letzten Moment geplatzt?","tr":"İş (anlaşma) son anda yattı mı/bozuldu mu?"},{"tense":"FUTUR I","de":"Ich werde vor Neid platzen.","tr":"Kıskançlıktan patlayacağım."},{"tense":"KONJ II","de":"Die Bombe wäre fast geplatzt.","tr":"Bomba neredeyse patlayacaktı."}]},{"category":"ÜBER + AKK / MIT + DAT / HABEN","verb":"plaudern","turkish":"sohbet etmek / laklak etmek","prateritum_form":"plauderte","partizip2":"geplaudert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir plaudern über alte Zeiten.","tr":"Eski zamanlar hakkında sohbet ediyoruz."},{"tense":"PRÄTERITUM","de":"Er plauderte angeregt mit seiner Nachbarin.","tr":"Komşusuyla hararetli bir sohbete daldı."},{"tense":"PERFEKT","de":"Haben wir zu lange geplaudert?","tr":"Çok mu uzun sohbet ettik?"},{"tense":"FUTUR I","de":"Wir werden bei einem Kaffee plaudern.","tr":"Bir kahve eşliğinde sohbet edeceğiz."},{"tense":"KONJ II","de":"Ich würde gerne mal wieder mit dir plaudern.","tr":"Seninle tekrar sohbet etmeyi çok isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"plündern","turkish":"yağmalamak / (buzdolabı/kumbara) boşaltmak","prateritum_form":"plünderte","partizip2":"geplündert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er plündert nachts den Kühlschrank.","tr":"Geceleri buzdolabını yağmalıyor (boşaltıyor)."},{"tense":"PRÄTERITUM","de":"Die Soldaten plünderten die Stadt.","tr":"Askerler şehri yağmaladılar."},{"tense":"PERFEKT","de":"Wer hat mein Sparschwein geplündert?","tr":"Kumbaramı kim boşalttı/yağmaladı?"},{"tense":"FUTUR I","de":"Sie werden das Lagerhaus plündern.","tr":"Depoyu yağmalayacaklar."},{"tense":"KONJ II","de":"Ich würde niemals fremdes Eigentum plündern.","tr":"Asla başkasının malını yağmalamazdım."}]},{"category":"AN + AKK / AUF + AKK / HABEN","verb":"pochen","turkish":"vurduğunu duymak (kalp/kapı) / ısrar etmek","prateritum_form":"pochte","partizip2":"gepocht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Mein Herz pocht ganz wild. - Er pocht auf sein Recht.","tr":"Kalbim küt küt atıyor. - Hakkında ısrar ediyor (hakkını arıyor)."},{"tense":"PRÄTERITUM","de":"Es pochte jemand laut an die Tür.","tr":"Birisi kapıyı sertçe çaldı (vurdu)."},{"tense":"PERFEKT","de":"Hat die Wunde gestern noch gepocht?","tr":"Yara dün hâlâ zonkladı mı (atışı hissedildi mi)?"},{"tense":"FUTUR I","de":"Die Ader an seiner Schläfe wird pochen.","tr":"Şakağındaki damar zonklayacak/atacak."},{"tense":"KONJ II","de":"Ich würde nicht so sehr auf diesen Punkt pochen.","tr":"Bu nokta üzerinde bu kadar ısrar etmezdim."}]},{"category":"NOMINATIV / HABEN","verb":"pokern","turkish":"poker oynamak / (mecaz) riskli oynamak","prateritum_form":"pokerte","partizip2":"gepokert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir pokern jeden Freitagabend.","tr":"Her Cuma akşamı poker oynuyoruz."},{"tense":"PRÄTERITUM","de":"Er pokerte zu hoch und verlor alles.","tr":"Çok riskli oynadı (rest çekti) ve her şeyi kaybetti."},{"tense":"PERFEKT","de":"Hast du schon mal um echtes Geld gepokert?","tr":"Hiç gerçek parasına poker oynadın mı?"},{"tense":"FUTUR I","de":"Sie werden sicher wieder stundenlang pokern.","tr":"Kesinlikle yine saatlerce poker oynayacaklar."},{"tense":"KONJ II","de":"Ich würde an deiner Stelle nicht so hoch pokern.","tr":"Senin yerinde olsam bu kadar büyük oynamazdım/risk almazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"polieren","turkish":"parlatmak / cilalamak","prateritum_form":"polierte","partizip2":"poliert","hilfsv
