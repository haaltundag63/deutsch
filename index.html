k."},{"tense":"KONJ II","de":"Ich würde gerne wie ein Star posieren.","tr":"Bir yıldız gibi poz vermek isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"posten","turkish":"paylaşmak (sosyal medya) / yayınlamak","prateritum_form":"postete","partizip2":"gepostet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie postet jeden Tag ein neues Foto.","tr":"Her gün yeni bir fotoğraf paylaşıyor."},{"tense":"PRÄTERITUM","de":"Er postete seine Meinung in den Kommentaren.","tr":"Fikrini yorumlarda paylaştı."},{"tense":"PERFEKT","de":"Hast du das Video schon gepostet?","tr":"Videoyu çoktan paylaştın mı?"},{"tense":"FUTUR I","de":"Ich werde den Link morgen posten.","tr":"Linki yarın paylaşacağım."},{"tense":"KONJ II","de":"Ich würde das Bild an deiner Stelle nicht posten.","tr":"Senin yerinde olsam bu resmi paylaşmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"prägen","turkish":"şekillendirmek / iz bırakmak / (para) basmak","prateritum_form":"prägte","partizip2":"geprägt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Diese Erfahrung prägt seinen Charakter.","tr":"Bu tecrübe onun karakterini şekillendiriyor."},{"tense":"PRÄTERITUM","de":"Die Kindheit prägte ihn sehr stark.","tr":"Çocukluğu onu çok güçlü bir şekilde etkiledi/şekillendirdi."},{"tense":"PERFEKT","de":"Wer hat diesen Begriff geprägt?","tr":"Bu terimi (kavramı) ilk kim kullandı/şekillendirdi?"},{"tense":"FUTUR I","de":"Die neue Zeit wird neue Helden prägen.","tr":"Yeni zamanlar yeni kahramanlar yaratacak (şekillendirecek)."},{"tense":"KONJ II","de":"Das würde die Zukunft nachhaltig prägen.","tr":"Bu, geleceği kalıcı olarak şekillendirirdi."}]},{"category":"MIT + DAT / HABEN","verb":"prahlen","turkish":"övünmek / caka satmak","prateritum_form":"prahlte","partizip2":"geprahlt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er prahlt ständig mit seinem neuen Auto.","tr":"Sürekli yeni arabasıyla övünüyor (hava atıyor)."},{"tense":"PRÄTERITUM","de":"Sie prahlte mit ihren guten Noten.","tr":"İyi notlarıyla övündü."},{"tense":"PERFEKT","de":"Hast du etwa vor ihr geprahlt?","tr":"Onun önünde hava mı attın (övündün mü)?"},{"tense":"FUTUR I","de":"Er wird sicher wieder mit seinem Wissen prahlen.","tr":"Kesinlikle yine bilgisiyle hava atacaktır."},{"tense":"KONJ II","de":"Ich würde nicht mit Dingen prahlen, die ich nicht habe.","tr":"Sahip olmadığım şeylerle övünmezdim."}]},{"category":"AKKUSATIV / HABEN","verb":"praktizieren","turkish":"uygulamak / (doktor/avukat) mesleğini icra etmek","prateritum_form":"praktizierte","partizip2":"praktiziert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie praktiziert seit Jahren Yoga.","tr":"Yıllardır yoga yapıyor (uyguluyor)."},{"tense":"PRÄTERITUM","de":"Der Arzt praktizierte früher in dieser Stadt.","tr":"Doktor eskiden bu şehirde çalışıyordu (icra ediyordu)."},{"tense":"PERFEKT","de":"Haben Sie diese Methode schon praktiziert?","tr":"Bu yöntemi hiç uyguladınız mı?"},{"tense":"FUTUR I","de":"Wir werden mehr Geduld praktizieren müssen.","tr":"Daha fazla sabır göstermemiz (uygulamamız) gerekecek."},{"tense":"KONJ II","de":"Ich würde gerne mehr Sport praktizieren.","tr":"Daha fazla spor yapmayı (uygulamayı) isterdim."}]},{"category":"GEGEN + AKK / SEIN","verb":"prallen","turkish":"çarpmak / toslamak","prateritum_form":"prallte","partizip2":"geprallt","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Das Auto prallt gegen die Mauer.","tr":"Araba duvara çarpıyor."},{"tense":"PRÄTERITUM","de":"Der Ball prallte vom Pfosten ab.","tr":"Top direkten geri döndü (çarptı)."},{"tense":"PERFEKT","de":"Bist du mit dem Kopf gegen die Tür geprallt?","tr":"Kafanı kapıya mı çarptın?"},{"tense":"FUTUR I","de":"Die Wellen werden gegen die Felsen prallen.","tr":"Dalgalar kayalara çarpacak."},{"tense":"KONJ II","de":"Das Fahrrad wäre fast gegen den Baum geprallt.","tr":"Bisiklet neredeyse ağaca çarpacaktı."}]},{"category":"NOMINATIV / HABEN","verb":"prasseln","turkish":"pıtır pıtır yağmak (yağmur) / çıtırdayarak yanmak","prateritum_form":"prasselte","partizip2":"geprasselt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Regen prasselt gegen das Fenster.","tr":"Yağmur pencereye pıtır pıtır vuruyor."},{"tense":"PRÄTERITUM","de":"Das Feuer prasselte gemütlich im Kamin.","tr":"Ateş şöminede keyifle çıtırdadı."},{"tense":"PERFEKT","de":"Es hat die ganze Nacht gebrasselt.","tr":"Bütün gece (yağmur/dolu) pıtır pıtır yağdı."},{"tense":"FUTUR I","de":"Hagel wird gleich auf das Dach prasseln.","tr":"Dolu az sonra çatıya pıtır pıtır vuracak."},{"tense":"KONJ II","de":"Es würde schöner prasseln, wenn das Holz trocken wäre.","tr":"Odun kuru olsaydı daha güzel çıtırdardı."}]},{"category":"DAT / AKK / HABEN","verb":"predigen","turkish":"vaaz vermek / (mecaz) nasihat çekmek","prateritum_form":"predigte","partizip2":"gepredigt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Pfarrer predigt jeden Sonntag.","tr":"Papaz her Pazar vaaz veriyor."},{"tense":"PRÄTERITUM","de":"Meine Mutter predigte mir ständig Ordnung.","tr":"Annem bana sürekli düzenli olmam için nasihat çekti."},{"tense":"PERFEKT","de":"Er hat immer nur Wasser gepredigt und Wein getrunken. (Deyim)","tr":"Hep nasihat verdi ama kendisi aksini yaptı."},{"tense":"FUTUR I","de":"Ich werde ihm nicht noch mal dasselbe predigen.","tr":"Ona bir kez daha aynı şeyi vaaz etmeyeceğim (nasihat çekmeyeceğim)."},{"tense":"KONJ II","de":"Ich würde nicht so viel predigen, wenn er nicht zuhört.","tr":"Eğer dinlemiyorsa bu kadar nasihat çekmezdim."}]},{"category":"AKKUSATIV / HABEN","verb":"preisen","turkish":"övmek / methetmek / şükretmek","prateritum_form":"pries","partizip2":"gepriesen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie preisen Gott für ihre Rettung.","tr":"Kurtuluşları için Tanrı'ya şükrediyorlar (onu övüyorlar)."},{"tense":"PRÄTERITUM","de":"Der Kritiker pries das neue Buch.","tr":"Eleştirmen yeni kitabı övdü (methetti)."},{"tense":"PERFEKT","de":"Man hat ihn als Helden gepriesen.","tr":"Onu bir kahraman olarak methettiler."},{"tense":"FUTUR I","de":"Alle Welt wird diesen Fortschritt preisen.","tr":"Bütün dünya bu ilerlemeyi övecek."},{"tense":"KONJ II","de":"Ich würde ihn preisen, wenn er ehrlich wäre.","tr":"Dürüst olsaydı onu methederdim."}]},{"category":"700. FİİL / AKK / HABEN","verb":"proben","turkish":"prova yapmak / denemek","prateritum_form":"probte","partizip2":"geprobt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Band probt für das Konzert.","tr":"Grup konser için prova yapıyor."},{"tense":"PRÄTERITUM","de":"Wir probten das Theaterstück jeden Abend.","tr":"Tiyatro oyununun provasını her akşam yaptık."},{"tense":"PERFEKT","de":"Hast du den Ernstfall schon mal geprobt?","tr":"Acil durum provasını hiç yaptın mı?"},{"tense":"FUTUR I","de":"Wir werden morgen die neue Szene proben.","tr":"Yarın yeni sahnenin provasını yapacağız."},{"tense":"KONJ II","de":"Ich würde mehr proben, wenn wir mehr Zeit hätten.","tr":"Daha fazla vaktimiz olsaydı daha çok prova yapardım."}]},{"category":"AKKUSATIV / HABEN","verb":"probieren","turkish":"denemek / tadına bakmak","prateritum_form":"probierte","partizip2":"probiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Probier mal diesen Kuchen!","tr":"Bu kekin tadına bir bak (dene)!"},{"tense":"PRÄTERITUM","de":"Er probierte verschiedene Schlüssel aus.","tr":"Farklı anahtarları denedi."},{"tense":"PERFEKT","de":"Hast du das neue Restaurant schon probiert?","tr":"Yeni restoranı (yemeklerini) hiç denedin mi?"},{"tense":"FUTUR I","de":"Ich werde es einfach mal probieren.","tr":"Bunu sadece bir deneyeceğim."},{"tense":"KONJ II","de":"Ich würde es probieren, wenn ich mich trauen würde.","tr":"Eğer cesaret edebilseydim denedim."}]},{"category":"AKKUSATIV / HABEN","verb":"produzieren","turkish":"üretmek / imal etmek","prateritum_form":"produzierte","partizip2":"produziert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Fabrik produziert täglich tausende Autos.","tr":"Fabrika her gün binlerce araba üretiyor."},{"tense":"PRÄTERITUM","de":"Er produzierte seinen ersten Film mit wenig Geld.","tr":"İlk filmini az parayla üretti (çekti)."},{"tense":"PERFEKT","de":"Was habt ihr in dem Workshop produziert?","tr":"Atölyede ne ürettiniz?"},{"tense":"FUTUR I","de":"Wir werden in Zukunft nachhaltiger produzieren.","tr":"Gelecekte daha sürdürülebilir bir şekilde üreteceğiz."},{"tense":"KONJ II","de":"Ich würde mehr produzieren, wenn die Nachfrage stiege.","tr":"Talep artsaydı daha fazla üretirdim."}]},{"category":"AKKUSATIV / HABEN","verb":"programmieren","turkish":"programlamak / kod yazmak","prateritum_form":"programmierte","partizip2":"programmiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich programmiere eine neue App.","tr":"Yeni bir uygulama programlıyorum (kodluyorum)."},{"tense":"PRÄTERITUM","de":"Er programmierte die ganze Nacht hindurch.","tr":"Bütün gece boyunca kod yazdı."},{"tense":"PERFEKT","de":"Hast du den Videorekorder programmiert?","tr":"Video kaydediciyi programladın mı?"},{"tense":"FUTUR I","de":"Die KI wird sich bald selbst programmieren.","tr":"Yapay zeka yakında kendi kendini programlayacak."},{"tense":"KONJ II","de":"Ich würde es anders programmieren, wenn ich könnte.","tr":"Elimden gelse bunu farklı programlardım."}]},{"category":"VON + DAT / HABEN","verb":"profitieren","turkish":"yararlanmak / kâr etmek / faydalanmak","prateritum_form":"profitierte","partizip2":"profitiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er profitiert von seiner langen Erfahrung.","tr":"Uzun tecrübesinden faydalanıyor."},{"tense":"PRÄTERITUM","de":"Das Unternehmen profitierte vom Wirtschaftswachstum.","tr":"Şirket ekonomik büyümeden kâr etti/yararlandı."},{"tense":"PERFEKT","de":"Hast du von dem Kurs profitiert?","tr":"Kurstan faydalandın mı?"},{"tense":"FUTUR I","de":"Alle werden von der neuen Regelung profitieren.","tr":"Herkes yeni düzenlemeden fayda sağlayacak."},{"tense":"KONJ II","de":"Ich würde gerne mehr davon profitieren.","tr":"Bundan daha fazla yararlanmak isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"prognostizieren","turkish":"tahmin etmek (geleceği/durumu) / öngörmek","prateritum_form":"prognostizierte","partizip2":"prognostiziert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Experten prognostizieren einen heißen Sommer.","tr":"Uzmanlar sıcak bir yaz öngörüyorlar (tahmin ediyorlar)."},{"tense":"PRÄTERITUM","de":"Man prognostizierte einen Sieg der Opposition.","tr":"Muhalefetin galibiyeti öngörüldü."},{"tense":"PERFEKT","de":"Was haben die Ärzte prognostiziert?","tr":"Doktorlar (hastalığın seyri için) ne tahmin ettiler?"},{"tense":"FUTUR I","de":"Niemand wird das genau prognostizieren können.","tr":"Kimse bunu tam olarak öngöremeyecek."},{"tense":"KONJ II","de":"Ich würde kein so schlechtes Ergebnis prognostizieren.","tr":"Bu kadar kötü bir sonuç öngörmezdim."}]},{"category":"AKK / AUF + AKK / HABEN","verb":"projizieren","turkish":"yansıtmak / (mecaz) kendi duygusunu başkasına yüklemek","prateritum_form":"projizierte","partizip2":"projiziert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Beamer projiziert das Bild an die Leinwand.","tr":"Projeksiyon cihazı resmi perdeye yansıtıyor."},{"tense":"PRÄTERITUM","de":"Er projizierte seine Ängste auf seine Kinder.","tr":"Korkularını çocuklarına yansıttı (onlara yükledi)."},{"tense":"PERFEKT","de":"Haben Sie die Daten richtig projiziert?","tr":"Verileri doğru şekilde mi yansıttınız?"},{"tense":"FUTUR I","de":"Wir werden die Grafik großflächig projizieren.","tr":"Grafiği geniş bir alana yansıtacağız."},{"tense":"KONJ II","de":"Ich würde meine Probleme nicht auf andere projizieren.","tr":"Sorunlarımı başkalarına yansıtmazdım."}]},{"category":"NOMINATIV / HABEN","verb":"promovieren","turkish":"doktora yapmak","prateritum_form":"promovierte","partizip2":"promoviert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie promoviert derzeit in Biologie.","tr":"Şu anda biyoloji alanında doktora yapıyor."},{"tense":"PRÄTERITUM","de":"Er promovierte an einer renommierten Universität.","tr":"Saygın bir üniversitede doktora yaptı."},{"tense":"PERFEKT","de":"Hast du schon erfolgreich promoviert?","tr":"Doktoranı başarıyla tamamladın mı?"},{"tense":"FUTUR I","de":"Er wird nächstes Jahr promovieren.","tr":"Gelecek yıl doktora yapacak (doktor unvanını alacak)."},{"tense":"KONJ II","de":"Ich würde gerne promovieren, wenn ich ein Stipendium hätte.","tr":"Bursum olsaydı doktora yapmak isterdim."}]},{"category":"GEGEN + AKK / HABEN","verb":"protestieren","turkish":"protesto etmek / karşı çıkmak","prateritum_form":"protestierte","partizip2":"protestiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Leute protestieren gegen die Preiserhöhung.","tr":"İnsanlar fiyat artışını protesto ediyorlar."},{"tense":"PRÄTERITUM","de":"Er protestierte lautstark gegen die Entscheidung.","tr":"Karara karşı yüksek sesle protestoda bulundu."},{"tense":"PERFEKT","de":"Habt ihr schon einmal auf der Straße protestiert?","tr":"Hiç sokakta protesto yaptınız mı?"},{"tense":"FUTUR I","de":"Wir werden gegen diese Ungerechtigkeit protestieren.","tr":"Bu adaletsizliğe karşı protesto edeceğiz."},{"tense":"KONJ II","de":"Ich würde protestieren, wenn man mich fragen würde.","tr":"Bana sorulsaydı itiraz ederdim (protesto ederdim)."}]},{"category":"AKKUSATIV / HABEN","verb":"provozieren","turkish":"kışkırtmak / provoke etmek / neden olmak","prateritum_form":"provozierte","partizip2":"provoziert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er provoziert mich mit seinen dummen Sprüchen.","tr":"Aptal sözleriyle beni kışkırtıyor."},{"tense":"PRÄTERITUM","de":"Der Skandal provozierte eine Krise.","tr":"Skandal bir krize neden oldu (tetikledi)."},{"tense":"PERFEKT","de":"Hast du ihn absichtlich provoziert?","tr":"Onu bilerek mi kışkırttın?"},{"tense":"FUTUR I","de":"Das wird nur weiteren Ärger provozieren.","tr":"Bu sadece daha fazla sıkıntıya/öfkeye neden olacak."},{"tense":"KONJ II","de":"Ich würde ihn an deiner Stelle nicht provozieren.","tr":"Senin yerinde olsam onu provoke etmezdim."}]},{"category":"AKKUSATIV / HABEN","verb":"prüfen","turkish":"incelemek / kontrol etmek / sınav yapmak","prateritum_form":"prüfte","partizip2":"geprüft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich prüfe die Unterlagen genau.","tr":"Belgeleri dikkatle inceliyorum."},{"tense":"PRÄTERITUM","de":"Der Lehrer prüfte die Schüler in Grammatik.","tr":"Öğretmen öğrencileri gramerden sınav yaptı."},{"tense":"PERFEKT","de":"Haben Sie die Verbindung bereits geprüft?","tr":"Bağlantıyı çoktan kontrol ettiniz mi?"},{"tense":"FUTUR I","de":"Wir werden alle Optionen prüfen.","tr":"Bütün seçenekleri inceleyeceğiz/değerlendireceğiz."},{"tense":"KONJ II","de":"Ich würde es nochmals prüfen, um sicherzugehen.","tr":"Emin olmak için onu bir kez daha kontrol ederdim."}]},{"category":"AKK / REFL / HABEN","verb":"prügeln (sich)","turkish":"dövmek / dövüşmek / kavga etmek","prateritum_form":"prügelte","partizip2":"geprügelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Jungs prügeln sich auf dem Schulhof.","tr":"Çocuklar okul bahçesinde dövüşüyorlar."},{"tense":"PRÄTERITUM","de":"Er prügelte den Hund, was schrecklich war.","tr":"Köpeği dövdü, ki bu korkunçtu."},{"tense":"PERFEKT","de":"Habt ihr euch schon wieder geprügelt?","tr":"Yine mi kavga ettiniz (birbirinize girdiniz)?"},{"tense":"FUTUR I","de":"Sie werden sich wegen einer Kleinigkeit prügeln.","tr":"Küçük bir şey yüzünden kavga edecekler."},{"tense":"KONJ II","de":"Ich würde mich niemals prügeln.","tr":"Asla dövüşmezdim (kavga etmezdim)."}]},{"category":"AKK / HABEN","verb":"pumpen","turkish":"pompalamak / (argo) borç almak-vermek","prateritum_form":"pumpte","partizip2":"gepumpt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich pumpe Luft in den Reifen.","tr":"Lastiğe hava pompalıyorum."},{"tense":"PRÄTERITUM","de":"Er pumpte mir 20 Euro bis morgen.","tr":"Bana yarına kadar 20 Euro borç verdi."},{"tense":"PERFEKT","de":"Hast du das Wasser aus dem Keller gepumpt?","tr":"Bodrumdaki suyu pompalayıp dışarı attın mı?"},{"tense":"FUTUR I","de":"Die Maschine wird das Öl nach oben pumpen.","tr":"Makine yağı yukarı pompalayacak."},{"tense":"KONJ II","de":"Ich würde mir kein Geld von ihm pumpen.","tr":"Ondan (borç) para istemezdim/almazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"punktieren","turkish":"noktalamak / (tıp) sıvı çekmek / delmek","prateritum_form":"punktierte","partizip2":"punktiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Arzt punktiert das Gelenk.","tr":"Doktor eklemden sıvı çekiyor (delerek)."},{"tense":"PRÄTERITUM","de":"Er punktierte die Zeichnung mit kleinen Punkten.","tr":"Çizimi küçük noktalarla süsledi/noktaladı."},{"tense":"PERFEKT","de":"Wurde die Zyste schon punktiert?","tr":"Kistten sıvı çekildi mi (delindi mi)?"},{"tense":"FUTUR I","de":"Wir werden die Stelle morgen punktieren.","tr":"O bölgeyi yarın deleceğiz (tıp)."},{"tense":"KONJ II","de":"Ich würde es punktieren lassen, wenn es weh tut.","tr":"Eğer ağrıyorsa oradan sıvı aldırırdım/deldirtirdim."}]},{"category":"AKK / REFL / HABEN","verb":"putzen","turkish":"temizlemek / fırçalamak (diş) / parlatmak","prateritum_form":"putzte","partizip2":"geputzt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich putze mir die Zähne. - Sie putzt die Fenster.","tr":"Dişlerimi fırçalıyorum. - O pencereleri temizliyor."},{"tense":"PRÄTERITUM","de":"Er putzte seine Schuhe vor dem Ausgehen.","tr":"Dışarı çıkmadan önce ayakkabılarını parlattı (temizledi)."},{"tense":"PERFEKT","de":"Hast du die Wohnung schon geputzt?","tr":"Evi çoktan temizledin mi?"},{"tense":"FUTUR I","de":"Wir werden heute gemeinsam die Küche putzen.","tr":"Bugün birlikte mutfağı temizleyeceğiz."},{"tense":"KONJ II","de":"Ich würde öfter putzen, wenn ich mehr Zeit hätte.","tr":"Daha çok vaktim olsaydı daha sık temizlik yapardım."}]},{"category":"AKK / REFL / HABEN","verb":"quälen (sich)","turkish":"işkence etmek / eziyet etmek / çabalamak","prateritum_form":"quälte","partizip2":"gequält","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Warum quälst du das arme Tier?","tr":"Zavallı hayvana neden eziyet ediyorsun?"},{"tense":"PRÄTERITUM","de":"Er quälte sich mit den Hausaufgaben.","tr":"Ödevlerle (zorlanarak) boğuştu/didindi."},{"tense":"PERFEKT","de":"Hast du dich umsonst so gequält?","tr":"Boşuna mı bu kadar eziyet çektin/zorlandın?"},{"tense":"FUTUR I","de":"Die Hitze wird uns alle quälen.","tr":"Sıcaklık hepimize eziyet edecek."},{"tense":"KONJ II","de":"Ich würde mich nicht so quälen, wenn es keinen Sinn hätte.","tr":"Bir anlamı olmasaydı kendime bu kadar eziyet etmezdim (zorlamazdım)."}]},{"category":"MIT + DAT / HABEN","verb":"quatschen","turkish":"laklak etmek / geyik yapmak / boş konuşmak","prateritum_form":"quatschte","partizip2":"gequatscht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir quatschen nur ein bisschen.","tr":"Sadece biraz laklak (geyik) yapıyoruz."},{"tense":"PRÄTERITUM","de":"Sie quatschten die ganze Nacht über Musik.","tr":"Bütün gece müzik üzerine boş boş konuştular (sohbet ettiler)."},{"tense":"PERFEKT","de":"Haben wir zu viel gequatscht?","tr":"Çok mu boş konuştuk (geyik yaptık)?"},{"tense":"FUTUR I","de":"Wir werden morgen ausführlich quatschen.","tr":"Yarın uzun uzun laflayacağız."},{"tense":"KONJ II","de":"Ich würde gerne mal wieder mit dir quatschen.","tr":"Seninle tekrar bir laklak etmek isterdim."}]},{"category":"NOMINATIV / SEIN","verb":"quellen","turkish":"fışkırmak / kabarmak / (su alıp) şişmek","prateritum_form":"quoll","partizip2":"gequollen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Rauch quillt aus dem Schornstein.","tr":"Bacadan duman fışkırıyor (çıkıyor)."},{"tense":"PRÄTERITUM","de":"Die Tränen quollen ihr aus den Augen.","tr":"Gözlerinden yaşlar boşaldı (fışkırdı)."},{"tense":"PERFEKT","de":"Die Erbsen sind im Wasser gequollen.","tr":"Bezelyeler suda kabardı/şişti."},{"tense":"FUTUR I","de":"Das Holz wird bei Nässe quellen.","tr":"Odun ıslanınca şişecek (kabarcak)."},{"tense":"KONJ II","de":"Das Wasser würde aus allen Ritzen quellen.","tr":"Su bütün çatlaklardan fışkırırdı."}]},{"category":"AKKUSATIV / HABEN","verb":"quittieren","turkish":"makbuz kesmek / onaylamak / (tepkiyle) yanıtlamak","prateritum_form":"quittierte","partizip2":"quittiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er quittiert den Empfang des Geldes.","tr":"Paranın alındığını onaylıyor (makbuz veriyor)."},{"tense":"PRÄTERITUM","de":"Sie quittierte seine Bemerkung mit einem Lächeln.","tr":"Onun sözünü bir gülümsemeyle yanıtladı/karşıladı."},{"tense":"PERFEKT","de":"Haben Sie die Rechnung schon quittiert?","tr":"Faturayı çoktan onayladınız (imzaladınız) mı?"},{"tense":"FUTUR I","de":"Er wird die Nachricht mit Schweigen quittieren.","tr":"Haberi sessizlikle karşılayacak (yanıtlayacak)."},{"tense":"KONJ II","de":"Ich würde den Erhalt sofort quittieren.","tr":"Aldığımı hemen onaylardım (imzalardım)."}]},{"category":"REFL / AN + DAT / HABEN","verb":"rächen (sich)","turkish":"intikam almak / (mecaz) acısı çıkmak","prateritum_form":"rächte","partizip2":"gerächt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er rächt sich an seinem Feind.","tr":"Düşmanından intikam alıyor."},{"tense":"PRÄTERITUM","de":"Die mangelnde Vorbereitung rächte sich bald.","tr":"Hazırlık eksikliğinin acısı yakında çıktı (kötü sonuçlandı)."},{"tense":"PERFEKT","de":"Hast du dich für die Beleidigung gerächt?","tr":"Hakaretin intikamını aldın mı?"},{"tense":"FUTUR I","de":"Das Schicksal wird sich rächen.","tr":"Kader intikamını alacaktır (acısı çıkacaktır)."},{"tense":"KONJ II","de":"Ich würde mich nicht rächen, sondern verzeihen.","tr":"İntikam almaz, affederdim."}]},{"category":"NOMINATIV / SEIN","verb":"radeln","turkish":"bisiklet sürmek (keyfi/yavaşça)","prateritum_form":"radelte","partizip2":"geradelt","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Wir radeln gemütlich durch den Park.","tr":"Parkta keyifle bisiklet sürüyoruz."},{"tense":"PRÄTERITUM","de":"Er radelte jeden Morgen zur Arbeit.","tr":"Her sabah işe bisikletle gitti."},{"tense":"PERFEKT","de":"Sind Sie schon mal über die Alpen geradelt?","tr":"Hiç Alpler üzerinden bisikletle geçtiniz mi?"},{"tense":"FUTUR I","de":"Wir werden am Sonntag zum See radeln.","tr":"Pazar günü göle bisikletle gideceğiz."},{"tense":"KONJ II","de":"Ich würde öfter radeln, wenn es Radwege gäbe.","tr":"Bisiklet yolları olsaydı daha sık bisiklet sürerdim."}]},{"category":"NOMINATIV / HABEN","verb":"ragen","turkish":"yükselmek / çıkıntı yapmak / uzanmak","prateritum_form":"ragte","partizip2":"geragt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Turm ragt weit in den Himmel.","tr":"Kule gökyüzüne doğru yükseliyor."},{"tense":"PRÄTERITUM","de":"Ein Fels ragte aus dem Wasser.","tr":"Suda bir kaya parçası yükseliyordu (çıkıntı yapıyordu)."},{"tense":"PERFEKT","de":"Hat der Ast weit über den Zaun geragt?","tr":"Dal, çitin üzerinden çok dışarı mı taşmıştı?"},{"tense":"FUTUR I","de":"Das Gebäude wird über die anderen ragen.","tr":"Bina diğerlerinin üzerinde yükselecek."},{"tense":"KONJ II","de":"Es würde weniger ragen, wenn man es kürzen würde.","tr":"Kısaltılsaydı bu kadar dışarı çıkıntı yapmazdı."}]},{"category":"AKK / REFL / HABEN","verb":"raffen","turkish":"toplamak / çabucak almak / (argo) anlamak","prateritum_form":"raffte","partizip2":"gerafft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie rafft ihre Kleider zusammen.","tr":"Elbiselerini (çabucak) bir araya topluyor."},{"tense":"PRÄTERITUM","de":"Er raffte den Text auf das Wesentliche.","tr":"Metni en önemli kısımlarına göre kısalttı/özetledi."},{"tense":"PERFEKT","de":"Hast du die Erklärung endlich gerafft? (Umgangssprachlich)","tr":"Açıklamayı sonunda kaptın mı (anladın mı)?"},{"tense":"FUTUR I","de":"Er wird das Geld schnell zusammenraffen.","tr":"Parayı hızlıca toparlayacak."},{"tense":"KONJ II","de":"Ich würde mich aufraffen, wenn ich nicht so müde wäre.","tr":"Bu kadar yorgun olmasaydım kendimi toplardım (harekete geçerdim)."}]},{"category":"NOMINATIV / HABEN","verb":"rammeln","turkish":"toslamak / (hayvan) çiftleşmek / gürültüyle itmek","prateritum_form":"rammelte","partizip2":"gerammelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Kinder rammeln lautstark im Zimmer herum.","tr":"Çocuklar odada gürültüyle boğuşup duruyorlar."},{"tense":"PRÄTERITUM","de":"Er rammelte gegen den Pfosten.","tr":"Direğe tosladı/çarptı."},{"tense":"PERFEKT","de":"Haben die Kaninchen im Käfig gerammelt?","tr":"Tavşanlar kafeste çiftleşti mi?"},{"tense":"FUTUR I","de":"Du wirst noch gegen die Wand rammeln, wenn du nicht aufpasst.","tr":"Dikkat etmezsen duvara toslayacaksın."},{"tense":"KONJ II","de":"Ich würde nicht so wild herumrammeln.","tr":"Böyle vahşice sağa sola toslamazdım/koşturmazdım."}]},{"category":"NOMINATIV / HABEN","verb":"rangieren","turkish":"manevra yapmak / (sıralamada) yer almak","prateritum_form":"rangierte","partizip2":"rangiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der LKW rangiert im engen Hof.","tr":"Kamyon dar avluda manevra yapıyor."},{"tense":"PRÄTERITUM","de":"Die Firma rangierte auf dem ersten Platz.","tr":"Firma birinci sırada yer alıyordu."},{"tense":"PERFEKT","de":"Hat der Zug bereits auf das Nebengleis rangiert?","tr":"Tren yan raya manevra yaptı mı?"},{"tense":"FUTUR I","de":"Wir werden in der Tabelle weiter oben rangieren.","tr":"Tabloda daha üst sıralarda yer alacağız."},{"tense":"KONJ II","de":"Ich würde das Auto lieber rückwärts rangieren.","tr":"Arabayı geri geri manevra yaptırmayı tercih ederdim."}]},{"category":"UM + AKK / HABEN","verb":"ranken (sich)","turkish":"sarılmak (bitki) / (etrafında) dönmek-odaklanmak","prateritum_form":"rankte","partizip2":"gerankt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Efeu rankt sich um den Baum.","tr":"Sarmaşık ağaca sarılıyor."},{"tense":"PRÄTERITUM","de":"Viele Legenden rankten sich um diesen Ort.","tr":"Bu yer hakkında pek çok efsane dilden dile dolaşıyordu (sarılıyordu)."},{"tense":"PERFEKT","de":"Hat sich die Rose am Gitter hochgerankt?","tr":"Gül parmaklıkta yukarı doğru sarıldı mı?"},{"tense":"FUTUR I","de":"Die Gerüchte werden sich bald um ihn ranken.","tr":"Yakında dedikodular onun etrafında dönecek."},{"tense":"KONJ II","de":"Ohne Stütze würde sich die Pflanze nicht so ranken.","tr":"Destek olmasaydı bitki bu şekilde sarılamazdı."}]},{"category":"NOMINATIV / SEIN","verb":"ranzig werden","turkish":"bozulmak / acımak (yağ/gıda)","prateritum_form":"wurde ranzig","partizip2":"ranzig geworden","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Die Butter wird ranzig, wenn sie warm steht.","tr":"Tereyağı sıcakta durursa bozulur (acır)."},{"tense":"PRÄTERITUM","de":"Das Öl wurde nach einem Jahr ranzig.","tr":"Yağ bir yıl sonra acıdı/bozuldu."},{"tense":"PERFEKT","de":"Ist der Speck schon ranzig geworden?","tr":"Pastırma çoktan acımış (kokmaya başlamış) mı?"},{"tense":"FUTUR I","de":"In der Sonne wird das schnell ranzig werden.","tr":"Güneşte bu çabucak bozulacaktır."},{"tense":"KONJ II","de":"Es würde nicht so schnell ranzig werden, wenn es im Kühlschrank","tr":"wäre."}]},{"category":"NOM / SEIN (BEWEGUNG) / HABEN","verb":"rasen","turkish":"hız yapmak / süratle gitmek / kudurmak (öfkeden)","prateritum_form":"raste","partizip2":"gerast","hilfsverb":"sein/haben","examples":[{"tense":"PRÄSENS","de":"Er rast mit dem Motorrad durch die Stadt.","tr":"Motosikletle şehirde hız yapıyor."},{"tense":"PRÄTERITUM","de":"Das Herz raste ihm vor Angst. (Haben)","tr":"Korkudan kalbi küt küt atıyordu (hızla çarpıyordu)."},{"tense":"PERFEKT","de":"Bist du etwa über die rote Ampel gerast?","tr":"Kırmızı ışıkta hızla mı geçtin?"},{"tense":"FUTUR I","de":"Die Zeit wird wie im Flug rasen.","tr":"Zaman su gibi akıp geçecek (hızla koşacak)."},{"tense":"KONJ II","de":"Ich würde nicht so rasen, wenn die Straße nass wäre.","tr":"Yol ıslak olsaydı bu kadar hız yapmazdım."}]},{"category":"AKK / REFL / HABEN","verb":"rasieren","turkish":"tıraş etmek / tıraş olmak","prateritum_form":"rasierte","partizip2":"rasiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich rasiere mich jeden Morgen.","tr":"Her sabah tıraş olurum."},{"tense":"PRÄTERITUM","de":"Er rasierte sich den Vollbart ab.","tr":"Kaba sakalını kesti (tıraş etti)."},{"tense":"PERFEKT","de":"Hast du dich heute schon rasiert?","tr":"Bugün çoktan tıraş oldun mu?"},{"tense":"FUTUR I","de":"Er wird sich vor dem Vorstellungsgespräch rasieren.","tr":"İş görüşmesinden önce tıraş olacak."},{"tense":"KONJ II","de":"Ich würde mich rasieren, eğer ich einen Rasierer hätte.","tr":"Tıraş bıçağım olsaydı tıraş olurdum."}]},{"category":"AKKUSATIV / HABEN","verb":"raspeln","turkish":"rendelemek / törpülemek","prateritum_form":"raspelte","partizip2":"geraspelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich rasple die Karotten für den Salat.","tr":"Salata için havuçları rendeliyorum."},{"tense":"PRÄTERITUM","de":"Sie raspelte die Schokolade über den Kuchen.","tr":"Kekin üzerine çikolata rendeledi."},{"tense":"PERFEKT","de":"Hast du den Käse schon geraspelt?","tr":"Peyniri çoktan rendeledin mi?"},{"tense":"FUTUR I","de":"Wir werden das Holz fein raspeln müssen.","tr":"Odunu ince ince törpülememiz/rendelememiz gerekecek."},{"tense":"KONJ II","de":"Ich würde es raspeln, wenn ich eine Reibe fände.","tr":"Bir rende bulsaydım onu rendelerdim."}]},{"category":"NOMINATIV / HABEN","verb":"rasseln","turkish":"çıngırak sesi çıkarmak / zangırdamak / (sınavdan) çakmak","prateritum_form":"rasselte","partizip2":"gerasselt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Ketten rasseln im Wind.","tr":"Zincirler rüzgarda şıngırdıyor/zangırdıyor."},{"tense":"PRÄTERITUM","de":"Das Baby rasselte mit seinem Spielzeug.","tr":"Bebek oyuncağıyla çıngırak sesi çıkardı."},{"tense":"PERFEKT","de":"Er ist durch die Prüfung gerasselt. (Umgangssprachlich)","tr":"Sınavdan (gümbür gümbür) çaktı/kaldı."},{"tense":"FUTUR I","de":"Der Säbel wird in der Scheide rasseln.","tr":"Kılıç kınında şıngırdayacak."},{"tense":"KONJ II","de":"Ich würde nicht so mit dem Schlüssel rasseln.","tr":"Anahtarları bu kadar şıngırdatmazdım."}]},{"category":"NOMINATIV / HABEN","verb":"rasten","turkish":"mola vermek / dinlenmek / (yuvasına) oturmak","prateritum_form":"rastete","partizip2":"gerastet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wer rastet, der rostet. (Atasözü)","tr":"İşleyen demir ışıldar (Dinlenen paslanır)."},{"tense":"PRÄTERITUM","de":"Wir rasteten kurz am Wegesrand.","tr":"Yol kenarında kısa bir mola verdik (dinlendik)."},{"tense":"PERFEKT","de":"Habt ihr nach dem Aufstieg lange gerastet?","tr":"Tırmanıştan sonra uzun süre dinlendiniz mi?"},{"tense":"FUTUR I","de":"Wir werden erst am Ziel rasten.","tr":"Ancak hedefe varınca mola vereceğiz."},{"tense":"KONJ II","de":"Ich würde hier nicht rasten, es ist zu windig.","tr":"Burada mola vermezdim, çok rüzgarlı."}]},{"category":"DAT / AKK / HABEN","verb":"raten","turkish":"tavsiye vermek / tahmin etmek","prateritum_form":"riet","partizip2":"geraten","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich rate dir, vorsichtig zu sein.","tr":"Sana dikkatli olmanı tavsiye ediyorum."},{"tense":"PRÄTERITUM","de":"Er riet mir zur Geduld.","tr":"Bana sabırlı olmamı tavsiye etti."},{"tense":"PERFEKT","de":"Hast du das Ergebnis nur geraten?","tr":"Sonucu sadece tahmin mi ettin (attın mı)?"},{"tense":"FUTUR I","de":"Du wirst niemals raten, wer angerufen hat!","tr":"Kimin aradığını asla tahmin edemeyeceksin!"},{"tense":"KONJ II","de":"Ich würde dir von diesem Kauf abraten.","tr":"Sana bu satın almadan vazgeçmeni (olumsuz tavsiye) önerirdim."}]},{"category":"AKKUSATIV / HABEN","verb":"ratifizieren","turkish":"onaylamak (anlaşma/sözleşme) / tasdik etmek","prateritum_form":"ratifizierte","partizip2":"ratifiziert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Parlament ratifiziert den Vertrag.","tr":"Parlamento sözleşmeyi onaylıyor/tasdik ediyor."},{"tense":"PRÄTERITUM","de":"Beide Staaten ratifizierten das Abkommen.","tr":"Her iki devlet de mutabakatı onayladı."},{"tense":"PERFEKT","de":"Wurde die Konvention bereits ratifiziert?","tr":"Konvansiyon çoktan onaylandı mı?"},{"tense":"FUTUR I","de":"Die Regierung wird das Gesetz bald ratifizieren.","tr":"Hükümet yasayı yakında onaylayacak."},{"tense":"KONJ II","de":"Ich würde den Vertrag nicht ohne Prüfung ratifizieren.","tr":"İncelemeden sözleşmeyi onaylamazdım."}]},{"category":"DAT / AKK / HABEN","verb":"rauben","turkish":"çalmak / gasp etmek / mahrum bırakmak","prateritum_form":"raubte","partizip2":"geraubt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Lärm raubt mir den Schlaf.","tr":"Gürültü uykumu çalıyor (beni uykusuz bırakıyor)."},{"tense":"PRÄTERITUM","de":"Man raubte ihm sein gesamtes Vermögen.","tr":"Onun tüm servetini gasp ettiler (çaldılar)."},{"tense":"PERFEKT","de":"Hat er dir die letzte Hoffnung geraubt?","tr":"Son umudunu da mı elinden aldı (çaldı)?"},{"tense":"FUTUR I","de":"Sie werden die Bank am helllichten Tag rauben.","tr":"Bankayı gün ortasında soyacaklar/gasp edecekler."},{"tense":"KONJ II","de":"Das würde mir den Verstand rauben.","tr":"Bu benim aklımı başımdan alırdı (beni delirtirdi)."}]},{"category":"AKK / HABEN","verb":"rauchen","turkish":"sigara içmek / tütmek / duman çıkarmak","prateritum_form":"rauchte","partizip2":"geraucht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Hier darf man nicht rauchen.","tr":"Burada sigara içmek yasaktır."},{"tense":"PRÄTERITUM","de":"Der Kamin rauchte den ganzen Abend.","tr":"Şömine bütün akşam tüttü (duman çıkardı)."},{"tense":"PERFEKT","de":"Hast du früher viel geraucht?","tr":"Eskiden çok sigara içer miydin?"},{"tense":"FUTUR I","de":"Er wird sicher bald mit dem Rauchen aufhören.","tr":"Kesinlikle yakında sigarayı bırakacak."},{"tense":"KONJ II","de":"Ich würde nicht rauchen, wenn ich Sportler wäre.","tr":"Sporcu olsaydım sigara içmezdim."}]},{"category":"AKKUSATIV / HABEN","verb":"räumen","turkish":"boşaltmak / yer açmak / kaldırmak","prateritum_form":"räumte","partizip2":"geräumt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich räume den Tisch ab.","tr":"Masayı boşaltıyorum/topluyorum."},{"tense":"PRÄTERITUM","de":"Die Polizei räumte den Platz.","tr":"Polis meydanı boşalttı."},{"tense":"PERFEKT","de":"Hast du dein Zimmer endlich aufgeräumt?","tr":"Odanı sonunda topladın mı?"},{"tense":"FUTUR I","de":"Wir werden morgen den Keller räumen.","tr":"Yarın bodrumu boşaltacağız."},{"tense":"KONJ II","de":"Ich würde den Weg räumen, eğer der Schnee schmilzt.","tr":"Kar eriseydi yolu açardım/temizlerdim."}]},{"category":"NOMINATIV / HABEN/SEIN","verb":"rauschen","turkish":"hışırdamak / uğuldamak / (su) çağıldamak","prateritum_form":"rauschte","partizip2":"gerauscht","hilfsverb":"haben/sein","examples":[{"tense":"PRÄSENS","de":"Der Wind rauscht in den Blättern.","tr":"Rüzgar yaprakların arasında hışırdıyor."},{"tense":"PRÄTERITUM","de":"Das Wasser rauschte den Bach hinunter.","tr":"Su dereden aşağı çağıldayarak aktı."},{"tense":"PERFEKT","de":"Hat das Radio gestern so laut gerauscht?","tr":"Radyo dün çok mu parazit yaptı (uğuldadı)?"},{"tense":"FUTUR I","de":"Das Meer wird beruhigend rauschen.","tr":"Deniz sakinleştirici bir şekilde uğuldayacak/çağıldayacak."},{"tense":"KONJ II","de":"Es würde weniger rauschen, eğer das Signal stärker wäre.","tr":"Sinyal daha güçlü olsaydı daha az parazit yapardı."}]},{"category":"AUF + AKK / HABEN","verb":"reagieren","turkish":"tepki vermek / karşılık vermek","prateritum_form":"reagierte","partizip2":"reagiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wie reagiert er auf die Nachricht?","tr":"Habere nasıl tepki veriyor?"},{"tense":"PRÄTERITUM","de":"Sie reagierte sehr schnell auf die Gefahr.","tr":"Tehlikeye karşı çok hızlı tepki verdi."},{"tense":"PERFEKT","de":"Hast du allergisch auf das Medikament reagiert?","tr":"İlaca karşı alerjik reaksiyon mu gösterdin?"},{"tense":"FUTUR I","de":"Er wird sicher gelassen reagieren.","tr":"Kesinlikle soğukkanlı tepki verecektir."},{"tense":"KONJ II","de":"Ich würde an deiner Stelle gar nicht reagieren.","tr":"Senin yerinde olsam hiç tepki vermezdim."}]},{"category":"AKKUSATIV / HABEN","verb":"realisieren","turkish":"gerçekleştirmek / farkına varmak","prateritum_form":"realisierte","partizip2":"realisiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir realisieren ein großes Projekt.","tr":"Büyük bir proje gerçekleştiriyoruz."},{"tense":"PRÄTERITUM","de":"Erst später realisierte er den Fehler.","tr":"Hatanın farkına ancak daha sonra vardı."},{"tense":"PERFEKT","de":"Hast du deine Träume schon realisiert?","tr":"Hayallerini çoktan gerçekleştirdin mi?"},{"tense":"FUTUR I","de":"Wir werden den Plan bald realisieren.","tr":"Planı yakında gerçekleştireceğiz."},{"tense":"KONJ II","de":"Ich würde es realisieren, wenn ich die Mittel hätte.","tr":"İmkanlarım olsaydı onu gerçekleştirirdim."}]},{"category":"MIT + DAT / AKK / HABEN","verb":"rechnen","turkish":"hesaplamak / beklemek (tahmin etmek)","prateritum_form":"rechnete","partizip2":"gerechnet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Kind rechnet eine Matheaufgabe. - Ich rechne mit dir.","tr":"Çocuk bir matematik sorusu çözüyor (hesaplıyor). - Seni bekliyorum (hesaba katıyorum)."},{"tense":"PRÄTERITUM","de":"Er rechnete nicht mit so viel Besuch.","tr":"Bu kadar çok ziyaretçi beklemiyordu (hesaba katmamıştı)."},{"tense":"PERFEKT","de":"Hast du die Kosten genau gerechnet?","tr":"Maliyetleri tam olarak hesapladın mı?"},{"tense":"FUTUR I","de":"Wir werden mit dem Schlimmsten rechnen müssen.","tr":"En kötüsünü beklemek (hesaba katmak) zorunda kalacağız."},{"tense":"KONJ II","de":"Ich würde mit einer Verspätung rechnen.","tr":"Bir gecikme olacağını tahmin ederdim (beklerdim)."}]},{"category":"AKK / REFL / HABEN","verb":"rechtfertigen","turkish":"haklı çıkarmak / kendini savunmak","prateritum_form":"rechtfertigte","partizip2":"gerechtfertigt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er rechtfertigt sein Verhalten mit Stress.","tr":"Davranışını stresle haklı çıkarmaya çalışıyor."},{"tense":"PRÄTERITUM","de":"Sie rechtfertigte sich vor ihrem Chef.","tr":"Patronunun önünde kendini savundu (haklı çıkardı)."},{"tense":"PERFEKT","de":"Hast du dich für dein Fehlen gerechtfertigt?","tr":"Yokluğun (gelmeyişin) için kendini savundun mu?"},{"tense":"FUTUR I","de":"Er wird sich dafür nicht rechtfertigen müssen.","tr":"Bunun için kendini savunmak zorunda kalmayacak."},{"tense":"KONJ II","de":"Ich würde mich nicht für jede Kleinigkeit rechtfertigen.","tr":"Her küçük şey için kendimi savunmazdım."}]},{"category":"AKK / REFL / HABEN","verb":"recken (sich)","turkish":"gerinmek / uzatmak (boyun vb.)","prateritum_form":"reckte","partizip2":"gereckt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich recke mich nach dem Aufstehen.","tr":"Kalktıktan sonra geriniyorum."},{"tense":"PRÄTERITUM","de":"Er reckte den Hals, um besser zu sehen.","tr":"Daha iyi görmek için boynunu uzattı."},{"tense":"PERFEKT","de":"Hast du deine Arme weit in die Luft gereckt?","tr":"Kollarını havaya doğru iyice uzattın mı?"},{"tense":"FUTUR I","de":"Wir werden uns vor dem Sport ordentlich recken und strecken.","tr":"Spordan önce iyice gerineceğiz ve esneyeceğiz."},{"tense":"KONJ II","de":"Ich würde mich öfter recken, wenn es dem Rücken hilft.","tr":"Sırtıma iyi gelseydi daha sık gerinirdim."}]},{"category":"AKKUSATIV / HABEN","verb":"recyceln","turkish":"geri dönüştürmek","prateritum_form":"recycelte","partizip2":"recycelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir recyceln Glas und Papier.","tr":"Cam ve kağıdı geri dönüştürüyoruz."},{"tense":"PRÄTERITUM","de":"Man recycelte früher viel weniger als heute.","tr":"Eskiden bugüne göre çok daha az geri dönüşüm yapılırdı."},{"tense":"PERFEKT","de":"Hast du die Batterien auch recycelt?","tr":"Pilleri de geri dönüştürdün mü?"},{"tense":"FUTUR I","de":"Wir werden in Zukunft fast alles recyceln können.","tr":"Gelecekte neredeyse her şeyi geri dönüştürebileceğiz."},{"tense":"KONJ II","de":"Ich würde mehr recyceln, eğer es einfacher wäre.","tr":"Daha kolay olsaydı daha fazla geri dönüşüm yapardım."}]},{"category":"ÜBER / VON / MIT / HABEN","verb":"reden","turkish":"konuşmak / laf etmek","prateritum_form":"redete","partizip2":"geredet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir reden über unsere Zukunft.","tr":"Geleceğimiz hakkında konuşuyoruz."},{"tense":"PRÄTERITUM","de":"Er redete ununterbrochen auf mich ein.","tr":"Durmaksızın bana (bir şeyler anlatıp) durdu/konuştu."},{"tense":"PERFEKT","de":"Hast du mit ihm über das Problem geredet?","tr":"Onunla sorun hakkında konuştun mu?"},{"tense":"FUTUR I","de":"Wir werden morgen Tacheles reden. (Açık konuşmak)","tr":"Yarın açık açık (dobra dobra) konuşacağız."},{"tense":"KONJ II","de":"Ich würde nicht so viel reden, wenn ich nichts zu sagen hätte.","tr":"Söyleyecek bir şeyim olmasaydı bu kadar çok konuşmazdım."}]},{"category":"AKK / AUF + AKK / HABEN","verb":"reduzieren","turkish":"azaltmak / indirmek / düşürmek","prateritum_form":"reduzierte","partizip2":"reduziert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Geschäft reduziert die Preise.","tr":"Mağaza fiyatları düşürüyor."},{"tense":"PRÄTERITUM","de":"Er reduzierte seine Arbeitszeit auf 30 Stunden.","tr":"Çalışma süresini 30 saate indirdi."},{"tense":"PERFEKT","de":"Haben Sie den Fleischkonsum reduziert?","tr":"Et tüketimini azalttınız mı?"},{"tense":"FUTUR I","de":"Wir werden den Energieverbrauch reduzieren müssen.","tr":"Enerji tüketimini azaltmak zorunda kalacağız."},{"tense":"KONJ II","de":"Ich würde meinen Stress reduzieren, wenn ich könnte.","tr":"Elimden gelse stresimi azaltırdım."}]},{"category":"ÜBER + AKK / HABEN","verb":"referieren","turkish":"sunum yapmak / rapor vermek","prateritum_form":"referierte","partizip2":"referiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie referiert über die Klimaerwärmung.","tr":"Küresel ısınma hakkında sunum yapıyor."},{"tense":"PRÄTERITUM","de":"Der Experte referierte kurz vor der Presse.","tr":"Uzman, basına kısa bir rapor sundu."},{"tense":"PERFEKT","de":"Hast du schon in der Schule referiert?","tr":"Okulda hiç sunum yaptın mı?"},{"tense":"FUTUR I","de":"Morgen wird er über sein Fachgebiet referieren.","tr":"Yarın uzmanlık alanı hakkında sunum yapacak."},{"tense":"KONJ II","de":"Ich würde gerne über dieses Thema referieren.","tr":"Bu konu hakkında sunum yapmayı isterdim."}]},{"category":"AKK / ÜBER + AKK / HABEN","verb":"reflektieren","turkish":"yansıtmak / üzerinde düşünmek","prateritum_form":"reflektierte","partizip2":"reflektiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Spiegel reflektiert das Licht.","tr":"Ayna ışığı yansıtıyor."},{"tense":"PRÄTERITUM","de":"Er reflektierte lange über seine Entscheidung.","tr":"Kararı üzerine uzun uzun düşündü (öz eleştiri yaptı)."},{"tense":"PERFEKT","de":"Haben die Schüler ihr Verhalten reflektiert?","tr":"Öğrenciler davranışlarını sorguladılar mı (üzerine düşündüler mi)?"},{"tense":"FUTUR I","de":"Das Glas wird die Sonnenstrahlen reflektieren.","tr":"Cam güneş ışınlarını yansıtacak."},{"tense":"KONJ II","de":"Ich würde mehr reflektieren, wenn ich Zeit hätte.","tr":"Vaktim olsaydı (olaylar üzerine) daha çok düşünürdüm."}]},{"category":"AKK / HABEN","verb":"regieren","turkish":"yönetmek / hüküm sürmek","prateritum_form":"regierte","partizip2":"regiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Kanzlerin regiert das Land.","tr":"Şansölye ülkeyi yönetiyor."},{"tense":"PRÄTERITUM","de":"Der König regierte viele Jahre lang.","tr":"Kral uzun yıllar hüküm sürdü."},{"tense":"PERFEKT","de":"Wer hat vor ihm die Stadt regiert?","tr":"Ondan önce şehri kim yönetti?"},{"tense":"FUTUR I","de":"Eine neue Koalition wird bald regieren.","tr":"Yakında yeni bir koalisyon yönetecek."},{"tense":"KONJ II","de":"Ich würde anders regieren, wenn ich an der Macht wäre.","tr":"Güç bende olsaydı farklı yönetirdim."}]},{"category":"AKK / HABEN","verb":"registrieren","turkish":"kaydetmek / tescil etmek / fark etmek","prateritum_form":"registrierte","partizip2":"registriert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich registriere mich für den Newsletter.","tr":"Bülten için kaydoluyorum."},{"tense":"PRÄTERITUM","de":"Das Gerät registrierte jede kleine Erschütterung.","tr":"Cihaz her küçük sarsıntıyı kaydetti."},{"tense":"PERFEKT","de":"Hast du den Unterton in seiner Stimme registriert?","tr":"Sesindeki alt tonu (imalı tonu) fark ettin mi?"},{"tense":"FUTUR I","de":"Wir werden alle Teilnehmer genau registrieren.","tr":"Tüm katılımcıları tam olarak kaydedeceğiz."},{"tense":"KONJ II","de":"Ich würde es sofort registrieren lassen.","tr":"Onu hemen tescil ettirirdim/kaydettirirdim."}]},{"category":"750. FİİL / HABEN","verb":"regnen","turkish":"yağmur yağmak","prateritum_form":"regnete","partizip2":"geregnet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Es regnet heute den ganzen Tag.","tr":"Bugün bütün gün yağmur yağıyor."},{"tense":"PRÄTERITUM","de":"Gestern regnete es in Strömen.","tr":"Dün bardaktan boşalırcasına yağmur yağdı."},{"tense":"PERFEKT","de":"Es hat seit einer Woche nicht geregnet.","tr":"Bir haftadır yağmur yağmadı."},{"tense":"FUTUR I","de":"Am Wochenende wird es wahrscheinlich regnen.","tr":"Hafta sonu muhtemelen yağmur yağacak."},{"tense":"KONJ II","de":"Wenn es regnen würde, bliebe ich zu Hause.","tr":"Eğer yağmur yağsaydı evde kalırdım."}]},{"category":"AKKUSATIV / HABEN","verb":"regulieren","turkish":"düzenlemek / ayarlamak / regüle etmek","prateritum_form":"regulierte","partizip2":"reguliert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Thermostat reguliert die Temperatur.","tr":"Termostat sıcaklığı ayarlıyor/düzenliyor."},{"tense":"PRÄTERITUM","de":"Der Staat regulierte den Markt.","tr":"Devlet piyasayı düzenledi."},{"tense":"PERFEKT","de":"Hast du den Wasserfluss reguliert?","tr":"Su akışını ayarladın mı?"},{"tense":"FUTUR I","de":"Die neue Software wird das automatisch regulieren.","tr":"Yeni yazılım bunu otomatik olarak ayarlayacak."},{"tense":"KONJ II","de":"Ich würde die Lautstärke etwas regulieren.","tr":"Ses seviyesini biraz ayarlardım."}]},{"category":"AKK / HABEN","verb":"reiben","turkish":"ovmak / sürtmek / rendelemek","prateritum_form":"rieb","partizip2":"gerieben","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich reibe mir die Augen.","tr":"Gözlerimi ovuyorum."},{"tense":"PRÄTERITUM","de":"Er rieb das Holz glatt.","tr":"Tahtayı sürterek (zımparalayarak) pürüzsüz yaptı."},{"tense":"PERFEKT","de":"Hast du den Käse schon gerieben?","tr":"Peyniri rendeledin mi?"},{"tense":"FUTUR I","de":"Die Schuhe werden an deinen Fersen reiben.","tr":"Ayakkabılar topuklarına sürtecek (vuracak)."},{"tense":"KONJ II","de":"Ich würde die Stelle mit Salbe einreiben.","tr":"Oraya merhem sürerdim (ovarak yedirirdim)."}]},{"category":"DAT / AKK / HABEN","verb":"reichen","turkish":"yetmek / uzatmak / yetişmek","prateritum_form":"reichte","partizip2":"gereicht","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Geld reicht für den Urlaub. - Reich mir das Salz!","tr":"Para tatil için yetiyor. - Bana tuzu uzat!"},{"tense":"PRÄTERITUM","de":"Sein Atem reichte nicht bis zum Ziel.","tr":"Nefesi hedefe kadar yetmedi."},{"tense":"PERFEKT","de":"Es hat jetzt wirklich gereicht! (Deyim)","tr":"Artık gerçekten yetti (kabak tadı verdi)!"},{"tense":"FUTUR I","de":"Fünf Kilo werden bestimmt reichen.","tr":"Beş kilo kesinlikle yetecektir."},{"tense":"KONJ II","de":"Würde dir das als Beweis reichen?","tr":"Bu senin için kanıt olarak yeterli olur mu?"}]},{"category":"NOMINATIV / SEIN / HABEN","verb":"reifen","turkish":"olgunlaşmak / (karar vb.) netleşmek","prateritum_form":"reifte","partizip2":"gereift","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Das Obst reift in der Sonne.","tr":"Meyve güneşte olgunlaşıyor."},{"tense":"PRÄTERITUM","de":"Der Käse reifte mehrere Monate lang.","tr":"Peynir birkaç ay boyunca olgunlaştı."},{"tense":"PERFEKT","de":"Der Plan ist über Nacht gereift.","tr":"Plan bir gecede olgunlaştı (netleşti)."},{"tense":"FUTUR I","de":"Du wirst mit der Zeit noch reifen.","tr":"Zamanla daha da olgunlaşacaksın."},{"tense":"KONJ II","de":"Es würde schneller reifen, wenn es wärmer wäre.","tr":"Daha sıcak olsaydı daha çabuk olgunlaşırdı."}]},{"category":"AKKUSATIV / HABEN","verb":"reinigen","turkish":"temizlemek / arındırmak","prateritum_form":"reinigte","partizip2":"gereinigt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich reinige den Teppich mit dem Staubsauger.","tr":"Halıyı elektrikli süpürgeyle temizliyorum."},{"tense":"PRÄTERITUM","de":"Sie reinigte die Wunde gründlich.","tr":"Yarayı iyice temizledi."},{"tense":"PERFEKT","de":"Haben Sie das Kleid chemisch reinigen lassen?","tr":"Elbiseyi kuru temizlemeye mi verdiniz?"},{"tense":"FUTUR I","de":"Wir werden die Meere vom Plastik reinigen.","tr":"Denizleri plastikten arındıracağız."},{"tense":"KONJ II","de":"Ich würde die Fenster reinigen, wenn es aufhörte zu regnen.","tr":"Yağmur durursa pencereleri temizlerdim."}]},{"category":"NOMINATIV / SEIN","verb":"reisen","turkish":"seyahat etmek / yolculuk yapmak","prateritum_form":"reiste","partizip2":"gereist","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Ich reise sehr gerne um die Welt.","tr":"Dünyayı gezmeyi (seyahat etmeyi) çok seviyorum."},{"tense":"PRÄTERITUM","de":"Er reiste geschäftlich nach Berlin.","tr":"İş için Berlin'e seyahat etti."},{"tense":"PERFEKT","de":"Bist du schon mal allein gereist?","tr":"Hiç yalnız başına seyahat ettin mi?"},{"tense":"FUTUR I","de":"Wir werden nächsten Sommer nach Japan reisen.","tr":"Gelecek yaz Japonya'ya seyahat edeceğiz."},{"tense":"KONJ II","de":"Ich würde öfter reisen, wenn ich mehr Geld hätte.","tr":"Daha fazla param olsaydı daha sık seyahat ederdim."}]},{"category":"AKK / NOM / HABEN / SEIN","verb":"reißen","turkish":"yırtmak / kopmak / parçalamak","prateritum_form":"","partizip2":"","hilfsverb":"","examples":[{"tense":"PRÄSENS","de":"Ich reiße das Papier entzwei.","tr":"Kağıdı ortadan ikiye yırtıyorum."},{"tense":"PRÄTERITUM","de":"Der Geduldsfaden riss ihm schließlich.","tr":"Sonunda sabrı taştı (sabır ipi koptu)."},{"tense":"PERFEKT","de":"Die Saite ist mitten im Konzert gerissen. (Sein)","tr":"Konserin ortasında tel koptu."},{"tense":"FUTUR I","de":"Die Wolkendecke wird bald aufreißen.","tr":"Bulut tabakası yakında aralanacak (yırtılacak)."},{"tense":"KONJ II","de":"Ich würde den Brief nicht einfach zerreißen.","tr":"Mektubu öylece yırtıp atmazdım."}]},{"category":"NOMINATIV / SEIN / HABEN","verb":"reiten","turkish":"ata binmek / (atla) gitmek","prateritum_form":"","partizip2":"","hilfsverb":"","examples":[{"tense":"PRÄSENS","de":"Sie reitet jeden Samstag auf dem Ponyhof.","tr":"Her Cumartesi midilli çiftliğinde ata biniyor."},{"tense":"PRÄTERITUM","de":"Der Reiter ritt schnell über das Feld.","tr":"Binici tarlanın üzerinden hızla geçti (atla gitti)."},{"tense":"PERFEKT","de":"Bist du schon mal auf einem Elefanten geritten?","tr":"Hiç filin üstüne bindin mi?"},{"tense":"FUTUR I","de":"Wir werden am Strand reiten gehen.","tr":"Sahilde ata binmeye gideceğiz."},{"tense":"KONJ II","de":"Ich würde gerne reiten können.","tr":"Ata binmeyi (bilmeyi) isterdim."}]},{"category":"AKKUSATIV / HABEN","verb":"reizen","turkish":"tahriş etmek / kışkırtmak / ilgisini çekmek","prateritum_form":"reizte","partizip2":"gereizt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Rauch reizt meine Augen.","tr":"Duman gözlerimi tahriş ediyor."},{"tense":"PRÄTERITUM","de":"Das Angebot reizte ihn sehr.","tr":"Teklif onun çok ilgisini çekti (onu cezbetti)."},{"tense":"PERFEKT","de":"Hast du ihn absichtlich gereizt?","tr":"Onu bilerek mi kışkırttın/damarına bastın?"},{"tense":"FUTUR I","de":"Diese Idee wird viele Menschen reizen.","tr":"Bu fikir pek çok insanın ilgisini çekecek."},{"tense":"KONJ II","de":"Es würde mich reizen, das einmal auszuprobieren.","tr":"Bunu bir denemek ilgimi çekerdi (beni cezbederdi)."}]},{"category":"AKKUSATIV / HABEN","verb":"reklamieren","turkish":"şikayet etmek (kusurlu mal) / geri istemek","prateritum_form":"reklamierte","partizip2":"reklamiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich reklamiere den kaputten Toaster.","tr":"Bozuk ekmek kızartma makinesi için şikayette bulunuyorum (iade/değişim için)."},{"tense":"PRÄTERITUM","de":"Er reklamierte die fehlenden Teile der Lieferung.","tr":"Teslimattaki eksik parçaları bildirdi/geri istedi."},{"tense":"PERFEKT","de":"Hast du die Schuhe schon reklamiert?","tr":"Ayakkabıları çoktan şikayet edip (iadeye) verdin mi?"},{"tense":"FUTUR I","de":"Wir werden das fehlerhafte Produkt reklamieren müssen.","tr":"Hatalı ürünü şikayet etmek/iade etmek zorunda kalacağız."},{"tense":"KONJ II","de":"Ich würde es sofort reklamieren, eğer ich den Kassenbon hätte.","tr":"Fişim olsaydı onu hemen iade ederdim/şikayet ederdim."}]},{"category":"AKKUSATIV / HABEN","verb":"rekonstruieren","turkish":"yeniden inşa etmek / canlandırmak (olayı)","prateritum_form":"rekonstruierte","partizip2":"rekonstruiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Die Polizei rekonstruiert den Unfallhergang.","tr":"Polis kaza anını (nasıl olduğunu) yeniden canlandırıyor."},{"tense":"PRÄTERITUM","de":"Architekten rekonstruierten das historische Gebäude.","tr":"Mimarlar tarihi binayı yeniden inşa ettiler."},{"tense":"PERFEKT","de":"Hat man die alten Akten rekonstruiert?","tr":"Eski dosyalar (parçalardan) yeniden bir araya getirildi mi?"},{"tense":"FUTUR I","de":"Wir werden das Gespräch Wort für Wort rekonstruieren.","tr":"Konuşmayı kelimesi kelimesine yeniden canlandıracağız (hatırlayacağız)."},{"tense":"KONJ II","de":"Ich würde das Modell gerne originalgetreu rekonstruieren.","tr":"Modeli aslına uygun olarak yeniden inşa etmek isterdim."}]},{"category":"NOMINATIV / HABEN","verb":"relaxen","turkish":"rahatlamak / kafa dinlemek","prateritum_form":"relaxte","partizip2":"gerealxt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Nach der Arbeit relaxe ich auf dem Sofa.","tr":"İşten sonra kanepede rahatlıyorum/kafa dinliyorum."},{"tense":"PRÄTERITUM","de":"Wir relaxten das ganze Wochenende am Pool.","tr":"Bütün hafta sonu havuz başında kafa dinledik."},{"tense":"PERFEKT","de":"Hast du im Urlaub richtig gerealxt?","tr":"Tatilde gerçekten rahatlayabildin mi?"},{"tense":"FUTUR I","de":"Ich werde heute Abend einfach nur relaxen.","tr":"Bu akşam sadece kafa dinleyeceğim."},{"tense":"KONJ II","de":"Ich würde relaxen, wenn die Kinder schlafen würden.","tr":"Çocuklar uyusaydı kafa dinlerdim."}]},{"category":"NOMINATIV / SEIN","verb":"rennen","turkish":"koşmak (hızlıca)","prateritum_form":"rannte","partizip2":"gerannt","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Er rennt so schnell er kann.","tr":"Elinden geldiğince hızlı koşuyor."},{"tense":"PRÄTERITUM","de":"Wir rannten zum Bahnhof, um den Zug zu erwischen.","tr":"Trenine yetişmek için istasyona koştuk."},{"tense":"PERFEKT","de":"Bist du den ganzen Weg gerannt?","tr":"Yolun tamamını koştun mu?"},{"tense":"FUTUR I","de":"Sie werden um ihr Leben rennen.","tr":"Can havliyle (hayatları için) koşacaklar."},{"tense":"KONJ II","de":"Ich würde nicht rennen, wenn es glatt wäre.","tr":"Yer kaygan olsaydı koşmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"renovieren","turkish":"yenilemek / tadilat yapmak","prateritum_form":"renovierte","partizip2":"renoviert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Wir renovieren unsere alte Wohnung.","tr":"Eski dairemizi yeniliyoruz (tadilat yapıyoruz)."},{"tense":"PRÄTERITUM","de":"Er renovierte das Bad ganz allein.","tr":"Banyoyu tek başına yeniledi."},{"tense":"PERFEKT","de":"Habt ihr das Haus schon fertig renoviert?","tr":"Evin ense":"PRÄSENS","de":"Ich respektiere deine Meinung.","tr":"Senin fikrine saygı duyuyorum."},{"tense":"PRÄTERITUM","de":"Er respektierte die Privatsphäre seiner Kollegen.","tr":"Meslektaşlarının özel hayatına saygı gösterdi."},{"tense":"PERFEKT","de":"Hast du die Regeln immer respektiert?","tr":"Kurallara her zaman riayet ettin mi?"},{"tense":"FUTUR I","de":"Alle werden deine Entscheidung respektieren.","tr":"Herkes senin kararına saygı duyacak."},{"tense":"KONJ II","de":"Ich würde ihn mehr respektieren, eğer er ehrlich wäre.","tr":"Dürüst olsaydı ona daha fazla saygı duyardım."}]},{"category":"AKK / VOR + DAT / HABEN","verb":"retten","turkish":"kurtarmak","prateritum_form":"rettete","partizip2":"gerettet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Feuerwehrmann rettet das Kind aus dem Haus.","tr":"İtfaiyeci çocuğu evden kurtarıyor."},{"tense":"PRÄTERITUM","de":"Er rettete die Daten im letzten Moment.","tr":"Verileri son anda kurtardı."},{"tense":"PERFEKT","de":"Hast du dich vor dem Regen gerettet?","tr":"Kendini yağmurdan kurtardın mı (bir yere sığındın mı)?"},{"tense":"FUTUR I","de":"Die Ärzte werden sein Leben retten.","tr":"Doktorlar onun hayatını kurtaracak."},{"tense":"KONJ II","de":"Ich würde ihn retten, wenn ich könnte.","tr":"Elimden gelse onu kurtarırdım."}]},{"category":"AKKUSATIV / HABEN","verb":"revidieren","turkish":"gözden geçirmek / düzeltmek / (kararı) bozmak","prateritum_form":"revidierte","partizip2":"revidiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Gericht revidiert das Urteil.","tr":"Mahkeme kararı bozuyor (yeniden inceliyor)."},{"tense":"PRÄTERITUM","de":"Er revidierte seine Meinung nach dem Gespräch.","tr":"Konuşmadan sonra fikrini düzeltti/gözden geçirdi."},{"tense":"PERFEKT","de":"Haben Sie Ihre Pläne bereits revidiert?","tr":"Planlarınızı çoktan gözden geçirdiniz mi?"},{"tense":"FUTUR I","de":"Die Experten werden den Bericht revidieren.","tr":"Uzmanlar raporu düzeltecekler."},{"tense":"KONJ II","de":"Ich würde meine Aussage nicht revidieren.","tr":"İfademi geri almazdım/düzeltmezdim."}]},{"category":"AKK / AN + AKK / HABEN","verb":"richten","turkish":"yöneltmek / düzeltmek / (yemek) hazırlamak","prateritum_form":"richtete","partizip2":"gerichtet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich richte die Kamera auf das Ziel.","tr":"Kamerayı hedefe yöneltiyorum."},{"tense":"PRÄTERITUM","de":"Er richtete seine Krawatte vor dem Spiegel.","tr":"Aynanın önünde kravatını düzeltti."},{"tense":"PERFEKT","de":"Hat sich das Problem von selbst gerichtet?","tr":"Sorun kendiliğinden düzeldi mi?"},{"tense":"FUTUR I","de":"Das wird schon wieder alles richten.","tr":"Bu her şeyi tekrar yoluna koyacak (düzeltecek)."},{"tense":"KONJ II","de":"Ich würde meine Frage an den Chef richten.","tr":"Sorumu patrona yöneltirdim."}]},{"category":"NACH + DAT / HABEN","verb":"riechen","turkish":"koklamak / kokmak","prateritum_form":"roch","partizip2":"gerochen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Es riecht hier nach frischem Kaffee.","tr":"Burası taze kahve kokuyor."},{"tense":"PRÄTERITUM","de":"Er roch an der Rose.","tr":"Gülü kokladı."},{"tense":"PERFEKT","de":"Hast du das Gas gerochen?","tr":"Gaz kokusunu aldın mı (kokladın mı)?"},{"tense":"FUTUR I","de":"Die ganze Wohnung wird nach Essen riechen.","tr":"Bütün daire yemek kokacak."},{"tense":"KONJ II","de":"Ich würde gerne wissen, wonach das riecht.","tr":"Bunun ne koktuğunu bilmek isterdim."}]},{"category":"UM + AKK / HABEN","verb":"ringen","turkish":"güreşmek / çabalamak (mücadele etmek)","prateritum_form":"rang","partizip2":"gerungen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Er ringt um Fassung.","tr":"Sakinliğini korumaya çalışıyor (mücadele ediyor)."},{"tense":"PRÄTERITUM","de":"Die Athleten rangen auf der Matte.","tr":"Sporcular minderde güreştiler."},{"tense":"PERFEKT","de":"Wir haben lange um eine Lösung gerungen.","tr":"Bir çözüm için uzun süre çabaladık (mücadele verdik)."},{"tense":"FUTUR I","de":"Sie werden um jeden Zentimeter Boden ringen.","tr":"Toprağın her santimi için savaşacaklar/çabalayacaklar."},{"tense":"KONJ II","de":"Ich würde nicht so sehr um Anerkennung ringen.","tr":"Takdir görmek için bu kadar çabalamazdım."}]},{"category":"NOMINATIV / SEIN","verb":"rinnen","turkish":"akmak (yavaşça) / sızmak","prateritum_form":"rann","partizip2":"geronnen","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Tränen rinnen über ihr Gesicht.","tr":"Yüzünden yaşlar süzülüyor (akıyor)."},{"tense":"PRÄTERITUM","de":"Das Wasser rann durch die Spalten.","tr":"Su yarıklardan sızdı/aktı."},{"tense":"PERFEKT","de":"Ist die Zeit dir durch die Finger geronnen?","tr":"Zaman parmaklarının arasından akıp gitti mi?"},{"tense":"FUTUR I","de":"Bald wird der Sand durch das Stundenglas rinnen.","tr":"Yakında kum saatinden kumlar akacak."},{"tense":"KONJ II","de":"Es würde schneller rinnen, wenn das Loch größer wäre.","tr":"Delik büyük olsaydı daha hızlı akardı."}]},{"category":"AKKUSATIV / HABEN","verb":"riskieren","turkish":"riske atmak / göze almak","prateritum_form":"riskierte","partizip2":"riskiert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich riskiere heute einen Blick in die Zukunft.","tr":"Bugün geleceğe bir göz atmayı göze alıyorum (riske ediyorum)."},{"tense":"PRÄTERITUM","de":"Er riskierte alles für seinen Traum.","tr":"Hayali için her şeyi riske attı."},{"tense":"PERFEKT","de":"Hast du zu viel riskiert?","tr":"Çok mu risk aldın?"},{"tense":"FUTUR I","de":"Wir werden unseren guten Ruf nicht riskieren.","tr":"İyi itibarımızı riske atmayacağız."},{"tense":"KONJ II","de":"Ich würde mein Leben nicht für Geld riskieren.","tr":"Para için hayatımı riske atmazdım."}]},{"category":"AKKUSATIV / HABEN","verb":"rösten","turkish":"kavurmak / kızartmak (ekmek vb.)","prateritum_form":"röstete","partizip2":"geröstet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich röste die Kaffeebohnen selbst.","tr":"Kahve çekirdeklerini kendim kavu ritum_form":"rostete","partizip2":"gerostet","hilfsverb":"sein","examples":[{"tense":"PRÄSENS","de":"Altes Eisen rostet schnell.","tr":"Eski demir çabuk paslanır."},{"tense":"PRÄTERITUM","de":"Die Kette rostete im Regen.","tr":"Zincir yağmurda paslandı."},{"tense":"PERFEKT","de":"Ist das Fahrrad draußen gerostet?","tr":"Bisiklet dışarıda mı paslandı?"},{"tense":"FUTUR I","de":"Ohne Pflege wird es bald rosten.","tr":"Bakım olmazsa yakında paslanacak."},{"tense":"KONJ II","de":"Es würde nicht rosten, eğer es trocken stünde.","tr":"Kuru bir yerde dursaydı paslanmazdı."}]},{"category":"AKK / NOM / HABEN / SEIN","verb":"rücken","turkish":"kımıldatmak / (biraz) çekmek-itmek","prateritum_form":"","partizip2":"","hilfsverb":"","examples":[{"tense":"PRÄSENS","de":"Ich rücke den Stuhl an den Tisch.","tr":"Sandalyeyi masaya (doğru) çekiyorum/itiyorum."},{"tense":"PRÄTERITUM","de":"Er rückte ein Stück zur Seite.","tr":"Bir parça kenara çekildi/kaydı."},{"tense":"PERFEKT","de":"Sind wir näher zusammengerückt? (Sein)","tr":"(Birbirimize) Daha fazla yakınlaştık mı?"},{"tense":"FUTUR I","de":"Wir werden die Möbel morgen rücken.","tr":"Mobilyaları yarın çekeceğiz/yerlerini değiştireceğiz."},{"tense":"KONJ II","de":"Ich würde die Lampe etwas ins Licht rücken.","tr":"Lambayı (ilgiyi) biraz ışığa doğru çekerdim."}]},{"category":"DÜZENSİZ / HABEN","verb":"rufen","turkish":"çağırmak / seslenmek / bağırmak","prateritum_form":"rief","partizip2":"gerufen","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich rufe dich heute Abend an. (Anrufen)","tr":"Seni bu akşam arayacağım."},{"tense":"PRÄTERITUM","de":"Er rief laut um Hilfe.","tr":"Yüksek sesle yardım (diye) bağırdı."},{"tense":"PERFEKT","de":"Hast du schon den Arzt gerufen?","tr":"Doktoru çoktan çağırdın mı?"},{"tense":"FUTUR I","de":"Die Pflicht wird uns bald rufen.","tr":"Görev bizi yakında çağıracak."},{"tense":"KONJ II","de":"Ich würde dich rufen, eğer ich dich bräuchte.","tr":"Sana ihtiyacım olsaydı seni çağırırdım."}]},{"category":"AKK / REFL / HABEN","verb":"rühren","turkish":"karıştırmak / dokunmak / duygulanmak","prateritum_form":"rührte","partizip2":"gerührt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich rühre den Zucker in den Tee.","tr":"Çaya şekeri karıştırıyorum."},{"tense":"PRÄTERITUM","de":"Seine Geschichte rührte mich zu Tränen.","tr":"Hikayesi beni gözyaşlarına boğdu (duygulandırdı)."},{"tense":"PERFEKT","de":"Hast du dich heute schon gerührt? (Egzersiz anlamında)","tr":"Bugün hiç hareket ettin mi (kımıldadın mı)?"},{"tense":"FUTUR I","de":"Niemand wird das Paket rühren.","tr":"Kimse pakete dokunmayacak/el sürmeyecek."},{"tense":"KONJ II","de":"Ich würde den Teig vorsichtiger rühren.","tr":"Hamuru daha dikkatli karıştırırdım."}]},{"category":"AKKUSATIV / HABEN","verb":"ruinieren","turkish":"mahvetmek / iflas ettirmek / bozmak","prateritum_form":"ruinierte","partizip2":"ruiniert","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Das Rauchen ruiniert die Lunge.","tr":"Sigara içmek akciğerleri mahvediyor."},{"tense":"PRÄTERITUM","de":"Der Regen ruinierte die Ernte.","tr":"Yağmur hasadı mahvetti/bozdu."},{"tense":"PERFEKT","de":"Hast du dein neues Kleid ruiniert?","tr":"Yeni elbiseni mah mı ettin?"},{"tense":"FUTUR I","de":"Diese Entscheidung wird die Firma ruinieren.","tr":"Bu karar firmayı iflasa sürükleyecek/mahvedecek."},{"tense":"KONJ II","de":"Ich würde meine Gesundheit nicht so ruinieren.","tr":"Sağlığımı bu kadar mahvetmezdim."}]},{"category":"NOMINATIV / HABEN / SEIN","verb":"rumpeln","turkish":"gürültüyle hareket etmek / sarsılmak / takırdamak","prateritum_form":"","partizip2":"","hilfsverb":"","examples":[{"tense":"PRÄSENS","de":"HABEN/SEIN","tr":"Der alte Wagen rumpelt über das Kopfsteinpflaster."},{"tense":"PRÄTERITUM","de":"Es rumpelte laut im Dachboden.","tr":"Tavan arasında gürültülü bir takırtı oldu."},{"tense":"PERFEKT","de":"Ist der Schrank beim Umzug gerumpelt?","tr":"Taşınma sırasında dolap gürültüyle mi sarsıldı?"},{"tense":"FUTUR I","de":"Der Donner wird bald wieder rumpeln.","tr":"Gök yakında yine gürleyecek/takırdayacak."},{"tense":"KONJ II","de":"Es würde weniger rumpeln, eğer die Räder neu wären.","tr":"Tekerlekler yeni olsaydı bu kadar takırdamazdı."}]},{"category":"AKKUSATIV / HABEN","verb":"runden","turkish":"yuvarlamak (sayıyı) / tamamlamak","prateritum_form":"rundete","partizip2":"gerundet","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Ich runde den Betrag auf 10 Euro auf.","tr":"Tutarı 10 Euro'ya yuvarlıyorum."},{"tense":"PRÄTERITUM","de":"Er rundete die Ecken des Holzes ab.","tr":"Tahtanın köşelerini yuvarlattı (yonttu)."},{"tense":"PERFEKT","de":"Hast du das Ergebnis schon gerundet?","tr":"Sonucu çoktan yuvarladın mı?"},{"tense":"FUTUR I","de":"Wir werden die Zahlen am Ende runden müssen.","tr":"Sayıları sonunda yuvarlamamız gerekecek."},{"tense":"KONJ II","de":"Ich würde abrunden, eğer es möglich wäre.","tr":"Mümkün olsaydı aşağı yuvarlardım."}]},{"category":"AKKUSATIV / HABEN","verb":"rupfen","turkish":"yolmak / koparmak","prateritum_form":"rupfte","partizip2":"gerupft","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Sie rupft das Unkraut im Garten.","tr":"Bahçedeki yabani otları yoluyor."},{"tense":"PRÄTERITUM","de":"Er rupfte dem Huhn die Federn aus.","tr":"Tavuğun tüylerini yoldu."},{"tense":"PERFEKT","de":"Hast du die Blumen einfach gerupft?","tr":"Çiçekleri öylece yoldun/kopardın mı?"},{"tense":"FUTUR I","de":"Wir werden die Gänse rupfen müssen.","tr":"Kazları yolmamız gerekecek."},{"tense":"KONJ II","de":"Ich würde nicht an meinen Haaren rupfen.","tr":"Saçlarımı böyle yolmazdım/çekmezdim."}]},{"category":"AN + DAT / HABEN","verb":"rütteln","turkish":"sarsmak / silkelemek / zorlamak","prateritum_form":"rüttelte","partizip2":"gerüttelt","hilfsverb":"haben","examples":[{"tense":"PRÄSENS","de":"Der Wind rüttelt an den Fenstern.","tr":"Rüzgar pencereleri sarsıyor."},{"tense":"PRÄTERITUM","de":"Er rüttelte mich wach.","tr":"Beni sarsarak uyandırdı."},{"tense":
