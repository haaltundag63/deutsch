<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Almanca Kartlar">
<title>Almanca Flash Kartlar — 21 Konu / 630 Cümle</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #090f1a;
  --panel: #111c2d;
  --card-bg: #0f1e30;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --warn: #f85149;
  --gold: #d29922;
  --tag-bg: rgba(88,166,255,.12);
  --radius: 14px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  height: 100%;
  font-size: 15px;
  display: flex;
  flex-direction: column;
}
/* ── HEADER ── */
header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 18px 20px 14px;
}
.header-inner {
  max-width: 860px;
  margin: auto;
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
h1 {
  font-family: var(--mono);
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.3px;
}
.header-sub {
  font-size: 13px;
  color: var(--muted);
  font-family: var(--mono);
}

/* ── MAIN ── */
.app {
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
  padding: 16px 16px 10px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
select, input[type=text] {
  background: #0d2137;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: #a8cce8;
  padding: 10px 14px;
  font-size: 14px;
  font-family: var(--sans);
  outline: none;
  width: 100%;
  transition: border-color .2s;
}
select:focus, input:focus { border-color: var(--accent); }
option { background: #0d2137; color: #a8cce8; }

/* ── STATS ROW ── */
.stats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  align-items: center;
}
.badge {
  font-family: var(--mono);
  font-size: 12px;
  padding: 5px 11px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: #0d2137;
}
.badge.green { border-color: var(--accent2); color: var(--accent2); }
.badge.red { border-color: var(--warn); color: var(--warn); }
.badge.blue { border-color: var(--accent); color: var(--accent); }

/* ── PROGRESS BAR ── */
.progress-wrap {
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  margin-bottom: 20px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width .3s;
}

/* ── FLASHCARD ── */
.card-scene {
  perspective: 1400px;
  margin-bottom: 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.card-inner {
  position: relative;
  flex: 1;
  min-height: 340px;
  transform-style: preserve-3d;
  transition: transform .42s cubic-bezier(.4,0,.2,1);
  border-radius: 20px;
}
.card-scene.flipped .card-inner {
  transform: rotateY(180deg);
}
.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 36px 28px 28px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
.card-face.back {
  transform: rotateY(180deg);
  background: #1a2332;
  border-color: #2d4a6e;
}
.card-topic {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: .8px;
  text-transform: uppercase;
  margin-bottom: 20px;
  background: var(--tag-bg);
  padding: 4px 10px;
  border-radius: 99px;
  border: 1px solid rgba(88,166,255,.25);
}
.card-text {
  font-size: 22px;
  line-height: 1.45;
  font-weight: 400;
  color: var(--text);
  max-width: 700px;
}
.card-face.back .card-text {
  font-size: 20px;
  color: #a5c8f0;
}
.card-hint {
  margin-top: 22px;
  font-size: 12px;
  color: var(--muted);
  font-family: var(--mono);
}
.card-num {
  position: absolute;
  top: 14px;
  right: 18px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}

/* ── BUTTONS ── */
.btn-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 18px;
}
.btn {
  border: none;
  border-radius: var(--radius);
  padding: 11px 8px;
  font-size: 13px;
  font-family: var(--sans);
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.btn:active { transform: scale(.96); }
.btn-primary { background: var(--accent); color: #0d1117; }
.btn-ghost { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
.btn-green { background: var(--accent2); color: #0d1117; }
.btn-red { background: var(--warn); color: #fff; }
.btn-mono { background: var(--panel); color: var(--muted); border: 1px solid var(--border); font-family: var(--mono); font-size: 12px; }



/* ── KEYBOARD HINT ── */
.kb-hint {
  text-align: center;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-top: 12px;
}
kbd {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 10px;
}

@media(max-width:620px) {
  .filter-bar { grid-template-columns: 1fr; }
  .btn-grid { grid-template-columns: repeat(2,1fr); }
  .card-text { font-size: 19px; }
  .list-tr { display: none; }
  .header-inner { flex-direction: column; gap: 4px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Almanca Flash Kartlar</h1>
    <span class="header-sub">21 konu · 630 cümle · B1–C1 · DE ↔ TR</span>
    <button id="fsBtn" onclick="toggleFS()" style="margin-left:auto;background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.3);border-radius:8px;color:#58a6ff;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:600;">⛶ Tam Ekran</button>
  </div>
</header>

<div class="app">

  <div class="filter-bar">
    <select id="topicSel"></select>
    <input type="text" id="search" placeholder="Almanca veya Türkçe ara…">
  </div>

  <div class="stats">
    <span class="badge blue" id="sCounter">1 / 630</span>
    <span class="badge" id="sLevel">B1-C1</span>
    <span class="badge green" id="sKnown">✓ Bildim: 0</span>
    <span class="badge red" id="sAgain">↩ Tekrar: 0</span>
    <span class="badge" id="sPct">0%</span>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="card-scene" id="cardScene" onclick="flip()">
    <div class="card-inner" id="cardInner">
      <div class="card-face front">
        <span class="card-num" id="cardNum"></span>
        <div class="card-topic" id="frontTopic"></div>
        <div class="card-text" id="frontText"></div>
        <div class="card-hint">dokunarak çevir</div>
      </div>
      <div class="card-face back">
        <span class="card-num" id="cardNumB"></span>
        <div class="card-topic" id="backTopic"></div>
        <div class="card-text" id="backText"></div>
        <div class="card-hint">Türkçe anlam</div>
      </div>
    </div>
  </div>

  <div class="btn-grid">
    <button class="btn btn-ghost" onclick="prev()">← Önceki</button>
    <button class="btn btn-primary" onclick="flip()">Çevir</button>
    <button class="btn btn-ghost" onclick="next()">Sonraki →</button>
    <button class="btn btn-ghost" onclick="shuffle()">⇌ Karıştır</button>
    <button class="btn btn-green" onclick="markKnown()">✓ Bildim</button>
    <button class="btn btn-red" onclick="markAgain()">↩ Tekrar</button>
    <button class="btn btn-mono" onclick="speak()">▶ Seslendir</button>
    <button class="btn btn-mono" onclick="reset()">⟳ Sıfırla</button>
  </div>

  </div>

  

</div>

ft stressig, trotzdem versuche ich positiv zu bleiben.", "back": "Günlük hayatım sık sık stresli oluyor, buna rağmen pozitif kalmaya çalışıyorum.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 11, "front": "Sobald ich nach Hause komme, ziehe ich zuerst bequeme Kleidung an.", "back": "Eve gelir gelmez önce rahat kıyafetler giyerim.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 12, "front": "Ich brauche morgens unbedingt einen Kaffee, um richtig wach zu werden.", "back": "Gerçekten ayılmak için sabah mutlaka kahveye ihtiyacım oluyor.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 13, "front": "Obwohl mein Tagesablauf ziemlich voll ist, nehme ich mir Zeit für meine Familie.", "back": "Günlük programım oldukça dolu olmasına rağmen aileme zaman ayırıyorum.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 14, "front": "Ich erledige wichtige Aufgaben lieber am Vormittag.", "back": "Önemli işleri daha çok sabah saatlerinde yapmayı tercih ederim.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 15, "front": "Wenn ich zu wenig schlafe, bin ich den ganzen Tag unkonzentriert.", "back": "Çok az uyursam bütün gün dikkatsiz oluyorum.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 16, "front": "Ich plane meine Woche meistens schon am Sonntagabend.", "back": "Haftamı çoğunlukla pazar akşamından planlıyorum.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 17, "front": "In letzter Zeit versuche ich, bewusster zu leben.", "back": "Son zamanlarda daha bilinçli yaşamaya çalışıyorum.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 18, "front": "Mein Tagesrhythmus hat sich in den letzten Jahren stark verändert.", "back": "Günlük ritmim son yıllarda ciddi şekilde değişti.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 19, "front": "Ich mache zwischendurch kurze Pausen, damit ich produktiver bleibe.", "back": "Daha verimli kalabilmek için aralarda kısa molalar veriyorum.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 20, "front": "Oft merke ich erst abends, wie anstrengend der Tag eigentlich war.", "back": "Günün aslında ne kadar yorucu olduğunu çoğu zaman ancak akşam fark ediyorum.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 21, "front": "Ich versuche, feste Gewohnheiten aufzubauen.", "back": "Düzenli alışkanlıklar oluşturmaya çalışıyorum.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 22, "front": "Mein Handy lenkt mich manchmal von wichtigen Dingen ab.", "back": "Telefonum bazen beni önemli şeylerden uzaklaştırıyor.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 23, "front": "Früher war ich deutlich organisierter als heute.", "back": "Eskiden bugüne göre belirgin şekilde daha düzenliydim.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 24, "front": "Ich nehme mir morgens gerne ein paar Minuten nur für mich.", "back": "Sabahları sadece kendim için birkaç dakika ayırmayı seviyorum.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 25, "front": "An stressigen Tagen vergesse ich manchmal sogar zu essen.", "back": "Stresli günlerde bazen yemek yemeyi bile unutuyorum.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 26, "front": "Ich achte darauf, genug Wasser zu trinken.", "back": "Yeterince su içmeye dikkat ediyorum.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 27, "front": "Mein Alltag wäre ohne digitale Geräte kaum noch vorstellbar.", "back": "Günlük hayatım dijital cihazlar olmadan artık neredeyse düşünülemez olurdu.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 28, "front": "Ich versuche abends früher schlafen zu gehen, damit ich morgens fitter bin.", "back": "Sabah daha dinç olmak için akşamları daha erken uyumaya çalışıyorum.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "number": 29, "front": "Manche Gewohnheiten zu ändern ist schwieriger, als man denkt.", "back": "Bazı alışkanlıkları değiştirmek düşünüldüğünden daha zor.", "level": "B1-C1"}, {"topic": "Günlük Rutin", "numb let filtered = [...ALL];
let idx = 0;
let isFlipped = false;
let known = new Set();
let again = new Set();

// Topic select
const topicSel = document.getElementById('topicSel');
['Tüm Konular', ...new Set(ALL.map(c=>c.topic))].forEach(t => {
  const o = document.createElement('option');
  o.value = t; o.textContent = t;
  topicSel.appendChild(o);
});

function applyFilter() {
  const t = topicSel.value;
  const q = document.getElementById('search').value.toLowerCase().trim();
  filtered = ALL.filter(c =>
    (t === 'Tüm Konular' || c.topic === t) &&
    (!q || c.front.toLowerCase().includes(q) || c.back.toLowerCase().includes(q))
  );
  idx = 0; isFlipped = false; render();
}
topicSel.onchange = applyFilter;
document.getElementById('search').oninput = applyFilter;

function render() {
  if (!filtered.length) {
    document.getElementById('frontText').textContent = 'Sonuç bulunamadı.';
    document.getElementById('backText').textContent = '';
    document.getElementById('sCounter').textContent = '0 / 0';
        document.getElementById('progressFill').style.width = '0%';
    return;
  }
  const c = filtered[idx];
  const n = idx + 1;
  const total = filtered.length;

  document.getElementById('cardScene').classList.toggle('flipped', isFlipped);

  document.getElementById('frontTopic').textContent = c.topic;
  document.getElementById('backTopic').textContent = c.topic + ' — Türkçe';
  document.getElementById('frontText').textContent = c.front;
  document.getElementById('backText').textContent = c.back;

  const numTxt = n + ' / ' + total;
  document.getElementById('cardNum').textContent = numTxt;
  document.getElementById('cardNumB').textContent = numTxt;

  document.getElementById('sCounter').textContent = n + ' / ' + total;
  document.getElementById('sLevel').textContent = c.level;
  document.getElementById('sKnown').textContent = '✓ Bildim: ' + known.size;
  document.getElementById('sAgain').textContent = '↩ Tekrar: ' + again.size;

  const pct = total > 0 ? Math.round((known.size / total) * 100) : 0;
  document.getElementById('sPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  
}



function esc(s) {
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function flip() { isFlipped = !isFlipped; render(); }
function next() { idx = (idx + 1) % filtered.length; isFlipped = false; render(); }
function prev() { idx = (idx - 1 + filtered.length) % filtered.length; isFlipped = false; render(); }
function goto(i) { idx = i; isFlipped = false; render(); window.scrollTo({top:0,behavior:'smooth'}); }

function markKnown() {
  known.add(idx);
  again.delete(idx);
  next();
}
function markAgain() {
  again.add(idx);
  known.delete(idx);
  next();
}

function shuffle() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  idx = 0; isFlipped = false; known.clear(); again.clear(); render();
}

function reset() {
  known.clear(); again.clear(); idx = 0; isFlipped = false; render();
}

function speak() {
  if (!filtered.length) return;
  const text = filtered[idx].front;
  if (!('speechSynthesis' in window)) { alert('Tarayıcınız seslendirmeyi desteklemiyor.'); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE';
  // Try to find a German voice
  const voices = speechSynthesis.getVoices();
  const deVoice = voices.find(v => v.lang.startsWith('de'));
  if (deVoice) u.voice = deVoice;
  u.rate = 0.88;
  speechSynthesis.speak(u);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); flip(); }
  else if (e.key === 'k' || e.key === 'K') markKnown();
  else if (e.key === 't' || e.key === 'T') markAgain();
  else if (e.key === 's' || e.key === 'S') speak();
});

// Init voices async (Chrome needs this)
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => {};
}

render();

function toggleFS(){
  var el = document.documentElement;
  var btn = document.getElementById("fsBtn");
  if(!document.fullscreenElement && !document.webkitFullscreenElement){
    if(el.requestFullscreen) el.requestFullscreen();
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    if(btn) btn.textContent = "✕ Çık";
  } else {
    if(document.exitFullscreen) document.exitFullscreen();
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    if(btn) btn.textContent = "⛶ Tam Ekran";
  }
}
document.addEventListener("fullscreenchange", function(){
  var btn = document.getElementById("fsBtn");
  if(!document.fullscreenElement && !document.webkitFullscreenElement && btn)
    btn.textContent = "⛶ Tam Ekran";
});
document.addEventListener("webkitfullscreenchange", function(){
  var btn = document.getElementById("fsBtn");
  if(!document.webkitFullscreenElement && btn)
    btn.textContent = "⛶ Tam Ekran";
});

</script>
